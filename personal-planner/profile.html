<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户信息 - 个人规划管理</title>
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <script src="storage-sync.js"></script>
    <script src="backup-client.js"></script>
    <style>
        .profile-shell {
            max-width: 920px;
            margin: 0 auto;
        }

        .profile-module {
            padding: 22px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 20px;
        }

        .profile-title-group h2 {
            margin: 0;
            font-size: 24px;
            color: var(--warm-gray-900);
        }

        .profile-title-group p {
            margin: 8px 0 0;
            font-size: 13px;
            color: var(--warm-gray-500);
        }

        .profile-avatar-preview {
            width: 56px;
            height: 56px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #1f2937, #4b5563);
            box-shadow: 0 4px 10px rgba(17, 24, 39, 0.22);
        }

        .profile-form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px 16px;
        }

        .profile-field {
            display: grid;
            gap: 6px;
        }

        .profile-field.full {
            grid-column: 1 / -1;
        }

        .profile-field label {
            font-size: 13px;
            color: var(--warm-gray-700);
        }

        .profile-field input,
        .profile-field textarea {
            width: 100%;
            border: 1px solid var(--warm-gray-200);
            border-radius: 10px;
            font-size: 14px;
            padding: 10px 12px;
            color: var(--warm-gray-900);
            background: #fff;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .profile-field textarea {
            min-height: 108px;
            resize: vertical;
        }

        .profile-field input:focus,
        .profile-field textarea:focus {
            border-color: #ad8a67;
            box-shadow: 0 0 0 3px rgba(173, 138, 103, 0.18);
        }

        .profile-field input[readonly] {
            background: var(--warm-gray-50);
            color: var(--warm-gray-600);
            cursor: not-allowed;
        }

        .profile-actions {
            margin-top: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .profile-actions-left,
        .profile-actions-right {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .profile-status {
            min-height: 22px;
            margin-top: 12px;
            font-size: 13px;
            color: var(--warm-gray-600);
        }

        .profile-status.is-error {
            color: #b03737;
        }

        .profile-status.is-success {
            color: #2f7d3e;
        }

        .profile-avatar-menu-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .profile-avatar-menu {
            position: absolute;
            top: calc(100% + 10px);
            right: calc(var(--topbar-avatar-size, 36px) / 2 - 10px);
            width: 280px;
            padding: 20px 14px 14px;
            border-radius: 14px;
            border: 1px solid rgba(222, 214, 204, 0.85);
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 18px 34px rgba(35, 30, 25, 0.16);
            z-index: 42;
            opacity: 0;
            transform: translateY(-6px);
            pointer-events: none;
            transition: opacity 0.18s ease, transform 0.18s ease;
            backdrop-filter: blur(2px);
        }

        .profile-avatar-menu-wrap.is-open .profile-avatar-menu {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .profile-avatar-menu-head {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(224, 216, 208, 0.9);
            margin-bottom: 10px;
        }

        .profile-avatar-menu-big-avatar {
            position: absolute;
            right: -34px;
            top: -28px;
            width: 88px;
            height: 88px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(140deg, #1f2937, #4b5563);
            box-shadow: 0 8px 18px rgba(17, 24, 39, 0.28);
            flex-shrink: 0;
            transform: translate(0, 0) scale(1);
            transition: transform 0.28s cubic-bezier(0.22, 0.62, 0.36, 1);
        }

        .profile-avatar-menu-wrap .global-avatar-btn.is-avatar-hidden {
            opacity: 0;
            visibility: hidden;
        }

        .profile-avatar-menu-name {
            margin: 0;
            font-size: 15px;
            font-weight: 700;
            color: var(--warm-gray-900);
            line-height: 1.2;
        }

        .profile-avatar-menu-sub {
            margin: 4px 0 0;
            font-size: 12px;
            color: var(--warm-gray-500);
            word-break: break-word;
        }

        .profile-avatar-menu-list {
            display: grid;
            gap: 4px;
        }

        .profile-avatar-menu-item {
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            border-radius: 10px;
            color: var(--warm-gray-800);
            font-size: 13px;
            padding: 9px 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.18s ease, color 0.18s ease;
        }

        .profile-avatar-menu-item:hover {
            background: var(--warm-gray-50);
            color: var(--warm-gray-900);
        }

        .profile-avatar-menu-item-danger {
            color: #a53535;
        }

        .profile-avatar-menu-item-danger:hover {
            background: rgba(181, 68, 68, 0.1);
            color: #8f2f2f;
        }

        .profile-avatar-menu-item::after {
            content: '›';
            font-size: 14px;
            color: var(--warm-gray-400);
            line-height: 1;
        }

        .profile-avatar-menu-item-danger::after {
            content: '';
        }

        @media (max-width: 767px) {
            .profile-module {
                padding: 16px;
            }

            .profile-form-grid {
                grid-template-columns: 1fr;
            }

            .profile-header {
                align-items: flex-start;
            }

            .profile-avatar-menu {
                right: calc(var(--topbar-avatar-size, 36px) / 2 - 10px);
                width: min(280px, calc(100vw - 32px));
            }
        }
    </style>
</head>

    <script>
        (function () {
            'use strict';

            var PROFILE_STORE_KEY = 'planner_user_profile_v1';

            function readProfileStore() {
                var raw = localStorage.getItem(PROFILE_STORE_KEY);
                if (!raw) return {};
                try {
                    var parsed = JSON.parse(raw);
                    return parsed && typeof parsed === 'object' ? parsed : {};
                } catch (err) {
                    return {};
                }
            }

            function writeProfileStore(store) {
                localStorage.setItem(PROFILE_STORE_KEY, JSON.stringify(store || {}));
            }

            function normalizeText(value) {
                return String(value || '').trim();
            }

            function getAvatarSeed(account, nickname) {
                var source = normalizeText(nickname) || normalizeText(account) || 'U';
                return source.charAt(0).toUpperCase();
            }

            function setStatus(message, kind) {
                var statusEl = document.getElementById('profileStatus');
                if (!statusEl) return;
                statusEl.textContent = message || '';
                statusEl.classList.remove('is-error', 'is-success');
                if (kind) statusEl.classList.add(kind);
            }

            function isValidPhone(phone) {
                var value = normalizeText(phone);
                if (!value) return true;
                return /^1\d{10}$/.test(value);
            }

            document.addEventListener('DOMContentLoaded', function () {
                if (!window.PlannerAuth || typeof window.PlannerAuth.getCurrentUser !== 'function') return;

                var currentUser = window.PlannerAuth.getCurrentUser();
                if (!currentUser || !currentUser.account) {
                    window.location.replace('login.html');
                    return;
                }

                var account = currentUser.account;
                var accountEl = document.getElementById('profileAccount');
                var nicknameEl = document.getElementById('profileNickname');
                var phoneEl = document.getElementById('profilePhone');
                var emailEl = document.getElementById('profileEmail');
                var bioEl = document.getElementById('profileBio');
                var avatarPreviewEl = document.getElementById('profileAvatarPreview');
                var topbarAvatarEl = document.querySelector('.global-avatar-mark');
                var topbarAvatarBtn = document.querySelector('#profileAvatarMenuWrap .global-avatar-btn');
                var avatarMenuWrap = document.getElementById('profileAvatarMenuWrap');
                var menuAvatarLargeEl = document.getElementById('profileMenuAvatarLarge');
                var menuNameEl = document.getElementById('profileMenuName');
                var menuSubEl = document.getElementById('profileMenuSub');
                var menuUserInfoBtn = document.getElementById('profileMenuUserInfo');
                var menuAppearanceBtn = document.getElementById('profileMenuAppearance');
                var menuPrivacyBtn = document.getElementById('profileMenuPrivacy');
                var menuLogoutBtn = document.getElementById('profileMenuLogout');
                var formEl = document.getElementById('profileForm');
                var resetBtn = document.getElementById('profileResetBtn');
                var logoutBtn = document.getElementById('profileLogoutBtn');

                if (!accountEl || !nicknameEl || !phoneEl || !emailEl || !bioEl || !avatarPreviewEl || !formEl || !resetBtn || !logoutBtn) {
                    return;
                }

                var store = readProfileStore();
                var initialProfile = store[account] || {};

                function applyProfile(profile) {
                    var safeProfile = profile || {};
                    accountEl.value = account;
                    nicknameEl.value = normalizeText(safeProfile.nickname);
                    phoneEl.value = normalizeText(safeProfile.phone);
                    emailEl.value = normalizeText(safeProfile.email);
                    bioEl.value = String(safeProfile.bio || '').trim();

                    var mark = getAvatarSeed(account, nicknameEl.value);
                    avatarPreviewEl.textContent = mark;
                    if (topbarAvatarEl) topbarAvatarEl.textContent = mark;
                    if (menuAvatarLargeEl) menuAvatarLargeEl.textContent = mark;
                    if (menuNameEl) menuNameEl.textContent = normalizeText(safeProfile.nickname) || account;
                    if (menuSubEl) {
                        var summary = [];
                        var normalizedPhone = normalizeText(safeProfile.phone);
                        if (normalizedPhone) summary.push(normalizedPhone);
                        summary.push(account);
                        menuSubEl.textContent = summary.join(' · ');
                    }
                }

                applyProfile(initialProfile);

                if (avatarMenuWrap) {
                    var AVATAR_RESTORE_DELAY_MS = 250;
                    var closeMenuTimer = 0;
                    var closeMenuToken = 0;
                    var menuFlybackAvatarEl = null;
                    var removeMenuFlybackAvatar = function () {
                        if (!menuFlybackAvatarEl) return;
                        if (menuFlybackAvatarEl.parentNode) {
                            menuFlybackAvatarEl.parentNode.removeChild(menuFlybackAvatarEl);
                        }
                        menuFlybackAvatarEl = null;
                    };
                    var resetMenuAvatarMotion = function () {
                        if (!menuAvatarLargeEl) return;
                        menuAvatarLargeEl.style.transition = '';
                        menuAvatarLargeEl.style.transform = 'translate(0px, 0px) scale(1)';
                    };
                    var animateMenuAvatar = function () {
                        if (!topbarAvatarBtn || !menuAvatarLargeEl) return;
                        var btnRect = topbarAvatarBtn.getBoundingClientRect();
                        var targetRect = menuAvatarLargeEl.getBoundingClientRect();
                        if (!btnRect.width || !targetRect.width) return;

                        var fromX = (btnRect.left + btnRect.width / 2) - (targetRect.left + targetRect.width / 2);
                        var fromY = (btnRect.top + btnRect.height / 2) - (targetRect.top + targetRect.height / 2);
                        var fromScale = Math.max(0.2, Math.min(1.2, btnRect.width / targetRect.width));

                        menuAvatarLargeEl.style.transition = 'none';
                        menuAvatarLargeEl.style.transform = 'translate(' + fromX.toFixed(2) + 'px, ' + fromY.toFixed(2) + 'px) scale(' + fromScale.toFixed(4) + ')';
                        menuAvatarLargeEl.getBoundingClientRect();
                        menuAvatarLargeEl.style.transition = '';
                        menuAvatarLargeEl.style.transform = 'translate(0px, 0px) scale(1)';
                    };
                    var animateMenuAvatarBack = function (startRect, done) {
                        if (!topbarAvatarBtn || !menuAvatarLargeEl) {
                            done();
                            return;
                        }
                        var btnRect = topbarAvatarBtn.getBoundingClientRect();
                        var sourceRect = startRect && startRect.width ? startRect : menuAvatarLargeEl.getBoundingClientRect();
                        if (!btnRect.width || !sourceRect.width) {
                            done();
                            return;
                        }

                        var toX = (btnRect.left + btnRect.width / 2) - (sourceRect.left + sourceRect.width / 2);
                        var toY = (btnRect.top + btnRect.height / 2) - (sourceRect.top + sourceRect.height / 2);
                        var toScale = Math.max(0.2, Math.min(1.2, btnRect.width / sourceRect.width));
                        removeMenuFlybackAvatar();
                        var computed = window.getComputedStyle(menuAvatarLargeEl);
                        menuFlybackAvatarEl = document.createElement('span');
                        menuFlybackAvatarEl.textContent = menuAvatarLargeEl.textContent || 'U';
                        menuFlybackAvatarEl.setAttribute('aria-hidden', 'true');
                        menuFlybackAvatarEl.style.position = 'fixed';
                        menuFlybackAvatarEl.style.left = sourceRect.left + 'px';
                        menuFlybackAvatarEl.style.top = sourceRect.top + 'px';
                        menuFlybackAvatarEl.style.width = sourceRect.width + 'px';
                        menuFlybackAvatarEl.style.height = sourceRect.height + 'px';
                        menuFlybackAvatarEl.style.display = 'inline-flex';
                        menuFlybackAvatarEl.style.alignItems = 'center';
                        menuFlybackAvatarEl.style.justifyContent = 'center';
                        menuFlybackAvatarEl.style.borderRadius = computed.borderRadius || '999px';
                        menuFlybackAvatarEl.style.background = computed.background || 'linear-gradient(140deg, #1f2937, #4b5563)';
                        menuFlybackAvatarEl.style.boxShadow = computed.boxShadow || '0 8px 18px rgba(17, 24, 39, 0.28)';
                        menuFlybackAvatarEl.style.color = computed.color || '#fff';
                        menuFlybackAvatarEl.style.fontSize = computed.fontSize || '32px';
                        menuFlybackAvatarEl.style.fontWeight = computed.fontWeight || '700';
                        menuFlybackAvatarEl.style.transform = 'translate(0px, 0px) scale(1)';
                        menuFlybackAvatarEl.style.transition = 'transform 0.28s cubic-bezier(0.22, 0.62, 0.36, 1)';
                        menuFlybackAvatarEl.style.pointerEvents = 'none';
                        menuFlybackAvatarEl.style.zIndex = '9999';
                        menuFlybackAvatarEl.style.willChange = 'transform';
                        document.body.appendChild(menuFlybackAvatarEl);
                        var completed = false;
                        var finish = function () {
                            if (completed) return;
                            completed = true;
                            if (menuFlybackAvatarEl) {
                                menuFlybackAvatarEl.removeEventListener('transitionend', onEnd);
                            }
                            removeMenuFlybackAvatar();
                            done();
                        };
                        var onEnd = function (event) {
                            if (!event || event.propertyName === 'transform') finish();
                        };

                        menuFlybackAvatarEl.addEventListener('transitionend', onEnd);
                        requestAnimationFrame(function () {
                            requestAnimationFrame(function () {
                                if (!menuFlybackAvatarEl) return;
                                menuFlybackAvatarEl.style.transform = 'translate(' + toX.toFixed(2) + 'px, ' + toY.toFixed(2) + 'px) scale(' + toScale.toFixed(4) + ')';
                            });
                        });
                        setTimeout(finish, 360);
                    };
                    var openAvatarMenu = function () {
                        if (closeMenuTimer) {
                            clearTimeout(closeMenuTimer);
                            closeMenuTimer = 0;
                        }
                        closeMenuToken += 1;
                        removeMenuFlybackAvatar();
                        resetMenuAvatarMotion();
                        var wasOpen = avatarMenuWrap.classList.contains('is-open');
                        avatarMenuWrap.classList.add('is-open');
                        if (topbarAvatarBtn) topbarAvatarBtn.classList.add('is-avatar-hidden');
                        if (!wasOpen) {
                            requestAnimationFrame(animateMenuAvatar);
                        }
                    };
                    var closeAvatarMenu = function (delayMs) {
                        if (closeMenuTimer) clearTimeout(closeMenuTimer);
                        var token = ++closeMenuToken;
                        var delay = typeof delayMs === 'number' ? delayMs : AVATAR_RESTORE_DELAY_MS;
                        closeMenuTimer = setTimeout(function () {
                            closeMenuTimer = 0;
                            if (token !== closeMenuToken) return;
                            var startRect = menuAvatarLargeEl ? menuAvatarLargeEl.getBoundingClientRect() : null;
                            avatarMenuWrap.classList.remove('is-open');
                            resetMenuAvatarMotion();
                            animateMenuAvatarBack(startRect, function () {
                                if (token !== closeMenuToken) return;
                                if (topbarAvatarBtn) topbarAvatarBtn.classList.remove('is-avatar-hidden');
                                resetMenuAvatarMotion();
                            });
                        }, delay);
                    };

                    avatarMenuWrap.addEventListener('mouseenter', openAvatarMenu);
                    avatarMenuWrap.addEventListener('mouseleave', function () { closeAvatarMenu(AVATAR_RESTORE_DELAY_MS); });

                    if (topbarAvatarBtn) {
                        // Override the global click-to-profile behavior on this page.
                        topbarAvatarBtn.addEventListener('click', function (event) {
                            event.preventDefault();
                            event.stopImmediatePropagation();
                            if (avatarMenuWrap.classList.contains('is-open')) {
                                closeAvatarMenu(0);
                            } else {
                                openAvatarMenu();
                            }
                        }, true);
                    }

                    document.addEventListener('pointerdown', function (event) {
                        var target = event.target;
                        if (!(target instanceof Element)) return;
                        if (avatarMenuWrap.contains(target)) return;
                        closeAvatarMenu(0);
                    });

                    if (menuUserInfoBtn) {
                        menuUserInfoBtn.addEventListener('click', function () {
                            closeAvatarMenu(0);
                            var profileForm = document.getElementById('profileForm');
                            if (profileForm && typeof profileForm.scrollIntoView === 'function') {
                                profileForm.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            }
                        });
                    }

                    if (menuAppearanceBtn) {
                        menuAppearanceBtn.addEventListener('click', function () {
                            closeAvatarMenu(0);
                            if (typeof window.openPlannerSettings === 'function') {
                                window.openPlannerSettings();
                            } else {
                                setStatus('界面外观设置暂不可用。');
                            }
                        });
                    }

                    if (menuPrivacyBtn) {
                        menuPrivacyBtn.addEventListener('click', function () {
                            closeAvatarMenu(0);
                            setStatus('安全隐私设置即将支持。');
                        });
                    }

                    if (menuLogoutBtn) {
                        menuLogoutBtn.addEventListener('click', function () {
                            closeAvatarMenu(0);
                            if (!window.PlannerAuth || typeof window.PlannerAuth.logout !== 'function') return;
                            var shouldLogout = window.confirm('确认退出登录吗？');
                            if (!shouldLogout) return;
                            window.PlannerAuth.logout();
                        });
                    }
                }

                nicknameEl.addEventListener('input', function () {
                    var mark = getAvatarSeed(account, nicknameEl.value);
                    avatarPreviewEl.textContent = mark;
                    if (topbarAvatarEl) topbarAvatarEl.textContent = mark;
                    if (menuAvatarLargeEl) menuAvatarLargeEl.textContent = mark;
                    if (menuNameEl) menuNameEl.textContent = normalizeText(nicknameEl.value) || account;
                });

                formEl.addEventListener('submit', function (event) {
                    event.preventDefault();
                    var nickname = normalizeText(nicknameEl.value);
                    var phone = normalizeText(phoneEl.value);
                    var email = normalizeText(emailEl.value);
                    var bio = String(bioEl.value || '').trim();

                    if (!isValidPhone(phone)) {
                        setStatus('手机号格式不正确，请输入 11 位手机号。', 'is-error');
                        return;
                    }

                    if (nickname.length > 20) {
                        setStatus('昵称最多 20 个字符。', 'is-error');
                        return;
                    }

                    var nextProfile = {
                        nickname: nickname,
                        phone: phone,
                        email: email,
                        bio: bio,
                        updatedAt: Date.now()
                    };

                    var nextStore = readProfileStore();
                    nextStore[account] = nextProfile;
                    writeProfileStore(nextStore);
                    applyProfile(nextProfile);
                    setStatus('用户信息已保存。', 'is-success');
                });

                resetBtn.addEventListener('click', function () {
                    var latestStore = readProfileStore();
                    applyProfile(latestStore[account] || {});
                    setStatus('已恢复到最近保存的信息。');
                });

                logoutBtn.addEventListener('click', function () {
                    if (!window.PlannerAuth || typeof window.PlannerAuth.logout !== 'function') return;
                    var shouldLogout = window.confirm('确认退出登录吗？');
                    if (!shouldLogout) return;
                    window.PlannerAuth.logout();
                });
            });
        })();
    </script>
    <script src="no-multiline.js"></script>
</body>
</html>
