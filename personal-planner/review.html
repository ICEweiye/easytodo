    <script>
        function plannerScopedKey(logicalKey) {
            if (window.PlannerAuth && typeof PlannerAuth.scopedStorageKey === 'function') {
                return PlannerAuth.scopedStorageKey(logicalKey);
            }
            return logicalKey;
        }
        const StorageUtil = {
            get(logicalKey) {
                const raw = localStorage.getItem(plannerScopedKey(logicalKey));
                if (!raw) return null;
                try {
                    var parsed = JSON.parse(raw);
                    if (window.Utf8Utils && typeof window.Utf8Utils.ensureValidUtf8 === 'function' &&
                        (logicalKey === 'reviews' || logicalKey === 'planner_review_entries' || logicalKey === 'planner_review_archive_entries')) {
                        return window.Utf8Utils.ensureValidUtf8(parsed);
                    }
                    return parsed;
                } catch (err) {
                    console.error('读取本地数据失败:', logicalKey, err);
                    return null;
                }
            },
            set(logicalKey, value) {
                localStorage.setItem(plannerScopedKey(logicalKey), JSON.stringify(value));
            }
        };

        const REVIEW_STORAGE_KEY = 'planner_review_entries';
        const REVIEW_ARCHIVE_STORAGE_KEY = 'planner_review_archive_entries';
        const LEGACY_REVIEW_KEY = 'reviews';
        const TODO_STORAGE_KEY = 'planner_todos';
        const OKR_STORAGE_KEY = 'planner_okrs';
        const REVIEW_RECENT_LIMIT = 8;
        const REVIEW_OKR_COLOR_CLASSES = ['brown', 'apricot', 'sage', 'pink', 'indigo', 'teal', 'coral', 'amber'];
        const KISS_FIELDS = [
            { key: 'keep', label: '保持', className: 'keep', icon: '✅' },
            { key: 'improve', label: '改进', className: 'improve', icon: '⚠️' },
            { key: 'stop', label: '停止', className: 'stop', icon: '🚫' },
            { key: 'start', label: '行动', className: 'start', icon: '💪' }
        ];
        const KISS_TABS = [
            ...KISS_FIELDS
        ];
        const REVIEW_CATEGORY_OPTIONS = ['life', 'work', 'study', 'important'];
        const REVIEW_CATEGORY_META = {
            life: { key: 'life', label: '生活', className: 'category-life' },
            work: { key: 'work', label: '工作', className: 'category-work' },
            study: { key: 'study', label: '学习', className: 'category-study' },
            important: { key: 'important', label: '重要', className: 'category-important' }
        };
        const REVIEW_EMOTION_GROUPS = [
            {
                valence: '消极',
                arousal: '高',
                emotions: ['愤怒', '恐惧', '痛恨', '慌乱', '羞耻', '害羞', '厌恶', '焦虑', '内疚', '害怕', '委屈', '嫉妒', '后悔', '紧张', '烦躁', '鄙视', '尴尬', '不舍']
            },
            {
                valence: '积极',
                arousal: '高',
                emotions: ['激动', '爱慕', '兴奋', '好奇', '喜悦', '骄傲', '活力', '愉悦', '期待', '崇拜', '惊讶', '羡慕']
            },
            {
                valence: '消极',
                arousal: '低',
                emotions: ['悲伤', '低落', '无助', '麻木', '挫败', '失望', '沮丧', '孤独', '耗竭', '无聊', '无奈', '疑惑', '迷茫', '疲惫', '遗憾', '惋惜']
            },
            {
                valence: '积极',
                arousal: '低',
                emotions: ['安心', '同情', '欣慰', '感动', '怀念', '满足', '欣赏', '信任', '幸福', '感恩', '平静', '悠闲', '放松']
            }
        ];
        const REVIEW_EMOTION_INTENSITY_OPTIONS = ['很高', '高', '中', '低', '很低'];
        const REVIEW_MAX_EMOTION_TAGS = 3;

        let reviewEntries = [];
        let reviewArchiveEntries = [];
        let editingReviewId = null;
        let currentKissTab = 'keep';
        let reviewLinkedTodoIds = [];
        let reviewEmotionEditingSlot = 0;
        let pendingFocusReviewId = '';
        let heatmapScaleRaf = null;
        const HEATMAP_NARROW_BREAKPOINT = 920;

        function generateId() {
            return `${Date.now()}_${Math.random().toString(36).slice(2, 9)}`;
        }

        function todayKey() {
            const now = new Date();
            const y = now.getFullYear();
            const m = `${now.getMonth() + 1}`.padStart(2, '0');
            const d = `${now.getDate()}`.padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function toDateKey(value) {
            if (!value) return todayKey();
            if (/^\d{4}-\d{2}-\d{2}$/.test(value)) return value;
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return todayKey();
            const y = date.getFullYear();
            const m = `${date.getMonth() + 1}`.padStart(2, '0');
            const d = `${date.getDate()}`.padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function nextDayKey(baseDate = '') {
            const normalized = toDateKey(baseDate || todayKey());
            const parts = normalized.split('-').map(part => Number(part));
            if (parts.length !== 3 || parts.some(part => !Number.isInteger(part))) {
                return todayKey();
            }
            const date = new Date(parts[0], parts[1] - 1, parts[2]);
            date.setDate(date.getDate() + 1);
            const y = date.getFullYear();
            const m = `${date.getMonth() + 1}`.padStart(2, '0');
            const d = `${date.getDate()}`.padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function normalizeReviewCategory(value) {
            const key = String(value || '').trim();
            return REVIEW_CATEGORY_OPTIONS.includes(key) ? key : 'work';
        }

        function getReviewCategoryMeta(value) {
            const key = normalizeReviewCategory(value);
            return REVIEW_CATEGORY_META[key] || REVIEW_CATEGORY_META.work;
        }

        function syncReviewCategorySelectStyle() {
            const select = document.getElementById('reviewCategory');
            if (!select) return;

            const key = normalizeReviewCategory(select.value);
            select.value = key;
            select.classList.remove('category-life', 'category-work', 'category-study', 'category-important');
            select.classList.add(`category-${key}`);
        }

        function normalizeEmotionArousal(value) {
            const text = String(value || '').trim();
            return text === '高' || text === '低' ? text : '';
        }

        function normalizeEmotionValence(value) {
            const text = String(value || '').trim();
            return text === '积极' || text === '消极' ? text : '';
        }

        function normalizeEmotionIntensity(value) {
            const text = String(value || '').trim();
            return REVIEW_EMOTION_INTENSITY_OPTIONS.includes(text) ? text : '';
        }

        function splitEmotionText(value) {
            return String(value || '')
                .replace(/[“”"'`]/g, '')
                .split(/[、，,\/]/)
                .map(item => item.trim())
                .filter(Boolean);
        }

        function getEmotionGroupByMood(mood) {
            const text = String(mood || '').trim();
            if (!text) return null;
            return REVIEW_EMOTION_GROUPS.find(group => group.emotions.includes(text)) || null;
        }

        function resolveEmotionMeta(mood, arousal = '', valence = '') {
            const normalizedArousal = normalizeEmotionArousal(arousal);
            const normalizedValence = normalizeEmotionValence(valence);
            if (normalizedArousal && normalizedValence) {
                return { arousal: normalizedArousal, valence: normalizedValence };
            }

            const presetGroup = getEmotionGroupByMood(mood);
            if (presetGroup) {
                return { arousal: presetGroup.arousal, valence: presetGroup.valence };
            }

            return {
                arousal: normalizedArousal || '低',
                valence: normalizedValence || '积极'
            };
        }

        function getReviewEmotionDefaultIntensity() {
            const intensitySelect = document.getElementById('reviewEnergy');
            return normalizeEmotionIntensity(intensitySelect?.value) || '中';
        }

        function normalizeEmotionTag(tag, fallbackIntensity = '中') {
            const mood = String(tag?.mood || '').trim();
            if (!mood) return null;
            const meta = resolveEmotionMeta(mood, tag?.arousal, tag?.valence);
            const intensity = normalizeEmotionIntensity(tag?.intensity || tag?.emotionIntensity || tag?.energy)
                || normalizeEmotionIntensity(fallbackIntensity)
                || '中';
            return {
                mood,
                arousal: meta.arousal,
                valence: meta.valence,
                intensity
            };
        }

        function normalizeEmotionTags(tags, fallbackMood = '平静', fallbackArousal = '', fallbackValence = '', fallbackIntensity = '中') {
            const normalized = [];
            const seen = new Set();
            const pushTag = (rawTag) => {
                const tag = normalizeEmotionTag(rawTag, fallbackIntensity);
                if (!tag) return;
                const key = `${tag.mood}__${tag.arousal}__${tag.valence}`;
                if (seen.has(key)) return;
                seen.add(key);
                normalized.push(tag);
            };

            if (Array.isArray(tags)) {
                tags.forEach(pushTag);
            }

            if (!normalized.length) {
                const moods = splitEmotionText(fallbackMood);
                moods.forEach(mood => pushTag({
                    mood,
                    arousal: fallbackArousal,
                    valence: fallbackValence,
                    intensity: fallbackIntensity
                }));
            }

            if (!normalized.length) {
                pushTag({
                    mood: '平静',
                    arousal: fallbackArousal || '低',
                    valence: fallbackValence || '积极',
                    intensity: fallbackIntensity
                });
            }

            if (normalized.length > REVIEW_MAX_EMOTION_TAGS) {
                normalized.splice(0, normalized.length - REVIEW_MAX_EMOTION_TAGS);
            }

            return normalized;
        }

        function getReviewEmotionTagsFromInput() {
            const tagsInput = document.getElementById('reviewEmotionTags');
            if (!tagsInput) return [];

            let parsedTags = [];
            const raw = String(tagsInput.value || '').trim();
            if (raw) {
                try {
                    const candidate = JSON.parse(raw);
                    if (Array.isArray(candidate)) {
                        parsedTags = candidate;
                    }
                } catch (err) {
                    parsedTags = [];
                }
            }

            const normalized = [];
            const seen = new Set();
            const fallbackIntensity = getReviewEmotionDefaultIntensity();
            parsedTags.forEach(rawTag => {
                const tag = normalizeEmotionTag(rawTag, fallbackIntensity);
                if (!tag) return;
                const key = `${tag.mood}__${tag.arousal}__${tag.valence}`;
                if (seen.has(key)) return;
                seen.add(key);
                normalized.push(tag);
            });

            if (normalized.length > REVIEW_MAX_EMOTION_TAGS) {
                normalized.splice(0, normalized.length - REVIEW_MAX_EMOTION_TAGS);
            }

            return normalized;
        }

        function clampReviewEmotionSlotIndex(index) {
            const idx = Number(index);
            if (!Number.isInteger(idx)) return 0;
            return Math.max(0, Math.min(REVIEW_MAX_EMOTION_TAGS - 1, idx));
        }

        function getReviewEmotionSlots() {
            const tags = getReviewEmotionTagsFromInput();
            const slots = Array.from({ length: REVIEW_MAX_EMOTION_TAGS }, () => null);
            tags.forEach((tag, index) => {
                if (index < REVIEW_MAX_EMOTION_TAGS) {
                    slots[index] = tag;
                }
            });
            return slots;
        }

        function resolveReviewEmotionEditableSlot(index) {
            const target = clampReviewEmotionSlotIndex(index);
            const slots = getReviewEmotionSlots();
            const firstEmpty = slots.findIndex(tag => !tag);
            if (firstEmpty === -1) return target;
            if (!slots[target] && target > firstEmpty) return firstEmpty;
            return target;
        }

        function renderReviewEmotionSlots() {
            const slots = getReviewEmotionSlots();
            const isEmotionModalOpen = !!document.getElementById('reviewEmotionModal')?.classList.contains('active');
            slots.forEach((tag, index) => {
                const slotEl = document.getElementById(`reviewEmotionSlot${index}`);
                if (!slotEl) return;

                slotEl.classList.toggle('is-active', isEmotionModalOpen && index === reviewEmotionEditingSlot);
                slotEl.classList.toggle('is-filled', !!tag);

                if (!tag) {
                    slotEl.style.background = '';
                    slotEl.style.borderColor = '';
                    slotEl.style.color = '';
                    slotEl.innerHTML = `<span class="review-emotion-slot-placeholder">选择情绪 ${index + 1}</span>`;
                    return;
                }

                const intensity = normalizeEmotionIntensity(tag.intensity) || '中';
                const palette = buildEmotionIntensityPalette(tag.arousal, tag.valence, intensity);
                slotEl.style.background = palette.background;
                slotEl.style.borderColor = palette.border;
                slotEl.style.color = palette.text;
                slotEl.innerHTML = `
                    <span class="review-emotion-slot-intensity">${escapeHtml(intensity)}</span>
                    <span class="review-emotion-slot-mood">${escapeHtml(tag.mood)}</span>
                `;
            });
        }

        function setReviewEmotionTags(tags, primaryTag = null) {
            const moodInput = document.getElementById('reviewMood');
            const tagsInput = document.getElementById('reviewEmotionTags');
            const arousalInput = document.getElementById('reviewEmotionArousal');
            const valenceInput = document.getElementById('reviewEmotionValence');
            const intensitySelect = document.getElementById('reviewEnergy');
            if (!moodInput || !tagsInput || !arousalInput || !valenceInput) return;

            const fallbackIntensity = getReviewEmotionDefaultIntensity();
            const forceEmpty = Array.isArray(tags) && tags.length === 0 && !primaryTag;
            if (forceEmpty) {
                moodInput.value = '';
                tagsInput.value = '[]';
                arousalInput.value = '低';
                valenceInput.value = '积极';
                if (intensitySelect) intensitySelect.value = fallbackIntensity;
                syncReviewEmotionIntensityStyle();
                renderReviewEmotionSlots();
                return;
            }

            const fallbackArousal = normalizeEmotionArousal(arousalInput.value) || '低';
            const fallbackValence = normalizeEmotionValence(valenceInput.value) || '积极';
            const normalized = [];
            const seen = new Set();
            if (Array.isArray(tags)) {
                tags.forEach(rawTag => {
                    const tag = normalizeEmotionTag(rawTag, fallbackIntensity);
                    if (!tag) return;
                    const key = `${tag.mood}__${tag.arousal}__${tag.valence}`;
                    if (seen.has(key)) return;
                    seen.add(key);
                    normalized.push(tag);
                });
            }
            if (!normalized.length) {
                normalized.push({
                    mood: '平静',
                    arousal: fallbackArousal,
                    valence: fallbackValence,
                    intensity: fallbackIntensity
                });
            }
            if (normalized.length > REVIEW_MAX_EMOTION_TAGS) {
                normalized.splice(0, normalized.length - REVIEW_MAX_EMOTION_TAGS);
            }

            const preferred = normalizeEmotionTag(primaryTag, fallbackIntensity);
            const primary = preferred || normalized[normalized.length - 1] || {
                mood: '平静',
                arousal: '低',
                valence: '积极',
                intensity: fallbackIntensity
            };

            moodInput.value = normalized.map(tag => tag.mood).join('、');
            tagsInput.value = JSON.stringify(normalized);
            arousalInput.value = primary.arousal;
            valenceInput.value = primary.valence;
            if (intensitySelect) intensitySelect.value = primary.intensity;
            syncReviewEmotionIntensityStyle();
            renderReviewEmotionSlots();
        }

        function getEmotionIntensityScale(value) {
            const intensity = normalizeEmotionIntensity(value) || '中';
            const scales = { 很高: 1, 高: 0.82, 中: 0.64, 低: 0.46, 很低: 0.28 };
            return scales[intensity] || scales.中;
        }

        function getEmotionIntensityPrefix(value) {
            const intensity = normalizeEmotionIntensity(value) || '中';
            const prefixes = {
                很高: '非常',
                高: '很',
                中: '',
                低: '一般',
                很低: '有些许'
            };
            return prefixes[intensity] || '';
        }

        function buildEmotionIntensityPalette(arousal, valence, intensity) {
            const scale = getEmotionIntensityScale(intensity);
            const key = `${valence}-${arousal}`;
            const toneMap = {
                '消极-高': { hue: 4, satBase: 22, satRange: 60, lightBase: 94, lightDrop: 26, text: '#7a2222' },
                '积极-高': { hue: 46, satBase: 28, satRange: 56, lightBase: 95, lightDrop: 24, text: '#5d4700' },
                '消极-低': { hue: 25, satBase: 2, satRange: 14, lightBase: 96, lightDrop: 18, text: '#4f4a45' },
                '积极-低': { hue: 132, satBase: 22, satRange: 52, lightBase: 95, lightDrop: 24, text: '#1f5d35' }
            };
            const tone = toneMap[key] || toneMap['积极-低'];

            const sat = Math.round(tone.satBase + tone.satRange * scale);
            const light = Math.round(tone.lightBase - tone.lightDrop * scale);
            const borderSat = key === '消极-低' ? sat + 2 : Math.min(90, sat + 10);
            const borderLight = Math.max(28, light - 14);

            return {
                background: `hsl(${tone.hue} ${sat}% ${light}%)`,
                border: `hsl(${tone.hue} ${borderSat}% ${borderLight}%)`,
                text: tone.text
            };
        }

        function syncReviewEmotionIntensityStyle() {
            const intensityInput = document.getElementById('reviewEnergy');
            const arousalInput = document.getElementById('reviewEmotionArousal');
            const valenceInput = document.getElementById('reviewEmotionValence');
            const intensityButtons = Array.from(document.querySelectorAll('#reviewEmotionIntensityInline .review-emotion-intensity-option'));
            if (!intensityInput || !arousalInput || !valenceInput) return;

            const intensity = normalizeEmotionIntensity(intensityInput.value) || '中';
            const arousal = normalizeEmotionArousal(arousalInput.value) || '低';
            const valence = normalizeEmotionValence(valenceInput.value) || '积极';
            const palette = buildEmotionIntensityPalette(arousal, valence, intensity);

            intensityInput.value = intensity;

            intensityButtons.forEach(button => {
                const value = normalizeEmotionIntensity(button.dataset.value);
                const isActive = value === intensity;
                button.classList.toggle('is-active', isActive);
                button.style.background = isActive ? palette.background : '';
                button.style.borderColor = isActive ? palette.border : '';
                button.style.color = isActive ? palette.text : '';
            });
        }

        function setReviewEmotionIntensity(value = '中') {
            const intensityInput = document.getElementById('reviewEnergy');
            if (!intensityInput) return;
            intensityInput.value = normalizeEmotionIntensity(value) || '中';
            syncReviewEmotionIntensityStyle();
        }

        function setReviewEmotionIntensityOption(value = '中') {
            setReviewEmotionIntensity(value);
            handleReviewEmotionIntensityChange();
        }

        function handleReviewEmotionIntensityChange() {
            const intensityInput = document.getElementById('reviewEnergy');
            if (!intensityInput) return;

            const intensity = normalizeEmotionIntensity(intensityInput.value) || '中';
            const slots = getReviewEmotionSlots();
            const targetIndex = clampReviewEmotionSlotIndex(reviewEmotionEditingSlot);
            if (!slots[targetIndex]) {
                setReviewEmotionIntensity(intensity);
                return;
            }

            slots[targetIndex] = { ...slots[targetIndex], intensity };
            const nextTags = slots.filter(Boolean);
            setReviewEmotionTags(nextTags, slots[targetIndex]);
            renderReviewEmotionPicker();
        }

        function renderReviewEmotionPicker() {
            const container = document.getElementById('reviewEmotionGroupList');
            if (!container) return;

            const slots = getReviewEmotionSlots();
            const activeTag = slots[clampReviewEmotionSlotIndex(reviewEmotionEditingSlot)];

            container.innerHTML = REVIEW_EMOTION_GROUPS.map(group => {
                const chipsHtml = group.emotions.map(emotion => {
                    const isActive = !!activeTag
                        && activeTag.mood === emotion
                        && activeTag.arousal === group.arousal
                        && activeTag.valence === group.valence;
                    return `
                        <button
                            type="button"
                            class="review-emotion-chip${isActive ? ' active' : ''}"
                            onclick="selectReviewEmotionPreset('${escapeJsString(emotion)}', '${group.arousal}', '${group.valence}')"
                        >${escapeHtml(emotion)}</button>
                    `;
                }).join('');

                return `
                    <section class="review-emotion-section">
                        <h4 class="review-emotion-section-title">偏${group.valence}、${group.arousal}唤醒的情绪</h4>
                        <div class="review-emotion-chip-grid">${chipsHtml}</div>
                    </section>
                `;
            }).join('');
        }

        function openReviewEmotionModal(slotIndex = 0) {
            reviewEmotionEditingSlot = resolveReviewEmotionEditableSlot(slotIndex);
            const slots = getReviewEmotionSlots();
            const targetTag = slots[reviewEmotionEditingSlot] || slots.filter(Boolean).slice(-1)[0] || {
                mood: '平静',
                arousal: '低',
                valence: '积极',
                intensity: getReviewEmotionDefaultIntensity()
            };
            const existingTags = slots.filter(Boolean);
            if (existingTags.length) {
                setReviewEmotionTags(existingTags, targetTag);
            } else {
                setReviewEmotionIntensity(targetTag.intensity || '中');
                renderReviewEmotionSlots();
            }

            const customInput = document.getElementById('reviewCustomEmotionInput');
            const customValence = document.getElementById('reviewCustomEmotionValence');
            const customArousal = document.getElementById('reviewCustomEmotionArousal');
            if (customInput) customInput.value = '';
            if (customValence) customValence.value = targetTag.valence;
            if (customArousal) customArousal.value = targetTag.arousal;
            setReviewEmotionIntensity(targetTag.intensity || '中');

            renderReviewEmotionSlots();
            renderReviewEmotionPicker();
            document.getElementById('reviewEmotionModal').classList.add('active');
        }

        function closeReviewEmotionModal() {
            document.getElementById('reviewEmotionModal').classList.remove('active');
            renderReviewEmotionSlots();
        }

        function selectReviewEmotionPreset(mood, arousal, valence) {
            const targetIndex = clampReviewEmotionSlotIndex(reviewEmotionEditingSlot);
            const slots = getReviewEmotionSlots();
            const intensity = getReviewEmotionDefaultIntensity();
            const currentTag = slots[targetIndex];
            const isToggleOff = !!currentTag
                && currentTag.mood === mood
                && currentTag.arousal === arousal
                && currentTag.valence === valence;

            if (isToggleOff) {
                slots[targetIndex] = null;
                const compactTags = slots.filter(Boolean);
                if (!compactTags.length) {
                    compactTags.push({ mood: '平静', arousal: '低', valence: '积极', intensity });
                }
                reviewEmotionEditingSlot = Math.min(targetIndex, compactTags.length - 1);
                const primary = compactTags[clampReviewEmotionSlotIndex(reviewEmotionEditingSlot)] || compactTags[compactTags.length - 1];
                setReviewEmotionTags(compactTags, primary);
                renderReviewEmotionPicker();
                return;
            }

            slots[targetIndex] = { mood, arousal, valence, intensity };
            const nextTags = slots.filter(Boolean);
            setReviewEmotionTags(nextTags, slots[targetIndex]);
            renderReviewEmotionPicker();
        }

        function applyCustomReviewEmotion() {
            const input = document.getElementById('reviewCustomEmotionInput');
            const valenceSelect = document.getElementById('reviewCustomEmotionValence');
            const arousalSelect = document.getElementById('reviewCustomEmotionArousal');
            if (!input || !valenceSelect || !arousalSelect) return;

            const mood = input.value.trim();
            if (!mood) {
                alert('请输入自定义情绪');
                input.focus();
                return;
            }

            const valence = normalizeEmotionValence(valenceSelect.value) || '积极';
            const arousal = normalizeEmotionArousal(arousalSelect.value) || '低';
            const targetIndex = clampReviewEmotionSlotIndex(reviewEmotionEditingSlot);
            const slots = getReviewEmotionSlots();
            const intensity = getReviewEmotionDefaultIntensity();
            slots[targetIndex] = { mood, arousal, valence, intensity };
            setReviewEmotionTags(slots.filter(Boolean), slots[targetIndex]);
            if (input) {
                input.value = '';
                input.focus();
            }
            renderReviewEmotionPicker();
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function multilineHtml(value) {
            return escapeHtml(value).replace(/\n/g, '<br>');
        }

        function previewText(value, maxLen = 52) {
            const text = String(value || '').replace(/\s+/g, ' ').trim();
            if (!text) return '';
            return text.length > maxLen ? `${text.slice(0, maxLen)}...` : text;
        }

        function normalizeInlineText(value) {
            return String(value || '').replace(/\s+/g, ' ').trim();
        }

        function isSameId(left, right) {
            if (left === undefined || left === null || right === undefined || right === null) return false;
            return String(left) === String(right);
        }

        function normalizeIdList(list) {
            if (!Array.isArray(list)) return [];
            const seen = new Set();
            const ids = [];
            list.forEach(item => {
                const id = String(item || '').trim();
                if (!id || seen.has(id)) return;
                seen.add(id);
                ids.push(id);
            });
            return ids;
        }

        function escapeJsString(value) {
            return String(value || '')
                .replace(/\\/g, '\\\\')
                .replace(/'/g, "\\'");
        }

        function getPendingFocusReviewIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const id = String(params.get('focusReviewId') || '').trim();
            return id;
        }

        function clearFocusReviewIdFromUrl() {
            const url = new URL(window.location.href);
            if (!url.searchParams.has('focusReviewId')) return;
            url.searchParams.delete('focusReviewId');
            const nextQuery = url.searchParams.toString();
            history.replaceState(null, '', `${url.pathname}${nextQuery ? `?${nextQuery}` : ''}`);
        }

        function tryFocusPendingReviewCard() {
            if (!pendingFocusReviewId) return;
            const cards = Array.from(document.querySelectorAll('.review-record-card'));
            const target = cards.find(card => card.dataset.reviewId === pendingFocusReviewId);
            if (!target) return;

            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            target.classList.add('review-record-focus');
            target.setAttribute('tabindex', '-1');
            target.focus({ preventScroll: true });
            setTimeout(() => {
                target.classList.remove('review-record-focus');
                target.removeAttribute('tabindex');
            }, 2200);

            pendingFocusReviewId = '';
            clearFocusReviewIdFromUrl();
        }

        function getStoredTodos() {
            const todos = StorageUtil.get(TODO_STORAGE_KEY);
            return Array.isArray(todos) ? todos : [];
        }

        function saveStoredTodos(todos) {
            StorageUtil.set(TODO_STORAGE_KEY, todos);
        }

        function getStoredOkrs() {
            const okrs = StorageUtil.get(OKR_STORAGE_KEY);
            return Array.isArray(okrs) ? okrs : [];
        }

        function getLinkedTodoIdsForEntry(entry) {
            const ids = normalizeIdList(entry?.startTodoIds);
            if (!entry?.id) return ids;
            getStoredTodos().forEach(todo => {
                if (isSameId(todo.reviewEntryId, entry.id)) {
                    ids.push(String(todo.id));
                }
            });
            return normalizeIdList(ids);
        }

        function getValidLinkedTodoIds(ids = reviewLinkedTodoIds) {
            const todoIds = new Set(getStoredTodos().map(todo => String(todo.id || '')));
            return normalizeIdList(ids).filter(id => todoIds.has(id));
        }

        function getTodoTitlesByIds(ids) {
            const todos = getStoredTodos();
            return normalizeIdList(ids).map(todoId => {
                const todo = todos.find(item => isSameId(item.id, todoId));
                return todo ? String(todo.title || '').trim() : '';
            }).filter(Boolean);
        }

        function syncTodoReviewLinks(reviewId, previousIds = [], nextIds = []) {
            const todos = getStoredTodos();
            if (!todos.length) return;

            const previousSet = new Set(normalizeIdList(previousIds));
            const nextSet = new Set(normalizeIdList(nextIds));
            let changed = false;

            todos.forEach(todo => {
                const todoId = String(todo.id || '');
                if (!todoId) return;

                if (previousSet.has(todoId) && !nextSet.has(todoId) && isSameId(todo.reviewEntryId, reviewId)) {
                    todo.reviewEntryId = '';
                    changed = true;
                }

                if (nextSet.has(todoId) && !isSameId(todo.reviewEntryId, reviewId)) {
                    todo.reviewEntryId = reviewId;
                    changed = true;
                }
            });

            if (changed) {
                saveStoredTodos(todos);
            }
        }

        function normalizeKrForSync(kr) {
            const targetNum = parseInt(kr.target, 10);
            const target = Number.isFinite(targetNum) && targetNum > 0 ? targetNum : 1;
            const currentNum = parseInt(kr.current, 10);
            const current = Number.isFinite(currentNum)
                ? Math.max(0, Math.min(target, currentNum))
                : (kr.completed ? target : 0);

            kr.target = target;
            kr.current = current;
            kr.completed = current >= target;
            return kr;
        }

        function maybeSyncTodoKrProgress(todo) {
            if (!todo || !todo.okrId || !todo.krId || todo.krProgressSynced || !todo.syncKrProgressOnComplete) return;

            const okrs = getStoredOkrs();
            const okr = okrs.find(item => isSameId(item.id, todo.okrId));
            if (!okr || !Array.isArray(okr.krs)) return;

            const kr = okr.krs.find(item => isSameId(item.id, todo.krId));
            if (!kr) return;

            normalizeKrForSync(kr);
            if (kr.current < kr.target) {
                kr.current += 1;
                kr.completed = kr.current >= kr.target;
            }

            todo.krProgressSynced = true;
            StorageUtil.set(OKR_STORAGE_KEY, okrs);
        }

        function updateReviewTodoModalSyncControl() {
            const checkbox = document.getElementById('reviewTodoModalSyncKrProgress');
            const krId = document.getElementById('reviewTodoModalKr')?.value || '';
            if (!checkbox) return;

            const hasKr = !!krId;
            checkbox.disabled = !hasKr;
            if (!hasKr) {
                checkbox.checked = false;
            }
        }

        function updateReviewTodoModalOkrOptions(selectedOkrId = '') {
            const container = document.getElementById('reviewTodoModalOkrOptions');
            if (!container) return;

            const optionsHtml = [
                `<div class="custom-select-option selected" data-value="" onclick="selectReviewTodoOkrOption('', '无关联', '')">无关联</div>`
            ];
            getStoredOkrs().forEach(okr => {
                optionsHtml.push(`
                    <div class="custom-select-option ${escapeHtml(okr.color || '')}"
                         data-value="${escapeHtml(okr.id)}"
                         onclick="selectReviewTodoOkrOption('${escapeJsString(okr.id)}', '${escapeJsString(okr.title || '未命名目标')}', '${escapeJsString(okr.color || '')}')">
                        ${escapeHtml(okr.title || '未命名目标')}
                    </div>
                `);
            });
            container.innerHTML = optionsHtml.join('');

            if (selectedOkrId) {
                const okr = getStoredOkrs().find(item => isSameId(item.id, selectedOkrId));
                if (okr) {
                    selectReviewTodoOkrOption(String(okr.id), okr.title || '未命名目标', okr.color || '');
                    return;
                }
            }
            selectReviewTodoOkrOption('', '无关联', '');
        }

        function updateReviewTodoModalKrOptions(okrId, selectedKrId = '') {
            const container = document.getElementById('reviewTodoModalKrOptions');
            const hiddenInput = document.getElementById('reviewTodoModalKr');
            const triggerText = document.querySelector('#reviewTodoModalKrSelect .custom-select-text');

        function normalizeEntry(entry) {
            const scoreNum = parseInt(entry.score, 10);
            const score = Number.isFinite(scoreNum) ? Math.max(1, Math.min(10, scoreNum)) : 7;
            const startTodoIds = normalizeIdList(entry.startTodoIds || entry.linkedTodoIds || []);
            const fallbackMood = String(entry.mood || '平静').trim() || '平静';
            const fallbackIntensity = normalizeEmotionIntensity(entry.emotionIntensity || entry.energy) || '中';
            const emotionTags = normalizeEmotionTags(
                entry.emotionTags,
                fallbackMood,
                entry.emotionArousal || entry.arousal,
                entry.emotionValence || entry.valence,
                fallbackIntensity
            );
            const primaryTag = emotionTags[emotionTags.length - 1] || {
                mood: '平静',
                arousal: '低',
                valence: '积极',
                intensity: fallbackIntensity
            };
            const primaryIntensity = normalizeEmotionIntensity(primaryTag.intensity) || fallbackIntensity;
            return {
                id: entry.id || generateId(),
                date: toDateKey(entry.date || entry.createdAt),
                score,
                category: normalizeReviewCategory(entry.category),
                tasks: String(entry.tasks || '').trim(),
                mood: emotionTags.map(tag => tag.mood).join('、'),
                energy: primaryIntensity,
                emotionIntensity: primaryIntensity,
                emotionTags,
                emotionArousal: primaryTag.arousal,
                emotionValence: primaryTag.valence,
                keep: String(entry.keep || '').trim(),
                improve: String(entry.improve || '').trim(),
                stop: String(entry.stop || '').trim(),
                start: String(entry.start || '').trim(),
                startTodoIds,
                summary: String(entry.summary || '').trim(),
                createdAt: entry.createdAt || new Date().toISOString(),
                updatedAt: entry.updatedAt || new Date().toISOString()
            };
        }

        function sortEntries(entries) {
            entries.sort((a, b) => {
                if (a.date !== b.date) return b.date.localeCompare(a.date);
                return String(b.createdAt || '').localeCompare(String(a.createdAt || ''));
            });
        }

        function dedupeEntriesById(entries) {
            const byId = new Map();
            (Array.isArray(entries) ? entries : []).forEach(entry => {
                if (!entry || entry.id === undefined || entry.id === null) return;
                const normalized = normalizeEntry(entry);
                const id = String(normalized.id);
                const previous = byId.get(id);
                if (!previous) {
                    byId.set(id, normalized);
                    return;
                }

                const prevDate = String(previous.date || '');
                const nextDate = String(normalized.date || '');
                const prevCreatedAt = String(previous.createdAt || '');
                const nextCreatedAt = String(normalized.createdAt || '');
                const shouldReplace = nextDate > prevDate
                    || (nextDate === prevDate && nextCreatedAt > prevCreatedAt);
                if (shouldReplace) byId.set(id, normalized);
            });

            const list = [...byId.values()];
            sortEntries(list);
            return list;
        }

        function enforceReviewRecentLimit() {
            reviewEntries = dedupeEntriesById(reviewEntries);
            reviewArchiveEntries = dedupeEntriesById(reviewArchiveEntries);

            const overflow = reviewEntries.slice(REVIEW_RECENT_LIMIT);
            reviewEntries = reviewEntries.slice(0, REVIEW_RECENT_LIMIT);

            if (overflow.length) {
                reviewArchiveEntries = dedupeEntriesById([...reviewArchiveEntries, ...overflow]);
            }

            const activeIds = new Set(reviewEntries.map(entry => String(entry.id)));
            reviewArchiveEntries = reviewArchiveEntries.filter(entry => !activeIds.has(String(entry.id)));
            sortEntries(reviewArchiveEntries);
        }

        function migrateLegacyReviews() {
            const legacy = StorageUtil.get(LEGACY_REVIEW_KEY);
            if (!legacy || typeof legacy !== 'object') return [];

            const migrated = [];
            ['week', 'month', 'quarter'].forEach(type => {
                const list = Array.isArray(legacy[type]) ? legacy[type] : [];
                list.forEach(item => {
                    migrated.push(normalizeEntry({
                        id: item.id || generateId(),
                        date: item.createdAt || todayKey(),
                        tasks: item.done || '',
                        mood: '平静',
                        energy: '中',
                        keep: item.good || '',
                        improve: item.improve || '',
                        stop: '',
                        start: item.plan || '',
                        summary: item.done || item.period || '',
                        score: 7,
                        createdAt: item.createdAt || new Date().toISOString(),
                        updatedAt: item.createdAt || new Date().toISOString()
                    }));
                });
            });

            sortEntries(migrated);
            if (migrated.length > 0) {
                StorageUtil.set(REVIEW_STORAGE_KEY, migrated);
            }
            return migrated;
        }

        function loadEntries() {
            const stored = StorageUtil.get(REVIEW_STORAGE_KEY);
            const archivedStored = StorageUtil.get(REVIEW_ARCHIVE_STORAGE_KEY);
            reviewArchiveEntries = Array.isArray(archivedStored)
                ? archivedStored.map(normalizeEntry)
                : [];
            if (Array.isArray(stored)) {
                reviewEntries = stored.map(normalizeEntry);
                enforceReviewRecentLimit();
                StorageUtil.set(REVIEW_STORAGE_KEY, reviewEntries);
                StorageUtil.set(REVIEW_ARCHIVE_STORAGE_KEY, reviewArchiveEntries);
                return;
            }
            reviewEntries = migrateLegacyReviews();
            enforceReviewRecentLimit();
            StorageUtil.set(REVIEW_STORAGE_KEY, reviewEntries);
            StorageUtil.set(REVIEW_ARCHIVE_STORAGE_KEY, reviewArchiveEntries);
        }

        function isHeatmapNarrowViewport() {
            return window.innerWidth <= HEATMAP_NARROW_BREAKPOINT;
        }

        function syncHeatmapScale() {
            const heatmap = document.getElementById('reviewHeatmap');
            const heatMeta = document.getElementById('reviewHeatMeta');
            const stage = document.querySelector('.review-heatmap-stage');
            const kissPanel = document.getElementById('kissPanel');
            const heatPanel = document.querySelector('.review-heat-panel');
            if (!heatmap || !stage || !kissPanel || !heatPanel) return;

            if (isHeatmapNarrowViewport()) {
                heatmap.style.setProperty('--heatmap-scale', '1');
                return;
            }

            const style = getComputedStyle(heatmap);
            const cellSize = Number.parseFloat(style.getPropertyValue('--heat-cell-size')) || 14;
            const gapSize = Number.parseFloat(style.getPropertyValue('--heat-gap-size')) || 6;
            const cols = Number.parseInt(style.getPropertyValue('--heat-cols'), 10) || 7;
            const rows = Number.parseInt(style.getPropertyValue('--heat-rows'), 10) || 6;

            const baseWidth = cols * cellSize + (cols - 1) * gapSize;
            const baseHeight = rows * cellSize + (rows - 1) * gapSize;
            const stageRect = stage.getBoundingClientRect();
            const kissRect = kissPanel.getBoundingClientRect();
            if (!stageRect.width || !kissRect.height || !baseWidth || !baseHeight) return;

            const panelStyles = getComputedStyle(heatPanel);
            const panelGap = Number.parseFloat(panelStyles.rowGap || panelStyles.gap) || 0;
            const metaHeight = heatMeta ? heatMeta.getBoundingClientRect().height : 0;
            const availableHeight = Math.max(0, kissRect.height - metaHeight - panelGap);
            if (!availableHeight) return;

            const scaleByHeight = availableHeight / baseHeight;
            const scaleByWidth = stageRect.width / baseWidth;
            const shrinkFactor = 0.88;
            const scale = Math.max(0.1, Math.min(scaleByHeight, scaleByWidth) * shrinkFactor);
            heatmap.style.setProperty('--heatmap-scale', scale.toFixed(4));
        }

        function renderHeatmap() {
            const container = document.getElementById('reviewHeatmap');
            const metaEl = document.getElementById('reviewHeatMeta');
            if (!container) return;

            const dayMap = {};
            reviewEntries.forEach(entry => {
                const key = toDateKey(entry.date);
                if (!dayMap[key]) {
                    dayMap[key] = { count: 0, scoreTotal: 0 };
                }
                dayMap[key].count += 1;
                dayMap[key].scoreTotal += Number.parseInt(entry.score, 10) || 0;
            });

            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const monthStart = new Date(year, month, 1);
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstWeekday = (monthStart.getDay() + 6) % 7;
            const monthPrefix = `${year}-${`${month + 1}`.padStart(2, '0')}`;
            const monthCount = reviewEntries.reduce((count, entry) => (
                String(entry.date || '').startsWith(monthPrefix) ? count + 1 : count
            ), 0);

            if (metaEl) {
                metaEl.textContent = `${year}年${month + 1}月复盘 ${monthCount} 次`;
            }

            const cells = [];
            for (let i = 0; i < 42; i += 1) {
                const day = i - firstWeekday + 1;
                const inMonth = day >= 1 && day <= daysInMonth;
                let toneKey = 'none';
                let title = '';

                if (inMonth) {
                    const key = toDateKey(new Date(year, month, day));
                    const stats = dayMap[key] || { count: 0, scoreTotal: 0 };
                    const count = stats.count || 0;
                    if (count > 0) {
                        const avgScore = stats.scoreTotal / count;
                        toneKey = getScoreToneKey(avgScore);
                        title = `${key} | ${count} 条复盘 | 均分 ${avgScore.toFixed(1)}`;
                    } else {
                        title = `${key} | 0 条复盘`;
                    }
                }

                const outside = inMonth ? '' : ' heat-outside';
                cells.push(`<span class="heat-cell heat-score-${toneKey}${outside}" title="${title}"></span>`);
            }

            container.innerHTML = cells.join('');
            scheduleHeatmapScale();
        }

        function sectionHtml(label, value) {

            return `
                <div class="review-section">
                    <strong>${label}</strong>
                    <p>${multilineHtml(value)}</p>
                </div>
            `;
        }

        function sectionPreviewHtml(label, value, maxLen = 48) {
            const text = normalizeInlineText(value);
            if (!text) return '';
            return `
                <div class="review-line">
                    <p><strong>${label}</strong> ${escapeHtml(text)}</p>
                </div>
            `;
        }

        function reviewEntryCombinedUserPlainText(entry) {
            return ['summary', 'keep', 'improve', 'stop', 'tasks']
                .map((k) => normalizeInlineText(entry[k]))
                .filter(Boolean)
                .join('\n');
        }

        function getScoreToneKey(score) {
            const scoreNum = Number.parseFloat(score);
            const value = Number.isFinite(scoreNum) ? Math.max(0, Math.min(10, scoreNum)) : 0;
            if (value <= 2) return 'deep-red';
            if (value <= 4) return 'red';
            if (value <= 6) return 'yellow';
            return 'green';
        }

        function getScoreToneClass(score) {
            return `score-tone-${getScoreToneKey(score)}`;
        }

        function getScoreCheerText(score) {
            const scoreNum = Number.parseFloat(score);
            const value = Number.isFinite(scoreNum) ? Math.max(0, Math.min(10, scoreNum)) : 0;
            if (value <= 2) return '先稳住，慢慢来';
            if (value <= 4) return '有进步，继续冲';
            if (value <= 6) return '状态回暖中';
            if (value <= 8) return '今天很不错';
            return '状态拉满';
        }

        function renderReviewList() {
            const container = document.getElementById('reviewList');
            if (!container) return;

            if (reviewEntries.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无复盘记录，点击上方 + 开始记录</div>';
                return;
            }

            container.innerHTML = reviewEntries.map(entry => {
                const safeEntryId = escapeJsString(entry.id);
                const safeEntryIdAttr = escapeHtml(String(entry.id || ''));
                const summaryHtml = sectionHtml('总结', entry.summary);
                const tasksPlain = normalizeInlineText(entry.tasks) || '';
                const todayTaskText = escapeHtml(tasksPlain || '今日事项');
                const combinedUser = reviewEntryCombinedUserPlainText(entry);
                const reviewBodyFold = window.PlannerBackup && typeof PlannerBackup.userReviewBodyFoldClass === 'function'
                    ? PlannerBackup.userReviewBodyFoldClass(combinedUser)
                    : '';
                const reviewCompactInnerClass = reviewBodyFold ? `review-compact-inner ${reviewBodyFold}` : 'review-compact-inner';
                const taskFold = window.PlannerBackup && typeof PlannerBackup.userContentFoldClass === 'function'
                    ? PlannerBackup.userContentFoldClass(tasksPlain)
                    : '';
                const todayTaskClass = taskFold ? `review-today-task-text ${taskFold}` : 'review-today-task-text';
                const scoreToneClass = getScoreToneClass(entry.score);
                const cheerText = escapeHtml(getScoreCheerText(entry.score));
                const intensity = normalizeEmotionIntensity(entry.emotionIntensity || entry.energy) || '中';
                const emotionTags = normalizeEmotionTags(
                    entry.emotionTags,
                    entry.mood || '平静',
                    entry.emotionArousal || entry.arousal,
                    entry.emotionValence || entry.valence,
                    intensity
                );
                const moodHtml = emotionTags.map(tag => {
                    const tagIntensity = normalizeEmotionIntensity(tag.intensity) || intensity;
                    const moodPalette = buildEmotionIntensityPalette(tag.arousal, tag.valence, tagIntensity);
                    const moodText = escapeHtml(`${getEmotionIntensityPrefix(tagIntensity)}${tag.mood}`);
                    return `<span class="review-today-mood-text" style="color:${moodPalette.border};">${moodText}</span>`;
                }).join('、');
                const kissHtml = [
                    sectionPreviewHtml('✅ 保持', entry.keep),
                    sectionPreviewHtml('⚠️ 改进', entry.improve),
                    sectionPreviewHtml('🚫 停止', entry.stop)
                ].filter(Boolean).join('');
                const dividerHtml = kissHtml ? '<div class="review-kiss-divider" aria-hidden="true"></div>' : '';
                const compactBodyHtml = reviewBodyFold
                    ? `<div class="review-compact-wrap">
                        <div class="${reviewCompactInnerClass}">
                        ${summaryHtml}
                        ${dividerHtml}
                        ${kissHtml}
                        </div>
                        <button type="button" class="review-card-expand-btn" aria-expanded="false" aria-label="展开或收起复盘正文" onclick="handleReviewCardExpandClick(this, event)"><span class="review-card-expand-label">展开</span><span class="review-card-expand-icon" aria-hidden="true">▼</span></button>
                    </div>`
                    : `<div class="${reviewCompactInnerClass}">
                        ${summaryHtml}
                        ${dividerHtml}
                        ${kissHtml}
                        </div>`;
                return `
                <article class="review-card review-record-card" data-review-id="${safeEntryIdAttr}" onclick="openReviewModal('${safeEntryId}')">
                    <div class="review-header">
                        <div class="review-header-main">
                            <span class="review-period">${entry.date}</span>
                            <div class="review-meta-row">
                                <span class="review-score-circle ${scoreToneClass}" title="评分 ${entry.score}/10">${entry.score}</span>
                                <span class="review-cheer-badge ${scoreToneClass}">${cheerText}</span>
                            </div>
                            <span class="review-today-note"><strong>今天</strong><span class="${todayTaskClass}">${todayTaskText}</span><strong>时</strong>${moodHtml}</span>
                        </div>
                        <button class="okr-delete" onclick="event.stopPropagation(); deleteReview('${safeEntryId}')" title="删除">&times;</button>
                    </div>
                    <div class="review-content review-content-compact">
                        ${compactBodyHtml}
                    </div>
                </article>
            `;
            }).join('');
        }

        function renderAll() {
            renderKissBoard();
            renderHeatmap();
            renderReviewList();
            scheduleHeatmapScale();
            tryFocusPendingReviewCard();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.getElementById('sidebar');

            pendingFocusReviewId = getPendingFocusReviewIdFromUrl();
            updateCurrentDate();
            loadEntries();
            renderAll();
            window.addEventListener('resize', scheduleHeatmapScale);
            document.getElementById('reviewDate').value = todayKey();
            document.getElementById('reviewCategory').value = 'work';
            syncReviewCategorySelectStyle();
            setReviewEmotionIntensity('中');
            setReviewEmotionTags([]);
            updateReviewTodoModalOkrOptions('');

            const reviewTodoModalTitleInput = document.getElementById('reviewTodoModalTitleInput');
            if (reviewTodoModalTitleInput) {
                reviewTodoModalTitleInput.addEventListener('keydown', (event) => {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        saveReviewTodoFromModal();
                    }
                });
            }

            const customEmotionInput = document.getElementById('reviewCustomEmotionInput');
            if (customEmotionInput) {
                customEmotionInput.addEventListener('keydown', (event) => {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        applyCustomReviewEmotion();
                    }
                });
            }

            const reviewEmotionModal = document.getElementById('reviewEmotionModal');
            if (reviewEmotionModal) {
                reviewEmotionModal.addEventListener('click', (event) => {
                    if (event.target === reviewEmotionModal) {
                        closeReviewEmotionModal();
                    }
                });
            }

            document.addEventListener('click', (event) => {
                const target = event.target;
                if (!(target instanceof Element)) return;
                if (target.closest('#reviewTodoModal .custom-select')) return;
                document.querySelectorAll('#reviewTodoModal .custom-select').forEach(node => node.classList.remove('open'));
            });
        });

        window.addEventListener('planner-storage-synced', () => {
            loadEntries();
            renderAll();
            updateReviewTodoModalOkrOptions(document.getElementById('reviewTodoModalOkr')?.value || '');
        });

        window.addEventListener('storage', (event) => {
            const key = event.key || '';
            const pref = window.PlannerAuth && PlannerAuth.getPlannerDataKeyPrefix && PlannerAuth.getPlannerDataKeyPrefix();
            if (pref) {
                if (key && key.indexOf(pref) !== 0) return;
            } else if (key && key !== 'reviews' && !key.startsWith('planner_')) {
                return;
            }
            loadEntries();
            renderAll();
            updateReviewTodoModalOkrOptions(document.getElementById('reviewTodoModalOkr')?.value || '');
        });

    </script>
    <script src="no-multiline.js"></script>
    <script>
        (() => {
            const mainContent = document.querySelector('.main-content');
            if (!mainContent) return;

            const updateBaselineShadow = () => {
                mainContent.classList.toggle('is-baseline-shadow-visible', mainContent.scrollTop > 2);
            };

            mainContent.addEventListener('scroll', updateBaselineShadow, { passive: true });
            requestAnimationFrame(updateBaselineShadow);
        })();
    </script>
</body>
</html>
