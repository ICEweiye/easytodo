<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 个人规划管理</title>
    <style>
        :root {
            --auth-bg-1: #f8f6f1;
            --auth-bg-2: #efe9dd;
            --auth-card: #ffffff;
            --auth-text: #2b2a28;
            --auth-muted: #6b6761;
            --auth-primary: #6b4f3a;
            --auth-primary-strong: #5a402d;
            --auth-border: #e7dfd2;
            --auth-danger: #b03737;
            --auth-success: #2f7d3e;
            --auth-form-gap: 14px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--auth-text);
            background:
                radial-gradient(1200px 700px at -15% -10%, #fef9ef 0%, transparent 55%),
                radial-gradient(900px 500px at 115% 0%, #efe3c7 0%, transparent 58%),
                linear-gradient(150deg, var(--auth-bg-1), var(--auth-bg-2));
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .auth-shell {
            width: 100%;
            max-width: 420px;
        }

        .auth-card {
            background: var(--auth-card);
            border: 1px solid var(--auth-border);
            border-radius: 18px;
            box-shadow: 0 18px 45px rgba(61, 47, 29, 0.1);
            padding: 28px;
        }

        .auth-form-logo-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 6px;
        }

        .auth-form-logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
            display: block;
        }

        h1 {
            margin: 0;
            font-size: 26px;
            letter-spacing: 0.02em;
        }

        .auth-subtitle {
            margin: 8px 0 18px;
            font-size: 14px;
            color: var(--auth-muted);
            line-height: 1.6;
        }

        .auth-form {
            display: grid;
            row-gap: var(--auth-form-gap);
        }

        .auth-form > * {
            margin: 0;
        }

        .field {
            display: grid;
            gap: 6px;
        }

        .field label {
            font-size: 13px;
            color: #4f4b45;
        }

        .field input {
            width: 100%;
            border: 1px solid #d8d0c3;
            border-radius: 10px;
            padding: 11px 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .field input:focus {
            border-color: #ad8a67;
            box-shadow: 0 0 0 3px rgba(173, 138, 103, 0.18);
        }

        .auth-submit {
            border: none;
            border-radius: 10px;
            background: var(--auth-primary);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            padding: 11px 14px;
            margin: 0;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .auth-submit:hover {
            background: var(--auth-primary-strong);
            transform: translateY(-1px);
        }

        .auth-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0;
            width: 100%;
            opacity: 0.75;
            font-size: 13px;
            color: var(--auth-muted);
        }

        .auth-option {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
        }

        .auth-option input {
            width: 14px;
            height: 14px;
            accent-color: var(--auth-primary);
        }

        .auth-hint,
        .auth-error,
        .auth-status {
            margin: 12px 0 0;
            font-size: 13px;
            line-height: 1.5;
        }

        .auth-hint {
            color: var(--auth-muted);
        }

        .auth-error {
            color: var(--auth-danger);
            display: none;
        }

        .auth-status {
            color: var(--auth-primary);
            display: none;
        }

        .auth-status.is-success {
            color: var(--auth-success);
        }

        .auth-switch {
            margin-top: 12px;
            font-size: 13px;
            color: var(--auth-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .auth-switch-btn {
            border: none;
            background: none;
            color: var(--auth-primary);
            font-size: 13px;
            padding: 0;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .auth-switch-btn:hover {
            color: var(--auth-primary-strong);
        }

        @media (max-width: 480px) {
            body {
                padding: 16px;
            }

            .auth-card {
                padding: 22px 18px;
            }

            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <main class="auth-shell" aria-label="登录注册页面">
        <section class="auth-card">
            <h1 id="authTitle"></h1>
            <p class="auth-subtitle" id="authSubtitle" style="display:none;"></p>

            <form id="authForm" class="auth-form" novalidate>
                <div class="auth-form-logo-wrap">
                    <img class="auth-form-logo" src="logo.svg" alt="Logo">
                </div>
                <div class="field">
                    <label for="authAccount">用户名 / 手机号</label>
                    <input id="authAccount" type="text" autocomplete="username" required>
                </div>

                <div class="field">
                    <label for="authPassword">密码</label>
                    <input id="authPassword" type="password" autocomplete="current-password" required>
                </div>

                <div class="field" id="authConfirmWrap" style="display:none;">
                    <label for="authPasswordConfirm">确认密码</label>
                    <input id="authPasswordConfirm" type="password" autocomplete="new-password">
                </div>

                <div class="auth-options" aria-label="登录选项">
                    <label class="auth-option" for="authRemember">
                        <input id="authRemember" type="checkbox">
                        <span>记住密码</span>
                    </label>
                    <label class="auth-option" for="authAutoLogin">
                        <input id="authAutoLogin" type="checkbox">
                        <span>自动登录</span>
                    </label>
                </div>

                <button id="authSubmit" class="auth-submit" type="submit">登录</button>
            </form>

            <p id="authHint" class="auth-hint"></p>
            <p id="authError" class="auth-error" role="alert"></p>
            <p id="authStatus" class="auth-status" aria-live="polite"></p>
            <div class="auth-switch">
                <span id="authSwitchLabel">没有账号？</span>
                <button id="authSwitchBtn" class="auth-switch-btn" type="button">去注册</button>
            </div>
        </section>
    </main>

    <script src="auth.js"></script>
</body>
</html>
