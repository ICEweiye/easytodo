        function saveFinanceHistoryRecord() {
            const weekInputEl = document.getElementById('historyWeekInput');
            const investmentInputEl = document.getElementById('historyInvestmentInput');
            const fixedExpenseInputEl = document.getElementById('historyFixedExpenseInput');
            const variableExpenseInputEl = document.getElementById('historyVariableExpenseInput');
            const salaryIncomeInputEl = document.getElementById('historySalaryIncomeInput');
            const otherIncomeInputEl = document.getElementById('historyOtherIncomeInput');
            const investmentReturnInputEl = document.getElementById('historyInvestmentReturnInput');
            if (!weekInputEl || !investmentInputEl || !fixedExpenseInputEl || !variableExpenseInputEl || !salaryIncomeInputEl || !otherIncomeInputEl || !investmentReturnInputEl) return;

            const weekKey = String(weekInputEl.value || '').trim();
            if (!/^\d{4}-W\d{2}$/.test(weekKey)) {
                alert('请选择有效周次');
                weekInputEl.focus();
                return;
            }

            const parseNonNegative = (raw) => {
                const parsed = parseFinancialAmount(raw, { allowNegative: false, allowBlank: false });
                return parsed.ok && !parsed.empty ? parsed.value : null;
            };
            const parseSigned = (raw) => {
                const parsed = parseFinancialAmount(raw, { allowNegative: true, allowBlank: true });
                if (!parsed.ok) return null;
                return parsed.empty ? 0 : parsed.value;
            };

            const fixedExpense = parseNonNegative(fixedExpenseInputEl.value);
            const variableExpense = parseNonNegative(variableExpenseInputEl.value);
            const salaryIncome = parseNonNegative(salaryIncomeInputEl.value);
            const otherIncome = parseNonNegative(otherIncomeInputEl.value);
            const investment = parseNonNegative(investmentInputEl.value);
            const investmentReturn = parseSigned(investmentReturnInputEl.value);
            if ([fixedExpense, variableExpense, salaryIncome, otherIncome, investment, investmentReturn].includes(null)) {
                alert('请输入有效金额（支出/收入/投资需大于等于 0，收益可正可负）');
                return;
            }

            const records = getWeeklyExpenseRecords();
            const index = records.findIndex(record => record.weekKey === weekKey);
            const oldRecord = index >= 0 ? records[index] : null;
            const expenseByCategory = sanitizeCategoryValues({
                fixed_expense: fixedExpense,
                variable_expense: variableExpense
            }, EXPENSE_CATEGORY_KEYS);
            const incomeByCategory = sanitizeCategoryValues({
                salary_income: salaryIncome,
                other_income: otherIncome
            }, INCOME_CATEGORY_KEYS);
            const expense = roundFinanceAmount(sumCategoryValues(expenseByCategory, EXPENSE_CATEGORY_KEYS));
            const income = roundFinanceAmount(sumCategoryValues(incomeByCategory, INCOME_CATEGORY_KEYS));
            const investmentValue = roundFinanceAmount(investment);
            const investmentReturnValue = roundFinanceAmount(investmentReturn);
            const weekDate = getDateFromWeekKey(weekKey) || new Date();

            const oldNet = roundFinanceAmount(
                (Number(oldRecord?.income) || 0) - (Number(oldRecord?.expense) || 0) - (Number(oldRecord?.investment) || 0)
            );
            const newNet = roundFinanceAmount(income - expense - investmentValue);
            applyNetBalanceDeltaToLiquidAssets(roundFinanceAmount(newNet - oldNet));

            if (index >= 0) {
                records[index] = {
                    ...records[index],
                    weekKey,
                    amount: expense,
                    expense,
                    expenseByCategory,
                    income,
                    incomeByCategory,
                    investment: investmentValue,
                    investmentReturn: investmentReturnValue
                };
            } else {
                records.push({
                    id: `${weekKey}-${weekDate.getTime()}`,
                    weekKey,
                    amount: expense,
                    expense,
                    expenseByCategory,
                    income,
                    incomeByCategory,
                    investment: investmentValue,
                    investmentReturn: investmentReturnValue,
                    createdAt: weekDate.toISOString()
                });
            }

            records.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
            localStorage.setItem(plannerStatsScopedKey('planner_weekly_expenses'), JSON.stringify(records));
            fillFinanceHistoryFormByWeek(weekKey);
            closeFinanceHistoryModal();
            renderExpenseStats();
        }

        function saveWeeklyExpense() {
            const expenseInputEl = document.getElementById('weeklyExpenseInput');
            const incomeInputEl = document.getElementById('weeklyIncomeInput');
            const investmentInputEl = document.getElementById('weeklyInvestmentInput');
            const investmentReturnInputEl = document.getElementById('weeklyInvestmentReturnInput');
            const expenseCategoryEl = document.getElementById('weeklyExpenseCategory');
            const incomeCategoryEl = document.getElementById('weeklyIncomeCategory');
            const selectedExpenseCategory = expenseCategoryEl && EXPENSE_CATEGORY_KEYS.includes(expenseCategoryEl.value)
                ? expenseCategoryEl.value
                : EXPENSE_CATEGORY_KEYS[0];
            const selectedIncomeCategory = incomeCategoryEl && INCOME_CATEGORY_KEYS.includes(incomeCategoryEl.value)
                ? incomeCategoryEl.value
                : INCOME_CATEGORY_KEYS[0];

            const expenseRaw = expenseInputEl.value.trim();
            const incomeRaw = incomeInputEl.value.trim();
            const investmentRaw = investmentInputEl.value.trim();
            const investmentReturnRaw = investmentReturnInputEl ? investmentReturnInputEl.value.trim() : '';

            const parseValue = raw => {
                const parsed = parseFinancialAmount(raw, { allowNegative: false, allowBlank: true });
                if (!parsed.ok) return null;
                return parsed.empty ? undefined : parsed.value;
            };

            const parseSignedValue = raw => {
                const parsed = parseFinancialAmount(raw, { allowNegative: true, allowBlank: true });
                if (!parsed.ok) return null;
                return parsed.empty ? undefined : parsed.value;
            };

            const expenseInput = parseValue(expenseRaw);
            const incomeInput = parseValue(incomeRaw);
            const investmentInput = parseValue(investmentRaw);
            const investmentReturnInput = parseSignedValue(investmentReturnRaw);

            if ([expenseInput, incomeInput, investmentInput, investmentReturnInput].includes(null)) {
                alert('请输入有效金额（支出/收入/投资需大于等于 0，收益可正可负）');
                return;
            }

            if (
                expenseInput === undefined &&
                incomeInput === undefined &&
                investmentInput === undefined &&
                investmentReturnInput === undefined
            ) {
                alert('请至少填写一项金额');
                return;
            }

            const now = getFinanceStatsViewDate();
            const weekKey = getWeekKey(now);
            const records = getWeeklyExpenseRecords();
            const index = records.findIndex(record => record.weekKey === weekKey);

            const current = index >= 0 ? records[index] : null;
            const expenseByCategory = sanitizeCategoryValues(current?.expenseByCategory, EXPENSE_CATEGORY_KEYS);
            const incomeByCategory = sanitizeCategoryValues(current?.incomeByCategory, INCOME_CATEGORY_KEYS);

            if (expenseInput !== undefined) {
                expenseByCategory[selectedExpenseCategory] = expenseInput;
            }
            if (incomeInput !== undefined) {
                incomeByCategory[selectedIncomeCategory] = incomeInput;
            }

            const expense = roundFinanceAmount(sumCategoryValues(expenseByCategory, EXPENSE_CATEGORY_KEYS));
            const income = roundFinanceAmount(sumCategoryValues(incomeByCategory, INCOME_CATEGORY_KEYS));
            const investment = roundFinanceAmount(investmentInput !== undefined ? investmentInput : (current?.investment || 0));
            const investmentReturn = roundFinanceAmount(investmentReturnInput !== undefined
                ? investmentReturnInput
                : (Number(current?.investmentReturn) || 0));

            const oldNet = roundFinanceAmount(
                (Number(current?.income) || 0) - (Number(current?.expense) || 0) - (Number(current?.investment) || 0)
            );
            const newNet = roundFinanceAmount(income - expense - investment);
            applyNetBalanceDeltaToLiquidAssets(roundFinanceAmount(newNet - oldNet));

            if (index >= 0) {
                records[index] = {
                    ...current,
                    amount: expense,
                    expense,
                    expenseByCategory,
                    income,
                    incomeByCategory,
                    investment,
                    investmentReturn,
                    createdAt: now.toISOString()
                };
            } else {
                records.push({
                    id: Date.now(),
                    weekKey,
                    amount: expense,
                    expense,
                    expenseByCategory,
                    income,
                    incomeByCategory,
                    investment,
                    investmentReturn,
                    createdAt: now.toISOString()
                });
            }

            records.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
            localStorage.setItem(plannerStatsScopedKey('planner_weekly_expenses'), JSON.stringify(records));
            expenseInputEl.value = '';
            incomeInputEl.value = '';
            investmentInputEl.value = '';
            if (investmentReturnInputEl) investmentReturnInputEl.value = '';
            renderExpenseStats();
        }

        function buildMonthOverlayChartHtml(buckets, chartWidth = 0) {
            const width = 720;
            const height = 186;
            const svgHeight = 186;
            const paddingLeft = 56;
            const paddingRight = 18;
            const paddingTop = 14;
            const paddingBottom = 34;
            const plotWidth = width - paddingLeft - paddingRight;
            const plotHeight = height - paddingTop - paddingBottom;
            const slotWidth = buckets.length > 0 ? plotWidth / buckets.length : 0;
            const scaleX = chartWidth > 0 ? chartWidth / width : 1;
            const scaleY = svgHeight / height;
            const labelPaddingLeft = (paddingLeft * scaleX).toFixed(2);
            const labelPaddingRight = (paddingRight * scaleX).toFixed(2);
            const pointRadius = 2.1;

            const seriesAccessor = {
                expense: item => Number(item.expense) || 0,
                income: item => Number(item.income) || 0,
                investment: item => Number(item.investment) || 0,
                investmentReturn: item => Number(item.investmentReturn) || 0,
                balance: item => (Number(item.income) || 0) - (Number(item.expense) || 0) - (Number(item.investment) || 0)
            };
            const activeSeries = getActiveMonthChartSeriesList();
            const barSeriesKeys = ['expense', 'income', 'investment'].filter(key => activeSeries.includes(key));
            const lineSeriesKeys = ['investmentReturn', 'balance'].filter(key => activeSeries.includes(key));
            const activeValues = activeSeries.flatMap(key => buckets.map(item => seriesAccessor[key](item)));
            const hasActiveValue = activeValues.some(value => Math.abs(Number(value) || 0) > 0.000001);
            const maxDataValue = hasActiveValue ? Math.max(...activeValues, 0) : 1;
            const minDataValue = hasActiveValue ? Math.min(...activeValues, 0) : 0;
            const valueRange = Math.max(maxDataValue - minDataValue, 1);
            const valueToY = value => paddingTop + ((maxDataValue - value) / valueRange) * plotHeight;
            const baselineY = valueToY(0);
            const tickCount = 5;
            const rawTicks = Array.from({ length: tickCount }, (_, idx) => maxDataValue - (valueRange * idx) / (tickCount - 1));
            if (minDataValue < 0 && maxDataValue > 0) {
                rawTicks.push(0);
            }
            const yTicks = [...new Set(rawTicks.map(value => Math.round(value * 100) / 100))].sort((a, b) => b - a);
            const formatAxisCurrency = value => {
                const rounded = roundFinanceAmount(value);
                const absText = formatAmountWithTwoDecimals(Math.abs(rounded));
                return rounded < 0 ? `-¥${absText}` : `¥${absText}`;
            };

            const makePoints = key => buckets.map((item, idx) => {
                const x = paddingLeft + slotWidth * (idx + 0.5);
                const value = seriesAccessor[key](item);
                const y = valueToY(value);
                return { x, y, value };
            });

            const linePointsMap = {};
            lineSeriesKeys.forEach(key => {
                linePointsMap[key] = makePoints(key);
            });

            const toLinePoints = points => points.map(point => `${point.x.toFixed(2)},${point.y.toFixed(2)}`).join(' ');
            const barGroupWidth = Math.max(16, Math.min(44, slotWidth * 0.72));
            const barGap = 2;
            const barCount = barSeriesKeys.length;
            const barWidth = barCount > 0
                ? Math.max(4, Math.min(16, (barGroupWidth - barGap * (barCount - 1)) / barCount))
                : 0;
            const barsTotalWidth = barCount > 0
                ? (barWidth * barCount) + (barGap * (barCount - 1))
                : 0;

            const legendItems = [
                { key: 'all', label: '全部', iconClass: 'is-square is-all' },
                { key: 'expense', label: '支出', iconClass: 'is-square is-expense' },
                { key: 'income', label: '收入', iconClass: 'is-square is-income' },
                { key: 'investment', label: '投资', iconClass: 'is-square is-investment' },
                { key: 'investmentReturn', label: '收益', iconClass: 'is-dot is-return' },
                { key: 'balance', label: '结余', iconClass: 'is-dot is-balance' }
            ];
            const hiddenHint = activeSeries.length === 0
                ? '<div class="finance-month-legend-hint">已隐藏所有类别，点击任一标签可恢复显示。</div>'
                : '';

            return `
                <div class="expense-month-combined">
                    <div class="finance-month-legend">
                        ${legendItems.map(item => `
                            <button
                                type="button"
                                class="finance-month-legend-btn ${isMonthChartSeriesActive(item.key) ? 'is-active' : ''}"
                                onclick="toggleMonthChartSeries('${item.key}')"
                                aria-pressed="${isMonthChartSeriesActive(item.key) ? 'true' : 'false'}"
                            >
                                <span class="finance-month-legend-icon ${item.iconClass}"></span>
                                <span>${item.label}</span>
                            </button>
                        `).join('')}
                    </div>
                    ${hiddenHint}
                    <svg class="expense-month-svg" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
                        ${yTicks.map(value => {
                            const y = valueToY(value);
                            const isZero = Math.abs(value) < 0.000001;
                            return `
                                ${isZero ? '' : `<line class="expense-month-grid-line" x1="${paddingLeft}" y1="${y.toFixed(2)}" x2="${width - paddingRight}" y2="${y.toFixed(2)}"></line>`}
                                <text class="expense-month-axis-label" x="${paddingLeft - 8}" y="${y.toFixed(2)}">${formatAxisCurrency(value)}</text>
                            `;
                        }).join('')}
                        <line class="expense-month-baseline" x1="${paddingLeft}" y1="${baselineY}" x2="${width - paddingRight}" y2="${baselineY}"></line>
                        ${buckets.map((item, idx) => {
                            if (barCount === 0) return '';
                            const centerX = paddingLeft + slotWidth * (idx + 0.5);
                            const groupStartX = centerX - (barsTotalWidth / 2);
                            return barSeriesKeys.map((key, barIdx) => {
                                const value = seriesAccessor[key](item);
                                const valueY = valueToY(value);
                                const barY = value >= 0 ? valueY : baselineY;
                                const barHeight = Math.max(0.8, Math.abs(valueY - baselineY));
                                const x = groupStartX + barIdx * (barWidth + barGap);
                                const seriesLabel = key === 'expense'
                                    ? '支出'
                                    : key === 'income'
                                        ? '收入'
                                        : '投资';
                                const tooltip = `${item.label}${seriesLabel}: ${formatCurrency(value)} / 收益: ${formatCurrency(item.investmentReturn || 0)} / 结余: ${formatCurrency(seriesAccessor.balance(item))}`;
                                return `
                                    <rect class="expense-month-bar is-${key}" x="${x.toFixed(2)}" y="${barY.toFixed(2)}" width="${barWidth.toFixed(2)}" height="${barHeight.toFixed(2)}">
                                        <title>${tooltip}</title>
                                    </rect>
                                `;
                            }).join('');
                        }).join('')}
                        ${lineSeriesKeys.map(key => {
                            const linePoints = linePointsMap[key] || [];
                            const linePointAttr = toLinePoints(linePoints);
                            const lineClass = key === 'investmentReturn' ? 'is-return' : 'is-balance';
                            const metricLabel = key === 'investmentReturn' ? '收益' : '结余';
                            return `
                                ${linePointAttr ? `<polyline class="expense-month-line ${lineClass}" points="${linePointAttr}"></polyline>` : ''}
                                ${linePoints.map((point, idx) => `
                                    <circle class="expense-month-point ${lineClass}" cx="${point.x.toFixed(2)}" cy="${point.y.toFixed(2)}" r="${pointRadius.toFixed(2)}">
                                        <title>${buckets[idx].label}${metricLabel}: ${formatCurrency(point.value)}</title>
                                    </circle>
                                `).join('')}
                            `;
                        }).join('')}
                    </svg>
                    <div class="expense-month-labels" style="grid-template-columns: repeat(${buckets.length}, minmax(0, 1fr)); padding: 0 ${labelPaddingRight}px 0 ${labelPaddingLeft}px;">
                        ${buckets.map(item => `<div class="expense-month-label">${item.label}</div>`).join('')}
                    </div>
                </div>
            `;
        }

        function renderExpenseStats() {
            const now = getFinanceStatsViewDate();
            const records = getWeeklyExpenseRecords();
            const periodLabelEl = document.getElementById('financePeriodLabel');
            if (periodLabelEl) {
                periodLabelEl.textContent = expensePeriod === 'week'
                    ? `${now.getFullYear()}年第${getISOWeekInfo(now).week}周`
                    : `${now.getFullYear()}年${now.getMonth() + 1}月`;
            }
            const prevBtn = document.getElementById('financePeriodPrevBtn');
            const resetBtn = document.getElementById('financePeriodResetBtn');
            const nextBtn = document.getElementById('financePeriodNextBtn');
            const offset = expensePeriod === 'week' ? financeStatsWeekOffset : financeStatsMonthOffset;
            if (prevBtn) {
                prevBtn.textContent = expensePeriod === 'week' ? '上周' : '上月';
                prevBtn.setAttribute('title', expensePeriod === 'week' ? '切换到上一周' : '切换到上一月');
                prevBtn.setAttribute('aria-label', expensePeriod === 'week' ? '切换到上一周' : '切换到上一月');
            }
            if (nextBtn) {
                nextBtn.hidden = offset === 0;
                nextBtn.textContent = expensePeriod === 'week' ? '下周' : '下月';
                nextBtn.setAttribute('title', expensePeriod === 'week' ? '切换到下一周' : '切换到下一月');
                nextBtn.setAttribute('aria-label', expensePeriod === 'week' ? '切换到下一周' : '切换到下一月');
            }
            if (resetBtn) {
                resetBtn.hidden = offset === 0;
                resetBtn.textContent = expensePeriod === 'week' ? '本周' : '本月';
                resetBtn.setAttribute('title', expensePeriod === 'week' ? '回到本周数据' : '回到本月数据');
                resetBtn.setAttribute('aria-label', expensePeriod === 'week' ? '回到本周' : '回到本月');
            }
            const financeEntryEl = document.getElementById('financeEntry');
            const reconcileEntryEl = document.getElementById('reconcileEntry');
            const chartWrapEl = document.getElementById('expenseChartWrap');
            const chartEl = document.getElementById('expenseChart');
            const emptyEl = document.getElementById('expenseEmpty');

            if (financeEntryEl) {
                financeEntryEl.hidden = expensePeriod === 'month';
            }
            if (reconcileEntryEl) {
                reconcileEntryEl.hidden = expensePeriod !== 'month';
            }

            const monthBuckets = getMonthBuckets(records, now);
            let totalExpense, totalIncome, totalInvestment, totalInvestmentReturn, currentPeriodHasData;
            if (expensePeriod === 'week') {
                const summary = getCurrentWeekFinanceSummary(records, now);
                totalExpense = roundFinanceAmount(summary.expense);
                totalIncome = roundFinanceAmount(summary.income);
                totalInvestment = roundFinanceAmount(summary.investment);
                totalInvestmentReturn = roundFinanceAmount(summary.investmentReturn || 0);
                currentPeriodHasData = (summary.expense || 0) !== 0 || (summary.income || 0) !== 0 || (summary.investment || 0) !== 0 || (summary.investmentReturn || 0) !== 0;
            } else {
                const summary = getCurrentMonthFinanceSummary(records, now);
                totalExpense = roundFinanceAmount(summary.expenseWithAdjustment ?? summary.expense);
                totalIncome = roundFinanceAmount(summary.income);
                totalInvestment = roundFinanceAmount(summary.investment);
                totalInvestmentReturn = roundFinanceAmount(summary.investmentReturn || 0);
                const expAdj = summary.expenseWithAdjustment ?? summary.expense;
                currentPeriodHasData = (expAdj || 0) !== 0 || (summary.income || 0) !== 0 || (summary.investment || 0) !== 0 || (summary.investmentReturn || 0) !== 0;
            }
            const netBalance = roundFinanceAmount(totalIncome - totalExpense - totalInvestment);
            currentNetBalance = roundFinanceAmount(netBalance);
            currentInvestmentReturnTotal = roundFinanceAmount(totalInvestmentReturn);

            const breakdown = getExpenseIncomeCategoryBreakdown(records, now);
            document.getElementById('expenseTotal').textContent = formatFinanceDisplay(totalExpense);
            document.getElementById('incomeTotal').textContent = formatFinanceDisplay(totalIncome);
            const fixedExpEl = document.getElementById('fixedExpenseDisplay');
            const variableExpEl = document.getElementById('variableExpenseDisplay');
            const salaryIncEl = document.getElementById('salaryIncomeDisplay');
            const otherIncEl = document.getElementById('otherIncomeDisplay');
            const masked = !getFinanceDataVisible();
            const fmtCat = (val) => masked ? `¥${FINANCE_DATA_MASK}` : formatFinanceDisplay(val);
            if (fixedExpEl) fixedExpEl.textContent = fmtCat(breakdown.expenseByCategory.fixed_expense);
            if (variableExpEl) variableExpEl.textContent = fmtCat(breakdown.expenseByCategory.variable_expense);
            if (salaryIncEl) salaryIncEl.textContent = fmtCat(breakdown.incomeByCategory.salary_income);
            if (otherIncEl) otherIncEl.textContent = fmtCat(breakdown.incomeByCategory.other_income);
            document.getElementById('investmentTotal').textContent = formatFinanceDisplay(totalInvestment);
            setInvestmentReturnHint(totalInvestmentReturn, currentPeriodHasData);
            const netBalanceEl = document.getElementById('netBalance');
            netBalanceEl.textContent = formatFinanceDisplay(netBalance);
            netBalanceEl.classList.toggle('balance-positive', netBalance > 0);
            netBalanceEl.classList.toggle('balance-negative', netBalance < 0);
            renderFinanceTrends(records, now);
            renderTotalAssets();
            renderTotalLiabilities();
            renderReconcileEntry();

            if (expensePeriod === 'week') {
                chartWrapEl.classList.add('is-collapsed');
                emptyEl.classList.add('is-invisible');
                chartEl.innerHTML = '';
                return;
            }

            chartWrapEl.classList.remove('is-collapsed');
            const hasData = monthBuckets.some(item =>
                item.expense > 0 ||
                item.income > 0 ||
                item.investment > 0 ||
                (item.investmentReturn || 0) !== 0
            );
            emptyEl.classList.toggle('is-invisible', hasData);
            const chartWidth = chartEl.clientWidth || 0;
            chartEl.innerHTML = buildMonthOverlayChartHtml(monthBuckets, chartWidth);
        }

        function switchExpensePeriod(period) {
            const prevPeriod = expensePeriod;
            if (prevPeriod === period) return;
            expensePeriod = period;
            financeStatsWeekOffset = 0;
            financeStatsMonthOffset = 0;
            document.querySelectorAll('.finance-switch-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.period === period);
            });
            const switchEl = document.getElementById('financeSwitch');
            if (switchEl) {
                switchEl.classList.toggle('is-month', period === 'month');
            }
            renderExpenseStats();
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            updateDate();
            syncFinanceEyeButton();
            const switchEl = document.getElementById('financeSwitch');
            if (switchEl) {
                switchEl.classList.toggle('is-month', expensePeriod === 'month');
            }
            syncWeeklyCategoryIcons();
            renderTotalAssets();
            renderTotalLiabilities();
            initInvestmentReturnEditor();
            initBalanceCategoryEditors();
            initFinanceExpressionInputs();
            initReconcileEntry();
            initFinanceHistoryEditor();
            renderExpenseStats();
            document.addEventListener('keydown', event => {
                if (event.key !== 'Escape') return;
                const historyModalEl = document.getElementById('financeHistoryModal');
                if (historyModalEl && !historyModalEl.hidden) {
                    closeFinanceHistoryModal();
                    return;
                }
                const modalEl = document.getElementById('financeReportModal');
                if (!modalEl || modalEl.hidden) return;
                closeFinanceReportModal();
            });
        });

        window.addEventListener('planner-storage-synced', () => {
            renderTotalAssets();
            renderTotalLiabilities();
            renderExpenseStats();
        });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                renderExpenseStats();
            }
        });

        window.addEventListener('storage', (event) => {
            const pref = window.PlannerAuth && PlannerAuth.getPlannerDataKeyPrefix && PlannerAuth.getPlannerDataKeyPrefix();
            if (event.key && pref && event.key.indexOf(pref) !== 0) return;
            if (event.key && !pref && !event.key.startsWith('planner_')) return;
            renderTotalAssets();
            renderTotalLiabilities();
            renderExpenseStats();
        });

        // 侧边栏折叠功能
        function toggleSidebar() {
            return;
        }

        // 页面加载时恢复状态
        const sidebar = document.getElementById('sidebar');
    </script>

            grid-column: 1;
            grid-row: 1;
        }

        .finance-summary-grid-cell-empty {
            grid-column: 2;
            grid-row: 1;
            min-height: 0;
            pointer-events: none;
        }

        .finance-summary-grid .finance-summary-item.is-expense-card {
            grid-column: 1;
            grid-row: 2;
        }

        .finance-summary-grid .finance-summary-item.is-income-card {
            grid-column: 2;
            grid-row: 2;
        }

        .finance-summary-grid #investmentReturnCard {
            grid-column: 1;
            grid-row: 3;
        }

        .finance-summary-grid .finance-summary-item-net {
            grid-column: 2;
            grid-row: 3;
        }

        .finance-summary-item {
            background: var(--warm-gray-50);
            border-radius: var(--radius-md);
            padding: var(--spacing-sm) var(--spacing-md);
            display: grid;
            grid-template-columns: minmax(0, 1fr) 110px;
            align-items: center;
            gap: 14px;
        }

        .finance-summary-item:has(> :only-child) {
            grid-template-columns: 1fr;
        }

        .finance-summary-main {
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .finance-summary-left {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .finance-summary-icon {
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--warm-gray-500);
        }

        .finance-summary-icon svg {
            width: 100%;
            height: 100%;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .finance-summary-icon.is-expense {
            color: #c92a2a;
        }

        .finance-summary-icon.is-income {
            color: #2f9e44;
        }

        .finance-summary-icon.is-investment {
            color: #1c7ed6;
        }

        .finance-summary-icon.is-balance {
            color: #1f9ca8;
        }

        .finance-summary-icon.is-assets {
            color: #c8a74a;
        }

        .finance-summary-icon.is-liabilities {
            color: var(--warm-gray-600);
            width: 22px;
            height: 22px;
        }

        .finance-trends {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            white-space: nowrap;
            text-align: left;
            padding-right: 6px;
        }

        .finance-trend-line {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            font-size: 11px;
            color: var(--warm-gray-500);
            line-height: 1.2;
        }

        .finance-trend-label {
            display: inline-block;
            width: 4em;
            text-align: left;
        }

        .finance-trend-value {
            margin-left: 4px;
            font-weight: 600;
            color: var(--warm-gray-700);
        }

        .finance-trend-value.up {
            color: #2f9e44;
        }

        .finance-trend-value.down {
            color: #c92a2a;
        }

        .finance-trend-value.flat {
            color: var(--warm-gray-700);
        }

        .finance-trend-value.na {
            color: var(--warm-gray-400);
        }

        .finance-summary-label {
            color: var(--warm-gray-500);
            font-size: 12px;
            margin-bottom: 2px;
        }

        .finance-summary-value {
            font-size: 20px;
            font-weight: 600;
            color: var(--warm-gray-900);
        }

        .finance-summary-value.with-return {
            display: inline-flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }

        .finance-summary-sub-value {
            font-size: 12px;
            font-weight: 500;
            color: var(--warm-gray-500);
            line-height: 1.2;
        }

        .finance-summary-sub-prefix {
            font-weight: 500;
            flex-shrink: 0;
        }

        .finance-balance-input.investment-return {
            font-weight: 500;
        }

        .finance-asset-profile-nav-row {
            cursor: pointer;
        }

        .finance-asset-profile-nav-row:focus-visible {
            outline: 2px solid var(--primary-500, #228be6);
            outline-offset: 2px;
        }

        #investmentReturnInput:focus::placeholder {
            opacity: 0;
        }

        #investmentReturnInput:focus::-webkit-input-placeholder {
            opacity: 0;
        }

        #investmentReturnInput:focus::-moz-placeholder {
            opacity: 0;
        }

        .finance-summary-sub-value.up {
            color: #2f9e44;
        }

        .finance-summary-sub-value.down {
            color: #c92a2a;
        }

        .finance-summary-sub-value.flat {
            color: var(--warm-gray-600);
        }

        .finance-summary-sub-value.na {
            color: var(--warm-gray-400);
        }

        .finance-summary-value.income {
            color: #2f9e44;
        }

        .finance-summary-value.investment {
            color: #1c7ed6;
        }

        .finance-summary-value.expense {
            color: #c92a2a;
        }

        .finance-summary-value.balance-positive {
            color: #1f9ca8;
        }

        .finance-summary-value.balance-negative {
            color: #1f9ca8;
        }

        .finance-chart-wrap {
            border: 0;
            border-radius: 0;
            padding: 0;
            background: transparent;
            overflow-x: hidden;
            max-height: 340px;
            opacity: 1;
            transform-origin: top;
            transition: opacity 0.2s ease;
        }

        .finance-chart {
            min-height: 0;
            height: auto;
            overflow: hidden;
            max-width: 100%;
        }

        .finance-chart-wrap.is-collapsed {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            border-width: 0;
            opacity: 0;
            pointer-events: none;
        }

        .expense-month-combined {
            height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 8px;
            background: transparent;
            border-radius: 0;
            border: 0;
            padding: 0;
        }

        .expense-month-svg {
            width: 100%;
            height: 186px;
            display: block;
        }

        .expense-month-baseline {
            stroke: var(--warm-gray-200);
            stroke-width: 1;
        }

        .expense-month-grid-line {
            stroke: var(--warm-gray-100);
            stroke-width: 1;
        }

        .expense-month-axis-label {
            fill: var(--warm-gray-500);
            font-size: 10px;
            text-anchor: end;
            dominant-baseline: middle;
        }

        .expense-month-bar {
            fill-opacity: 0.8;
        }

        .expense-month-bar.is-expense {
            fill: #c92a2a;
        }

        .expense-month-bar.is-income {
            fill: #2f9e44;
        }

        .expense-month-bar.is-investment {
            fill: #1c7ed6;
        }

        .expense-month-area {
            fill: none;
        }

        .expense-month-line {
            fill: none;
            stroke-width: 1.6;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .expense-month-line.is-return {
            stroke: #c8a127;
        }

        .expense-month-line.is-balance {
            stroke: #1f9ca8;
        }

        .expense-month-point.is-return {
            fill: #c8a127;
        }

        .expense-month-point.is-balance {
            fill: #1f9ca8;
        }

        .finance-month-legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            align-items: center;
            min-height: 28px;
        }

        .finance-month-legend-btn {
            border: 0;
            background: transparent;
            border-radius: 0;
            padding: 0 2px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 12px;
            color: var(--warm-gray-600);
            cursor: pointer;
            transition: color 0.18s ease, opacity 0.18s ease;
            line-height: 1;
        }

        .finance-month-legend-btn:hover {
            color: var(--warm-gray-900);
        }

        .finance-month-legend-btn.is-active {
            color: var(--warm-gray-900);
            font-weight: 600;
        }

        .finance-month-legend-icon {
            display: inline-block;
            flex-shrink: 0;
            width: 9px;
            height: 9px;
        }

        .finance-month-legend-icon.is-square {
            border-radius: 2px;
        }

        .finance-month-legend-icon.is-dot {
            border-radius: 999px;
        }

        .finance-month-legend-icon.is-all {
            background: var(--warm-gray-400);
        }

        .finance-month-legend-icon.is-expense {
            background: #c92a2a;
        }

        .finance-month-legend-icon.is-income {
            background: #2f9e44;
        }

        .finance-month-legend-icon.is-investment {
            background: #1c7ed6;
        }

        .finance-month-legend-icon.is-return {
            background: #c8a127;
        }

        .finance-month-legend-icon.is-balance {
            background: #1f9ca8;
        }

        .finance-month-legend-hint {
            text-align: center;
            color: var(--warm-gray-500);
            font-size: 11px;
            line-height: 1.25;
        }

        .expense-month-labels {
            display: grid;
            gap: 0;
            width: 100%;
            box-sizing: border-box;
            margin-top: -18px;
        }

        .expense-month-label {
            text-align: center;
            font-size: 11px;
            color: var(--warm-gray-500);
            line-height: 1;
        }

        .finance-history-modal[hidden] {
            display: none;
        }

        .finance-history-modal {
            position: fixed;
            inset: 0;
            z-index: 1250;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .finance-history-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(61, 56, 52, 0.36);
            backdrop-filter: blur(2px);
        }

        .finance-history-dialog {
            position: relative;
            width: min(760px, 100%);
            max-height: calc(100vh - 32px);
            overflow-y: auto;
            background: #fff;
            border: 1px solid var(--warm-gray-200);
            border-radius: 16px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
            transform: translateY(8px);
            opacity: 0;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .finance-history-modal.is-open .finance-history-dialog {
            transform: translateY(0);
            opacity: 1;
        }

        .finance-history-modal-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 18px 12px;
            border-bottom: 1px solid var(--warm-gray-100);
            background: linear-gradient(180deg, var(--warm-gray-50) 0%, #fff 100%);
        }

        .finance-history-modal-title {
            margin: 0;
            font-size: 17px;
            line-height: 1.25;
            color: var(--warm-gray-900);
        }

        .finance-history-modal-subtitle {
            margin: 4px 0 0;
            font-size: 12px;
            color: var(--warm-gray-500);
        }

        .finance-history-close {
            border: 1px solid var(--warm-gray-200);
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: #fff;
            color: var(--warm-gray-600);
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
        }

        .finance-history-close:hover {
            border-color: var(--warm-gray-300);
            color: var(--warm-gray-900);
            background: var(--warm-gray-50);
        }

        .finance-history-modal-body {
            padding: 14px 18px 6px;
        }

        .finance-history-form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px 12px;
        }

        .finance-history-form-grid .form-group {
            margin-bottom: 0;
        }

        .finance-history-return-group {
            grid-column: 1 / -1;
        }

        .finance-history-modal-actions {
            padding: 12px 18px 16px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .finance-empty {
            color: var(--warm-gray-500);
            font-size: 13px;
            margin-top: 8px;
            min-height: 20px;
        }

        .finance-empty.is-invisible {
            visibility: hidden;
        }

        @media (max-width: 768px) {
            .finance-header-actions {
                width: 100%;
                justify-content: flex-start;
            }

            .finance-assets-row {
                grid-template-columns: 1fr;
            }

            .finance-summary-grid {
                grid-template-columns: 1fr;
            }

            .finance-summary-grid .finance-period-outside,
            .finance-summary-grid .finance-summary-grid-cell-empty,
            .finance-summary-grid .finance-summary-item.is-expense-card,
            .finance-summary-grid .finance-summary-item.is-income-card,
            .finance-summary-grid #investmentReturnCard,
            .finance-summary-grid .finance-summary-item-net {
                grid-column: 1;
                grid-row: auto;
            }

            .finance-summary-grid-cell-empty {
                display: none;
            }

            .finance-summary > .finance-summary-item {
                grid-template-columns: minmax(0, 1fr) 110px;
                align-items: center;
            }

            .finance-summary > .finance-summary-item:has(> :only-child) {
                grid-template-columns: 1fr;
            }

            .finance-summary > .finance-summary-item .finance-summary-left {
                width: auto;
                justify-content: flex-start;
            }

            .finance-summary > .finance-summary-item .finance-trends {
                align-items: flex-start;
            }

            .expense-entry-row {
                grid-template-columns: 1fr;
            }

            .finance-input-group {
                width: 100%;
            }

            .reconcile-entry-row {
                grid-template-columns: 1fr;
            }

            .expense-entry-row .form-input {
                max-width: 100%;
            }

            .expense-entry-row .btn,
            .reconcile-entry-row .btn {
                width: 100%;
            }

            .finance-balance-stack {
                align-items: baseline;
            }

            .finance-balance-subline {
                justify-content: center;
            }

            .finance-report-modal {
                padding: 12px;
            }

            .finance-report-dialog {
                max-height: calc(100vh - 24px);
            }

            .finance-report-body {
                padding: 14px;
            }

            .finance-report-kpis {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .finance-report-visuals {
                grid-template-columns: 1fr;
            }

            .finance-history-modal {
                padding: 12px;
            }

            .finance-history-dialog {
                max-height: calc(100vh - 24px);
            }

            .finance-history-modal-body {
                padding: 12px 14px 6px;
            }

            .finance-history-form-grid {
                grid-template-columns: 1fr;
            }

            .finance-history-modal-actions {
                padding: 10px 14px 14px;
                flex-direction: column;
            }

            .finance-history-modal-actions .btn {
                width: 100%;
            }
        }
    </style>
    <script src="no-multiline.js"></script>
</body>
</html>
