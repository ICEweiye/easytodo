            <div class="container home-dashboard">
                <!-- 周财务统计 -->
                <section class="module" id="financeModule">
                    <div class="module-header">
                        <h2 class="module-title">财务统计</h2>
                        <div class="finance-header-actions">
                            <div class="finance-switch" id="financeSwitch">
                                <span class="finance-switch-indicator" aria-hidden="true"></span>
                                <button class="finance-switch-btn active" data-period="week" onclick="switchExpensePeriod('week')">周度</button>
                                <button class="finance-switch-btn" data-period="month" onclick="switchExpensePeriod('month')">月度</button>
                            </div>
                            <button class="finance-report-btn" type="button" onclick="showFinanceReport()" aria-label="查看财报">财报</button>
                            <button class="finance-eye-btn" type="button" id="financeEyeBtn" onclick="toggleFinanceDataVisible()" aria-label="切换数据可见" title="数据可见">
                                <svg class="finance-eye-icon finance-eye-open" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                                <svg class="finance-eye-icon finance-eye-closed" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="expense-entry" id="financeEntry">
                        <div class="expense-entry-row">
                            <div class="finance-input-group finance-input-group-with-icon">
                                <input type="text" inputmode="decimal" class="form-input" id="weeklyExpenseInput" min="0" step="0.01" placeholder="本周支出金额">
                                <button
                                    type="button"
                                    class="finance-category-icon-btn"
                                    id="weeklyExpenseCategoryBtn"
                                    onclick="toggleWeeklyExpenseCategory()"
                                    aria-label="切换支出分类"
                                    title="可变支出"
                                >
                                    <span class="finance-category-icon-text" id="weeklyExpenseCategoryIcon">变</span>
                                </button>
                                <input type="hidden" id="weeklyExpenseCategory" value="variable_expense">
                            </div>
                            <div class="finance-input-group finance-input-group-with-icon">
                                <input type="text" inputmode="decimal" class="form-input" id="weeklyIncomeInput" min="0" step="0.01" placeholder="本周收入金额">
                                <button
                                    type="button"
                                    class="finance-category-icon-btn"
                                    id="weeklyIncomeCategoryBtn"
                                    onclick="toggleWeeklyIncomeCategory()"
                                    aria-label="切换收入分类"
                                    title="工资"
                                >
                                    <span class="finance-category-icon-text" id="weeklyIncomeCategoryIcon">工</span>
                                </button>
                                <input type="hidden" id="weeklyIncomeCategory" value="salary_income">
                            </div>
                            <input type="text" inputmode="decimal" class="form-input" id="weeklyInvestmentInput" min="0" step="0.01" placeholder="本周总投资">
                            <button class="btn btn-primary" type="button" onclick="saveWeeklyExpense()">记录</button>
                        </div>
                    </div>
                    <div class="expense-entry reconcile-entry" id="reconcileEntry" hidden>
                        <div class="reconcile-entry-row">
                            <input type="text" class="form-input reconcile-display" id="reconcileStatAmount" value="账面流动资产 ¥0" readonly>
                            <input type="text" inputmode="decimal" class="form-input" id="reconcileActualInput" step="0.01" placeholder="实际流动资产金额">
                            <input type="text" class="form-input reconcile-display" id="reconcileDiffAmount" value="校对差额 --" readonly>
                            <button class="btn btn-secondary" type="button" onclick="saveReconcileActual()">校对</button>
                            <button class="btn btn-secondary" type="button" onclick="clearReconcileForCurrentMonth()" aria-label="撤销当月校对">撤销</button>
                        </div>
                    </div>
                    <div class="finance-assets-row">
                        <div class="finance-summary-item finance-balance-item" id="totalAssetsCard">
                            <div class="finance-summary-left">
                                <span class="finance-summary-icon is-assets" aria-hidden="true">
                                    <svg viewBox="0 0 24 24">
                                        <circle cx="12" cy="12" r="8"></circle>
                                        <circle cx="12" cy="12" r="4.5"></circle>
                                        <path d="M10 10.5h4"></path>
                                        <path d="M10 13.5h4"></path>
                                    </svg>
                                </span>
                                <div class="finance-summary-main">
                                    <div class="finance-summary-label">总资产</div>
                                    <div class="finance-balance-main-value assets" id="totalAssetsDisplay">¥0</div>
                                </div>
                            </div>
                            <div class="finance-balance-category-values">
                                <div class="finance-balance-value-row finance-asset-profile-nav-row" role="button" tabindex="0" title="前往设置修改流动资产" onclick="confirmNavigateToProfileAssetEdit('cash_deposit')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();confirmNavigateToProfileAssetEdit('cash_deposit');}">
                                    <span class="finance-balance-amount-wrap">
                                        <span class="finance-balance-currency">¥</span>
                                        <span class="finance-balance-value-text assets" id="cashDepositDisplay">0</span>
                                    </span>
                                    <span class="finance-category-icon-badge" data-category="cash_deposit" title="流动资产">流</span>
                                </div>
                                <div class="finance-balance-value-row finance-asset-profile-nav-row" role="button" tabindex="0" title="前往设置修改实物资产" onclick="confirmNavigateToProfileAssetEdit('physical_asset')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();confirmNavigateToProfileAssetEdit('physical_asset');}">
                                    <span class="finance-balance-amount-wrap">
                                        <span class="finance-balance-currency">¥</span>
                                        <span class="finance-balance-value-text assets" id="physicalAssetDisplay">0</span>
                                    </span>
                                    <span class="finance-category-icon-badge" data-category="physical_asset" title="实物资产">实</span>
                                </div>
                            </div>
                        </div>
                        <div class="finance-summary-item finance-balance-item" id="totalLiabilitiesCard">
                            <div class="finance-summary-left">
                                <span class="finance-summary-icon is-liabilities" aria-hidden="true">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M4 7h16"></path>
                                        <path d="M6 11h12"></path>
                                        <path d="M8 15h8"></path>
                                        <rect x="3" y="4" width="18" height="16" rx="2"></rect>
                                    </svg>
                                </span>
                                <div class="finance-summary-main">
                                    <div class="finance-summary-label">总负债</div>
                                    <div class="finance-balance-main-value liabilities" id="totalLiabilitiesDisplay">¥0</div>
                                </div>
                            </div>
                            <div class="finance-balance-category-values">
                                <div class="finance-balance-value-row balance-editable-row" data-card="liabilities" data-category="short_term_liability" onclick="startBalanceCategoryEdit('short_term_liability','liabilities')">
                                    <span class="finance-balance-amount-wrap">
                                        <span class="finance-balance-currency">¥</span>
                                        <span class="finance-balance-value-text liabilities" id="shortTermLiabilityDisplay">0</span>
                                        <input type="text" inputmode="decimal" class="form-input finance-balance-input finance-balance-category-input" id="shortTermLiabilityInput" data-card="liabilities" data-category="short_term_liability" step="0.01" placeholder="0">
                                    </span>
                                    <span class="finance-category-icon-badge" data-category="short_term_liability" title="短期负债">短</span>
                                </div>
                                <div class="finance-balance-value-row balance-editable-row" data-card="liabilities" data-category="long_term_liability" onclick="startBalanceCategoryEdit('long_term_liability','liabilities')">
                                    <span class="finance-balance-amount-wrap">
                                        <span class="finance-balance-currency">¥</span>
                                        <span class="finance-balance-value-text liabilities" id="longTermLiabilityDisplay">0</span>
                                        <input type="text" inputmode="decimal" class="form-input finance-balance-input finance-balance-category-input" id="longTermLiabilityInput" data-card="liabilities" data-category="long_term_liability" step="0.01" placeholder="0">
                                    </span>
                                    <span class="finance-category-icon-badge" data-category="long_term_liability" title="长期负债">长</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="finance-summary finance-summary-grid">
                        <div class="finance-period-outside">
                            <span class="finance-period-row">
                                <span class="finance-period-label" id="financePeriodLabel" aria-hidden="true"></span>
                                <button type="button" class="finance-period-prev-btn" id="financePeriodPrevBtn" onclick="goFinanceStatsPreviousPeriod()">上周</button>
                                <button type="button" class="finance-period-reset-btn" id="financePeriodResetBtn" onclick="resetFinanceStatsPeriodOffset()" hidden>本周</button>
                                <button type="button" class="finance-period-next-btn" id="financePeriodNextBtn" onclick="goFinanceStatsNextPeriod()">下周</button>
                            </span>
                        </div>
                        <div class="finance-summary-grid-cell-empty" aria-hidden="true"></div>
                        <div class="finance-summary-item finance-balance-item is-expense-card">
                            <div class="finance-summary-left">
                                <span class="finance-summary-icon is-expense" aria-hidden="true">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M4 7h16"></path>
                                        <path d="M7 4v3"></path>
                                        <path d="M17 4v3"></path>
                                        <rect x="5" y="10" width="14" height="10" rx="1"></rect>
                                        <path d="M9 14h6"></path>
                                    </svg>
                                </span>
                                <div class="finance-summary-main">
                                    <div class="finance-summary-label">总支出</div>
                                    <div class="finance-balance-main-value expense" id="expenseTotal">¥0</div>
                                </div>
                            </div>
                            <div class="finance-balance-category-values">
                                <div class="finance-balance-value-row">
                                    <span class="finance-balance-value-text expense" id="fixedExpenseDisplay">¥0</span>
                                    <span class="finance-category-icon-badge" data-category="fixed_expense" title="固定支出">固</span>
                                </div>
                                <div class="finance-balance-value-row">
                                    <span class="finance-balance-value-text expense" id="variableExpenseDisplay">¥0</span>
                                    <span class="finance-category-icon-badge" data-category="variable_expense" title="可变支出">变</span>
                                </div>
                            </div>
                        </div>
                        <div class="finance-summary-item finance-balance-item is-income-card">
                            <div class="finance-summary-left">
                                <span class="finance-summary-icon is-income" aria-hidden="true">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M12 19V5"></path>
                                        <path d="M5 12l7-7 7 7"></path>
                                    </svg>
                                </span>
                                <div class="finance-summary-main">
                                    <div class="finance-summary-label">总收入</div>
                                    <div class="finance-balance-main-value income" id="incomeTotal">¥0</div>
                                </div>
                            </div>
                            <div class="finance-balance-category-values">
                                <div class="finance-balance-value-row">
                                    <span class="finance-balance-value-text income" id="salaryIncomeDisplay">¥0</span>
                                    <span class="finance-category-icon-badge" data-category="salary_income" title="工资收入">工</span>
                                </div>
                                <div class="finance-balance-value-row">
                                    <span class="finance-balance-value-text income" id="otherIncomeDisplay">¥0</span>
                                    <span class="finance-category-icon-badge" data-category="other_income" title="其他收入">其</span>
                                </div>
                            </div>
                        </div>
                        <div class="finance-summary-item" id="investmentReturnCard" onclick="startInvestmentReturnEdit()">
                            <div class="finance-summary-left">
                                <span class="finance-summary-icon is-investment" aria-hidden="true">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M4 16l5-5 4 4 7-7"></path>
                                        <path d="M14 8h6v6"></path>
                                    </svg>
                                </span>
                                <div class="finance-summary-main">
                                    <div class="finance-summary-label">总投资</div>
                                    <div class="finance-summary-value investment with-return">
                                        <span id="investmentTotal">¥0</span>
                                        <span class="finance-balance-subline finance-summary-sub-value na" id="investmentReturnWrap">
                                            <span class="finance-summary-sub-prefix">收益</span>
                                            <span class="finance-balance-amount-wrap">
                                                <span class="finance-balance-currency">¥</span>
                                                <input type="text" inputmode="decimal" class="form-input finance-balance-input investment-return" id="investmentReturnInput" step="0.01" placeholder="--">
                                            </span>
                                        </span>
                                    </div>
                                </div>
                            </div>
                            <div class="finance-trends">
                                <div class="finance-trend-line"><span class="finance-trend-label">月均增长</span><span class="finance-trend-value" id="investmentYoY">--</span></div>
                                <div class="finance-trend-line"><span class="finance-trend-label">收益率</span><span class="finance-trend-value" id="investmentMoM">--</span></div>
                            </div>
                        </div>
                        <div class="finance-summary-item finance-summary-item-net">
                            <div class="finance-summary-left">
                                <span class="finance-summary-icon is-balance" aria-hidden="true">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M12 3v14"></path>
                                        <path d="M7 6h10"></path>
                                        <path d="M5 6l-2 4h4l-2-4z"></path>
                                        <path d="M19 6l-2 4h4l-2-4z"></path>
                                        <path d="M8 17h8"></path>
                                    </svg>
                                </span>
                                <div class="finance-summary-main">
                                    <div class="finance-summary-label">净结余</div>
                                    <div class="finance-summary-value" id="netBalance">¥0</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="finance-chart-wrap is-collapsed" id="expenseChartWrap">
                        <div class="finance-chart" id="expenseChart"></div>
                        <div class="finance-empty is-invisible" id="expenseEmpty">暂无月度财务记录。</div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <div class="finance-report-modal" id="financeReportModal" hidden>
        <div class="finance-report-backdrop" onclick="closeFinanceReportModal()"></div>
        <div class="finance-report-dialog" role="dialog" aria-modal="true" aria-labelledby="financeReportTitle">
            <div class="finance-report-header">
                <div class="finance-report-title-wrap">
                    <h3 class="finance-report-title" id="financeReportTitle">财报</h3>
                    <p class="finance-report-subtitle" id="financeReportSubtitle"></p>
                </div>
                <button class="finance-report-close" type="button" onclick="closeFinanceReportModal()" aria-label="关闭财报">×</button>
            </div>
            <div class="finance-report-body">
                <div class="finance-report-kpis" id="financeReportKpis"></div>
                <div class="finance-report-visuals" id="financeReportVisuals"></div>
            </div>
        </div>
    </div>

    <div class="finance-history-modal" id="financeHistoryModal" hidden>
        <div class="finance-history-backdrop" onclick="closeFinanceHistoryModal()"></div>
        <div class="finance-history-dialog" role="dialog" aria-modal="true" aria-labelledby="financeHistoryTitle">
            <div class="finance-history-modal-header">
                <div>
                    <h3 class="finance-history-modal-title" id="financeHistoryTitle">修改历史财务记录</h3>
                    <p class="finance-history-modal-subtitle" id="financeHistorySubtitle"></p>
                </div>
                <button class="finance-history-close" type="button" onclick="closeFinanceHistoryModal()" aria-label="关闭历史记录编辑">×</button>
            </div>
            <div class="finance-history-modal-body">
                <div class="finance-history-form-grid">
                    <div class="form-group">
                        <label class="form-label" for="historyWeekInput">周次</label>
                        <input type="week" class="form-input" id="historyWeekInput">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="historyInvestmentInput">总投资</label>
                        <input type="text" inputmode="decimal" class="form-input" id="historyInvestmentInput" min="0" step="0.01" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="historyFixedExpenseInput">固定支出</label>
                        <input type="text" inputmode="decimal" class="form-input" id="historyFixedExpenseInput" min="0" step="0.01" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="historyVariableExpenseInput">可变支出</label>
                        <input type="text" inputmode="decimal" class="form-input" id="historyVariableExpenseInput" min="0" step="0.01" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="historySalaryIncomeInput">工资收入</label>
                        <input type="text" inputmode="decimal" class="form-input" id="historySalaryIncomeInput" min="0" step="0.01" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="historyOtherIncomeInput">其他收入</label>
                        <input type="text" inputmode="decimal" class="form-input" id="historyOtherIncomeInput" min="0" step="0.01" placeholder="0">
                    </div>
                    <div class="form-group finance-history-return-group">
                        <label class="form-label" for="historyInvestmentReturnInput">投资收益（可负数）</label>
                        <input type="text" inputmode="decimal" class="form-input" id="historyInvestmentReturnInput" step="0.01" placeholder="0">
                    </div>
                </div>
            </div>
            <div class="finance-history-modal-actions">
                <button class="btn btn-secondary" type="button" onclick="closeFinanceHistoryModal()">取消</button>
                <button class="btn btn-primary" type="button" onclick="saveFinanceHistoryRecord()">保存</button>
            </div>
        </div>
    </div>

    <script>
        let expensePeriod = 'week';
        /** 相对「本周」向过去偏移的周数，0 表示本周 */
        let financeStatsWeekOffset = 0;
        /** 相对「本月」向过去偏移的月数，0 表示本月 */
        let financeStatsMonthOffset = 0;
        let currentNetBalance = 0;
        let currentInvestmentReturnTotal = 0;
        const EXPENSE_CATEGORY_KEYS = ['fixed_expense', 'variable_expense'];
        const INCOME_CATEGORY_KEYS = ['salary_income', 'other_income'];
        const ASSET_CATEGORY_KEYS = ['cash_deposit', 'physical_asset'];
        const LIABILITY_CATEGORY_KEYS = ['short_term_liability', 'long_term_liability'];
        const MONTH_CHART_ALL_KEY = 'all';
        const MONTH_CHART_SERIES_KEYS = ['expense', 'income', 'investment', 'investmentReturn', 'balance'];
        let monthChartActiveSeries = new Set([MONTH_CHART_ALL_KEY]);
        const CATEGORY_ICON_META = {
            fixed_expense: { icon: '固', label: '固定支出' },
            variable_expense: { icon: '变', label: '可变支出' },
            salary_income: { icon: '工', label: '工资' },
            other_income: { icon: '其', label: '其他收入' },
            cash_deposit: { icon: '流', label: '流动资产' },
            physical_asset: { icon: '实', label: '实物资产' },
            short_term_liability: { icon: '短', label: '短期负债' },
            long_term_liability: { icon: '长', label: '长期负债' }
        };

        function getActiveMonthChartSeriesList() {
            if (monthChartActiveSeries.has(MONTH_CHART_ALL_KEY)) {
                return [...MONTH_CHART_SERIES_KEYS];
            }
            return MONTH_CHART_SERIES_KEYS.filter(key => monthChartActiveSeries.has(key));
        }

        function isMonthChartSeriesActive(key) {
            if (key === MONTH_CHART_ALL_KEY) {
                return monthChartActiveSeries.has(MONTH_CHART_ALL_KEY);
            }
            return monthChartActiveSeries.has(MONTH_CHART_ALL_KEY) || monthChartActiveSeries.has(key);
        }

        function toggleMonthChartSeries(key) {
            if (key === MONTH_CHART_ALL_KEY) {
                if (monthChartActiveSeries.has(MONTH_CHART_ALL_KEY)) {
                    monthChartActiveSeries = new Set();
                } else {
                    monthChartActiveSeries = new Set([MONTH_CHART_ALL_KEY]);
                }
                renderExpenseStats();
                return;
            }

            if (!MONTH_CHART_SERIES_KEYS.includes(key)) return;

            if (monthChartActiveSeries.has(MONTH_CHART_ALL_KEY)) {
                monthChartActiveSeries = new Set([key]);
                renderExpenseStats();
                return;
            }

            if (monthChartActiveSeries.has(key)) {
                monthChartActiveSeries.delete(key);
            } else {
                monthChartActiveSeries.add(key);
            }
            renderExpenseStats();
        }

        function sanitizeCategoryValues(raw, allowedKeys) {
            const result = {};
            const source = raw && typeof raw === 'object' && !Array.isArray(raw) ? raw : {};
            allowedKeys.forEach(key => {
                const value = Number(source[key]);
                result[key] = Number.isFinite(value) && value >= 0 ? roundFinanceAmount(value) : 0;
            });
            return result;
        }

        function sumCategoryValues(values, keys) {
            return roundFinanceAmount(keys.reduce((sum, key) => sum + (Number(values[key]) || 0), 0));
        }

        function resolveSelectedCategory(selectId, allowedKeys) {
            const selectEl = document.getElementById(selectId);
            const value = selectEl ? String(selectEl.value || '') : '';
            return allowedKeys.includes(value) ? value : allowedKeys[0];
        }

        function applyCategoryIcon(inputId, btnId, iconId, allowedKeys) {
            const inputEl = document.getElementById(inputId);
            const btnEl = document.getElementById(btnId);
            const iconEl = document.getElementById(iconId);
            if (!inputEl || !btnEl || !iconEl || allowedKeys.length === 0) return;

            let value = String(inputEl.value || '');
            if (!allowedKeys.includes(value)) {
                value = allowedKeys[0];
                inputEl.value = value;
            }

            const meta = CATEGORY_ICON_META[value] || { icon: '?', label: '分类' };
            iconEl.textContent = meta.icon;
            btnEl.title = meta.label;
            btnEl.setAttribute('aria-label', `切换分类，当前${meta.label}`);
            btnEl.dataset.category = value;
        }

        function rotateCategory(inputId, allowedKeys) {
            const inputEl = document.getElementById(inputId);
            if (!inputEl || allowedKeys.length === 0) return;
            const current = String(inputEl.value || '');
            const currentIndex = allowedKeys.indexOf(current);
            const nextIndex = currentIndex >= 0 ? (currentIndex + 1) % allowedKeys.length : 0;
            inputEl.value = allowedKeys[nextIndex];
        }

        function syncWeeklyCategoryIcons() {
            applyCategoryIcon('weeklyExpenseCategory', 'weeklyExpenseCategoryBtn', 'weeklyExpenseCategoryIcon', EXPENSE_CATEGORY_KEYS);
            applyCategoryIcon('weeklyIncomeCategory', 'weeklyIncomeCategoryBtn', 'weeklyIncomeCategoryIcon', INCOME_CATEGORY_KEYS);
        }

        function toggleWeeklyExpenseCategory() {
            rotateCategory('weeklyExpenseCategory', EXPENSE_CATEGORY_KEYS);
            syncWeeklyCategoryIcons();
        }

        function toggleWeeklyIncomeCategory() {
            rotateCategory('weeklyIncomeCategory', INCOME_CATEGORY_KEYS);
            syncWeeklyCategoryIcons();
        }


        // 更新日期
        function updateDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            const dateEl = document.getElementById('currentDate');
            if (!dateEl) return;
            dateEl.textContent = now.toLocaleDateString('zh-CN', options);
        }

        function roundFinanceAmount(value) {
            const amount = Number(value);
            if (!Number.isFinite(amount)) return 0;
            const rounded = Math.round((amount + Number.EPSILON) * 100) / 100;
            return Math.abs(rounded) < 0.000000000001 ? 0 : rounded;
        }

        function formatAmountWithTwoDecimals(value) {
            return roundFinanceAmount(value).toLocaleString('zh-CN', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        function formatCurrency(num) {
            const rounded = roundFinanceAmount(num);
            const absText = formatAmountWithTwoDecimals(Math.abs(rounded));
            return rounded < 0 ? `-¥${absText}` : `¥${absText}`;
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatDateText(value) {
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '--';
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function formatWeekLabel(weekKey) {
            const matched = /^(\d{4})-W(\d{1,2})$/.exec(String(weekKey || ''));
            if (!matched) return String(weekKey || '--');
            const year = matched[1];
            const week = Number(matched[2]);
            return `${year} 第${Number.isFinite(week) ? week : matched[2]}周`;
        }

        function getCurrentMonthKey(date = new Date()) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
        }

        function plannerStatsScopedKey(logicalKey) {
            if (window.PlannerAuth && typeof PlannerAuth.scopedStorageKey === 'function') {
                return PlannerAuth.scopedStorageKey(logicalKey);
            }
            return logicalKey;
        }

        const FINANCE_DATA_MASK = '***';
        function getFinanceDataVisible() {
            const v = localStorage.getItem(plannerStatsScopedKey('planner_finance_data_visible'));
            if (v === '0' || v === 'false') return false;
            return true;
        }
        function setFinanceDataVisible(visible) {
            localStorage.setItem(plannerStatsScopedKey('planner_finance_data_visible'), visible ? '1' : '0');
        }
        function formatFinanceDisplay(num) {
            return getFinanceDataVisible() ? formatCurrency(num) : `¥${FINANCE_DATA_MASK}`;
        }
        function formatFinanceDisplayLabel(prefix, num) {
            return getFinanceDataVisible() ? `${prefix} ${formatCurrency(num)}` : `${prefix} ¥${FINANCE_DATA_MASK}`;
        }
        function toggleFinanceDataVisible() {
            const next = !getFinanceDataVisible();
            setFinanceDataVisible(next);
            if (!next) {
                document.querySelectorAll('.finance-balance-item, #investmentReturnCard').forEach(function (el) {
                    if (el) el.classList.remove('is-editing');
                });
                const active = document.activeElement;
                if (active && (active.closest('#financeModule') || active.id === 'reconcileActualInput')) {
                    active.blur();
                }
            }
            syncFinanceEyeButton();
            renderExpenseStats();
        }
        function syncFinanceEyeButton() {
            const btn = document.getElementById('financeEyeBtn');
            if (!btn) return;
            const masked = !getFinanceDataVisible();
            btn.classList.toggle('is-masked', masked);
            btn.setAttribute('aria-label', masked ? '显示数据' : '隐藏数据');
            btn.setAttribute('title', masked ? '数据已隐藏，点击显示' : '数据可见，点击隐藏');
        }

        function getReconcileStorageKey() {
            return plannerStatsScopedKey(`planner_reconcile_actual_${new Date().getFullYear()}`);
        }

        function getReconcileAdjustmentStorageKey() {
            return plannerStatsScopedKey('planner_month_reconcile_adjustments');
        }

        function getReconcileDisplayStorageKey() {
            return plannerStatsScopedKey('planner_month_reconcile_display');
        }

        function safeJsonValue(raw, fallback) {
            if (!raw) return fallback;
            try {
                return JSON.parse(raw);
            } catch (err) {
                return fallback;
            }
        }

        function getReconcileDisplayRecords() {
            const raw = safeJsonValue(localStorage.getItem(getReconcileDisplayStorageKey()), {});
            if (!raw || typeof raw !== 'object' || Array.isArray(raw)) return {};

            const result = {};
            Object.keys(raw).forEach(key => {
                const item = raw[key];
                if (!item || typeof item !== 'object') return;
                const statAmount = Number(item.statAmount);
                const actualAmount = Number(item.actualAmount);
                const diffAmount = Number(item.diffAmount);
                if (!Number.isFinite(statAmount) || !Number.isFinite(actualAmount) || !Number.isFinite(diffAmount)) return;
                result[key] = {
                    statAmount: roundFinanceAmount(statAmount),
                    actualAmount: roundFinanceAmount(actualAmount),
                    diffAmount: roundFinanceAmount(diffAmount)
                };
            });
            return result;
        }

        function setReconcileDisplayRecord(monthKey, record) {
            const records = getReconcileDisplayRecords();
            records[monthKey] = {
                statAmount: roundFinanceAmount(record.statAmount),
                actualAmount: roundFinanceAmount(record.actualAmount),
                diffAmount: roundFinanceAmount(record.diffAmount)
            };
            localStorage.setItem(getReconcileDisplayStorageKey(), JSON.stringify(records));
        }

        function getReconcileAdjustments() {
            const raw = safeJsonValue(localStorage.getItem(getReconcileAdjustmentStorageKey()), {});
            if (!raw || typeof raw !== 'object' || Array.isArray(raw)) return {};

            const result = {};
            Object.keys(raw).forEach(key => {
                const value = Number(raw[key]);
                if (Number.isFinite(value)) {
                    result[key] = roundFinanceAmount(value);
                }
            });
            return result;
        }

        function setReconcileAdjustment(monthKey, delta) {
            const adjustments = getReconcileAdjustments();
            const normalizedDelta = roundFinanceAmount(delta);
            if (Math.abs(normalizedDelta) < 0.000001) {
                delete adjustments[monthKey];
            } else {
                adjustments[monthKey] = normalizedDelta;
            }
            localStorage.setItem(getReconcileAdjustmentStorageKey(), JSON.stringify(adjustments));
        }

        function getReconcileActualAmount() {
            const raw = localStorage.getItem(getReconcileStorageKey());
            if (raw === null) return 0;
            const value = Number(raw);
            return Number.isFinite(value) ? roundFinanceAmount(value) : 0;
        }

        function setReconcileActualAmount(value) {
            localStorage.setItem(getReconcileStorageKey(), roundFinanceAmount(value).toFixed(2));
        }

        function normalizeArithmeticExpression(raw) {
            return String(raw || '')
                .replace(/\s+/g, '')
                .replace(/[＋﹢]/g, '+')
                .replace(/[－﹣—–]/g, '-')
                .replace(/[×xX＊]/g, '*')
                .replace(/[÷／]/g, '/')
                .replace(/（/g, '(')
                .replace(/）/g, ')');
        }

        function evaluateArithmeticExpression(raw) {
            const expression = normalizeArithmeticExpression(raw);
            if (!expression) return null;
            if (!/^[0-9+\-*/().]+$/.test(expression)) return null;

            let index = 0;
            const length = expression.length;

            const parseNumber = () => {
                const start = index;
                let hasDigit = false;
                let dotCount = 0;

                while (index < length) {
                    const ch = expression[index];
                    if (ch >= '0' && ch <= '9') {
                        hasDigit = true;
                        index += 1;
                        continue;
                    }
                    if (ch === '.') {
                        if (dotCount > 0) break;
                        dotCount += 1;
                        index += 1;
                        continue;
                    }
                    break;
                }

                if (!hasDigit) return null;
                const value = Number(expression.slice(start, index));
                return Number.isFinite(value) ? value : null;
            };

            const parseFactor = () => {
                if (index >= length) return null;
                const ch = expression[index];
                if (ch === '+') {
                    index += 1;
                    return parseFactor();
                }
                if (ch === '-') {
                    index += 1;
                    const value = parseFactor();
                    return value === null ? null : -value;
                }
                if (ch === '(') {
                    index += 1;
                    const value = parseExpression();
                    if (value === null || expression[index] !== ')') return null;
                    index += 1;
                    return value;
                }
                return parseNumber();
            };

            const parseTerm = () => {
                let value = parseFactor();
                if (value === null) return null;

                while (index < length) {
                    const operator = expression[index];
                    if (operator !== '*' && operator !== '/') break;
                    index += 1;
                    const right = parseFactor();
                    if (right === null) return null;
                    if (operator === '*') {
                        value *= right;
                    } else {
                        if (Math.abs(right) < 0.000000000001) return null;
                        value /= right;
                    }
                    if (!Number.isFinite(value)) return null;
                }

                return value;
            };

            const parseExpression = () => {
                let value = parseTerm();
                if (value === null) return null;

                while (index < length) {
                    const operator = expression[index];
                    if (operator !== '+' && operator !== '-') break;
                    index += 1;
                    const right = parseTerm();
                    if (right === null) return null;
                    value = operator === '+' ? value + right : value - right;
                    if (!Number.isFinite(value)) return null;
                }

                return value;
            };

            const result = parseExpression();
            if (result === null || index !== length) return null;
            return Number.isFinite(result) ? result : null;
        }

        function parseFinancialAmount(raw, { allowNegative = true, allowBlank = true } = {}) {
            const text = String(raw || '').trim();
            if (text === '') {
                return allowBlank
                    ? { ok: true, empty: true, value: undefined }
                    : { ok: false, empty: true, value: null };
            }

            let value = Number(text);
            if (!Number.isFinite(value)) {
                value = evaluateArithmeticExpression(text);
            }
            if (!Number.isFinite(value)) {
                return { ok: false, empty: false, value: null };
            }

            const normalized = roundFinanceAmount(value);
            if (!allowNegative && normalized < 0) {
                return { ok: false, empty: false, value: null };
            }
            return { ok: true, empty: false, value: normalized };
        }

        function applyArithmeticToInputValue(inputEl, { allowNegative = true, syncWidth = false } = {}) {
            if (!inputEl) return false;
            const parsed = parseFinancialAmount(inputEl.value, { allowNegative, allowBlank: true });
            if (!parsed.ok || parsed.empty) return false;
            inputEl.value = normalizeAmountForInput(parsed.value);
            if (syncWidth) syncAmountInputWidth(inputEl);
            return true;
        }

        function updateReconcileDiff(statAmount) {
            const inputEl = document.getElementById('reconcileActualInput');
            const diffEl = document.getElementById('reconcileDiffAmount');
            if (!inputEl || !diffEl) return;

            if (!getFinanceDataVisible()) {
                diffEl.value = formatFinanceDisplayLabel('校对差额', 0);
                diffEl.classList.remove('balance-positive', 'balance-negative');
                return;
            }
            const raw = inputEl.value.trim();
            const parsed = parseFinancialAmount(raw, { allowNegative: true, allowBlank: true });
            const hasActual = parsed.ok && !parsed.empty;
            if (!hasActual) {
                diffEl.value = '校对差额 --';
                diffEl.classList.remove('balance-positive', 'balance-negative');
                return;
            }
            const safeActual = parsed.value;
            const diff = safeActual - statAmount;

            diffEl.value = formatFinanceDisplayLabel('校对差额', diff);
            diffEl.classList.toggle('balance-positive', diff > 0);
            diffEl.classList.toggle('balance-negative', diff < 0);
        }

        function renderReconcileEntry() {
            const entryEl = document.getElementById('reconcileEntry');
            const statEl = document.getElementById('reconcileStatAmount');
            const inputEl = document.getElementById('reconcileActualInput');
            const diffEl = document.getElementById('reconcileDiffAmount');
            if (!entryEl || !statEl || !inputEl) return;

            const isMonth = expensePeriod === 'month';
            entryEl.hidden = !isMonth;
            if (!isMonth) return;

            const monthKey = getCurrentMonthKey(getFinanceStatsViewDate());
            const displayRecord = getReconcileDisplayRecords()[monthKey];

            const masked = !getFinanceDataVisible();
            inputEl.readOnly = masked;
            if (displayRecord) {
                statEl.value = formatFinanceDisplayLabel('账面流动资产', displayRecord.statAmount);
                if (document.activeElement !== inputEl) {
                    inputEl.value = masked ? `¥${FINANCE_DATA_MASK}` : normalizeAmountForInput(displayRecord.actualAmount);
                }
                if (diffEl) {
                    diffEl.value = formatFinanceDisplayLabel('校对差额', displayRecord.diffAmount);
                    diffEl.classList.toggle('balance-positive', displayRecord.diffAmount > 0);
                    diffEl.classList.toggle('balance-negative', displayRecord.diffAmount < 0);
                }
                return;
            }

            const bookLiquid = getLiquidAssets();
            statEl.value = formatFinanceDisplayLabel('账面流动资产', bookLiquid);
            if (document.activeElement !== inputEl) {
                const storedActual = getReconcileActualAmount();
                if (masked) {
                    inputEl.value = `¥${FINANCE_DATA_MASK}`;
                } else if (Math.abs(roundFinanceAmount(storedActual)) < 0.000001) {
                    inputEl.value = '';
                } else {
                    inputEl.value = normalizeAmountForInput(storedActual);
                }
            }
            updateReconcileDiff(bookLiquid);
        }

        /** 流动资产变更后同步月度校对面板（账面流动资产、校对差额与图表） */
        function syncMonthlyReconcilePanelFromLiquid(monthKey) {
            const mk = monthKey || getCurrentMonthKey(getFinanceStatsViewDate());
            const book = roundFinanceAmount(getLiquidAssets());
            const records = getReconcileDisplayRecords();
            const rec = records[mk];
            if (rec) {
                const actual = roundFinanceAmount(rec.actualAmount);
                const diff = roundFinanceAmount(actual - book);
                setReconcileDisplayRecord(mk, {
                    statAmount: book,
                    actualAmount: actual,
                    diffAmount: diff
                });
            }
            renderReconcileEntry();
            renderExpenseStats();
        }

        window.addEventListener('planner-liquid-assets-updated', function (ev) {
            const mk = ev && ev.detail && ev.detail.monthKey;
            syncMonthlyReconcilePanelFromLiquid(mk);
        });

        function clearReconcileForCurrentMonth() {
            const monthKey = getCurrentMonthKey(getFinanceStatsViewDate());
            const displayRecords = getReconcileDisplayRecords();
            const adjustments = getReconcileAdjustments();
            if (!(monthKey in displayRecords) && !(monthKey in adjustments)) return;
            delete displayRecords[monthKey];
            delete adjustments[monthKey];
            localStorage.setItem(getReconcileDisplayStorageKey(), JSON.stringify(displayRecords));
            localStorage.setItem(getReconcileAdjustmentStorageKey(), JSON.stringify(adjustments));
            const inputEl = document.getElementById('reconcileActualInput');
            if (inputEl) inputEl.value = '';
            setReconcileActualAmount(0);
            renderReconcileEntry();
            renderExpenseStats();
        }

        function saveReconcileActual() {
            const inputEl = document.getElementById('reconcileActualInput');
            if (!inputEl) return;
            if (!getFinanceDataVisible()) return;

            const raw = inputEl.value.trim();
            if (raw === '') {
                setReconcileActualAmount(0);
                inputEl.value = '';
                updateReconcileDiff(getLiquidAssets());
                return;
            }

            const parsed = parseFinancialAmount(raw, { allowNegative: true, allowBlank: false });
            if (!parsed.ok || parsed.empty) {
                alert('请输入有效金额');
                inputEl.focus();
                return;
            }
            const value = parsed.value;
            inputEl.value = normalizeAmountForInput(value);

            setReconcileActualAmount(value);
            const monthKey = getCurrentMonthKey(getFinanceStatsViewDate());
            const adjustments = getReconcileAdjustments();
            const currentDelta = roundFinanceAmount(adjustments[monthKey]);
            const statAmount = roundFinanceAmount(getLiquidAssets());
            const diff = roundFinanceAmount(value - statAmount);
            const nextDelta = roundFinanceAmount(currentDelta - diff);
            setReconcileDisplayRecord(monthKey, {
                statAmount,
                actualAmount: value,
                diffAmount: diff
            });
            setReconcileAdjustment(monthKey, nextDelta);
            renderReconcileEntry();
            renderExpenseStats();
        }

        function initReconcileEntry() {
            const inputEl = document.getElementById('reconcileActualInput');
            if (!inputEl) return;

            const amt = getReconcileActualAmount();
            if (Math.abs(roundFinanceAmount(amt)) < 0.000001) {
                inputEl.value = '';
            } else {
                inputEl.value = normalizeAmountForInput(amt);
            }

            inputEl.addEventListener('input', () => {

                        income: 0,

        function getFinanceStatsViewDate() {

        function getISOWeekInfo(date) {
            const utcDate = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const day = utcDate.getUTCDay() || 7;
            utcDate.setUTCDate(utcDate.getUTCDate() + 4 - day);
            const weekYear = utcDate.getUTCFullYear();
            const yearStart = new Date(Date.UTC(weekYear, 0, 1));
            const week = Math.ceil((((utcDate - yearStart) / 86400000) + 1) / 7);
            return { year: weekYear, week };
        }

        function getWeekKey(date) {
            const { year, week } = getISOWeekInfo(date);
            return `${year}-W${String(week).padStart(2, '0')}`;
        }

        function getDateFromWeekKey(weekKey) {
            const matched = /^(\d{4})-W(\d{1,2})$/.exec(weekKey || '');
            if (!matched) return null;

            const weekYear = Number(matched[1]);
            const week = Number(matched[2]);
            if (!Number.isInteger(weekYear) || !Number.isInteger(week) || week < 1 || week > 53) return null;

            // ISO week: week 1 contains Jan 4th; Monday is first day.
            const jan4 = new Date(Date.UTC(weekYear, 0, 4));
            const jan4Day = jan4.getUTCDay() || 7;
            const week1Monday = new Date(jan4);
            week1Monday.setUTCDate(jan4.getUTCDate() - jan4Day + 1);

            const targetMonday = new Date(week1Monday);
            targetMonday.setUTCDate(week1Monday.getUTCDate() + (week - 1) * 7);
            return new Date(targetMonday.getUTCFullYear(), targetMonday.getUTCMonth(), targetMonday.getUTCDate());
        }

        function getMonthKey(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
        }

        function formatSignedCurrency(value) {
            const amount = Number(value);
            if (!Number.isFinite(amount) || Math.abs(amount) < 0.005) return '¥0.00';
            const sign = amount > 0 ? '+' : '-';
            return `${sign}¥${formatAmountWithTwoDecimals(Math.abs(amount))}`;
        }

        function createCategorySummary(keys) {
            const result = {};
            keys.forEach(key => {
                result[key] = 0;
            });
            return result;
        }

        function createFinanceSummary() {
            return {
                expense: 0,
                income: 0,
                investment: 0,
                investmentReturn: 0,
                expenseByCategory: createCategorySummary(EXPENSE_CATEGORY_KEYS),
                incomeByCategory: createCategorySummary(INCOME_CATEGORY_KEYS)
            };
        }

        function appendRecordToFinanceSummary(summary, record) {
            summary.expense += Number(record.expense) || 0;
            summary.income += Number(record.income) || 0;
            summary.investment += Number(record.investment) || 0;
            summary.investmentReturn += Number(record.investmentReturn) || 0;

            const expenseByCategory = sanitizeCategoryValues(record.expenseByCategory, EXPENSE_CATEGORY_KEYS);
            EXPENSE_CATEGORY_KEYS.forEach(key => {
                summary.expenseByCategory[key] += Number(expenseByCategory[key]) || 0;
            });

            const incomeByCategory = sanitizeCategoryValues(record.incomeByCategory, INCOME_CATEGORY_KEYS);
            INCOME_CATEGORY_KEYS.forEach(key => {
                summary.incomeByCategory[key] += Number(incomeByCategory[key]) || 0;
            });
        }

        function getCurrentWeekFinanceSummary(records, date) {
            const summary = createFinanceSummary();
            const weekKey = getWeekKey(date);
            records.forEach(record => {
                if (record.weekKey !== weekKey) return;
                appendRecordToFinanceSummary(summary, record);
            });
            return summary;
        }

        function getCurrentMonthFinanceSummary(records, date) {
            const summary = createFinanceSummary();
            const year = date.getFullYear();
            const month = date.getMonth();
            const monthKey = getMonthKey(date);
            const adjustments = getReconcileAdjustments();
            const reconcileDelta = Number(adjustments[monthKey]) || 0;

            records.forEach(record => {
                const recordDate = getDateFromWeekKey(record.weekKey) || new Date(record.createdAt);
                if (Number.isNaN(recordDate.getTime())) return;
                if (recordDate.getFullYear() !== year || recordDate.getMonth() !== month) return;
                appendRecordToFinanceSummary(summary, record);
            });

            return {
                ...summary,
                reconcileDelta,
                expenseWithAdjustment: summary.expense + reconcileDelta
            };
        }

        function formatPercent(value, total) {
            const safeTotal = Number(total) || 0;
            const safeValue = Number(value) || 0;
            if (safeTotal <= 0) return '--';
            return `${((safeValue / safeTotal) * 100).toFixed(1)}%`;
        }

        function createMetric(expense = 0, income = 0, investment = 0) {
            return {
                expense,
                income,
                investment,
                netBalance: income - expense - investment
            };
        }

        function getWeeklyMetricMap(records) {
            const map = new Map();
            records.forEach(record => {
                const key = record.weekKey;
                if (!map.has(key)) {
                    map.set(key, { expense: 0, income: 0, investment: 0 });
                }
                const bucket = map.get(key);
                bucket.expense += record.expense;
                bucket.income += record.income;
                bucket.investment += record.investment;
            });
            return map;
        }

        function getMonthlyMetricMap(records) {
            const map = new Map();
            records.forEach(record => {
                const date = getDateFromWeekKey(record.weekKey) || new Date(record.createdAt);
                if (Number.isNaN(date.getTime())) return;

                const key = getMonthKey(date);
                if (!map.has(key)) {
                    map.set(key, { expense: 0, income: 0, investment: 0 });
                }
                const bucket = map.get(key);
                bucket.expense += record.expense;
                bucket.income += record.income;
                bucket.investment += record.investment;
            });

            const adjustments = getReconcileAdjustments();
            Object.keys(adjustments).forEach(key => {
                if (!map.has(key)) {
                    map.set(key, { expense: 0, income: 0, investment: 0 });
                }
                map.get(key).expense += Number(adjustments[key]) || 0;
            });

            return map;
        }

        function getMetricFromMap(map, key) {
            const value = map.get(key);
            if (!value) return createMetric();
            return createMetric(value.expense, value.income, value.investment);
        }

        function calcChangeRate(current, base) {
            if (!Number.isFinite(current) || !Number.isFinite(base)) return null;
            if (Math.abs(base) < 0.000001) {
                if (Math.abs(current) < 0.000001) return 0;
                return null;
            }
            return ((current - base) / Math.abs(base)) * 100;
        }

        function formatTrendRate(rate) {
            if (rate === null) return { text: '--', trendClass: 'na' };
            if (Math.abs(rate) < 0.05) return { text: '0.0%', trendClass: 'flat' };
            const sign = rate > 0 ? '+' : '';
            return { text: `${sign}${rate.toFixed(1)}%`, trendClass: rate > 0 ? 'up' : 'down' };
        }

        function setTrendValue(id, rate) {
            const el = document.getElementById(id);
            if (!el) return;

            el.classList.remove('up', 'down', 'flat', 'na');
            if (!getFinanceDataVisible()) {
                el.textContent = FINANCE_DATA_MASK;
                return;
            }
            const fmt = formatTrendRate(rate);
            el.textContent = fmt.text;
            el.classList.add(fmt.trendClass);
        }

        function getFinanceTrendData(records, now) {
            let currentMetric = createMetric();
            let yoyMetric = createMetric();
            let momMetric = createMetric();
            let investmentGrowthValues = [];
            let periodInvestmentReturn = 0;

            if (expensePeriod === 'week') {
                const weekMap = getWeeklyMetricMap(records);
                const currentKey = getWeekKey(now);
                const prevDate = new Date(now);
                prevDate.setDate(prevDate.getDate() - 7);
                const yoyDate = new Date(now);
                yoyDate.setDate(yoyDate.getDate() - 364);
                currentMetric = getMetricFromMap(weekMap, currentKey);
                yoyMetric = getMetricFromMap(weekMap, getWeekKey(yoyDate));
                momMetric = getMetricFromMap(weekMap, getWeekKey(prevDate));
                investmentGrowthValues = getRecentWeekBuckets(records).map(item => Number(item.investmentReturn) || 0);
            } else if (expensePeriod === 'year') {
                const yearMap = getYearlyMetricMap(records);
                const currentKey = String(now.getFullYear());
                currentMetric = getMetricFromMap(yearMap, currentKey);
                yoyMetric = getMetricFromMap(yearMap, String(now.getFullYear() - 2));
                momMetric = getMetricFromMap(yearMap, String(now.getFullYear() - 1));
                investmentGrowthValues = getYearBuckets(records, now).map(item => Number(item.investmentReturn) || 0);
            } else {
                const monthMap = getMonthlyMetricMap(records);
                const currentKey = getMonthKey(now);
                currentMetric = getMetricFromMap(monthMap, currentKey);
                yoyMetric = getMetricFromMap(monthMap, getMonthKey(new Date(now.getFullYear() - 1, now.getMonth(), 1)));
                momMetric = getMetricFromMap(monthMap, getMonthKey(new Date(now.getFullYear(), now.getMonth() - 1, 1)));
                investmentGrowthValues = getMonthBuckets(records, now).map(item => Number(item.investmentReturn) || 0);
            }
            periodInvestmentReturn = getCurrentPeriodInvestmentReturn(records, now, expensePeriod);

            return {
                expenseYoY: formatTrendRate(calcChangeRate(currentMetric.expense, yoyMetric.expense)),
                expenseMoM: formatTrendRate(calcChangeRate(currentMetric.expense, momMetric.expense)),
                incomeYoY: formatTrendRate(calcChangeRate(currentMetric.income, yoyMetric.income)),
                incomeMoM: formatTrendRate(calcChangeRate(currentMetric.income, momMetric.income)),
                investmentYoY: formatTrendRate(calcAverageGrowthRate(investmentGrowthValues)),
                investmentMoM: formatTrendRate(calcInvestmentReturnRate(currentMetric.investment, periodInvestmentReturn)),
                balanceYoY: formatTrendRate(calcChangeRate(currentMetric.netBalance, yoyMetric.netBalance)),
                balanceMoM: formatTrendRate(calcChangeRate(currentMetric.netBalance, momMetric.netBalance))
            };
        }

        function calcAverageGrowthRate(values) {
            if (!Array.isArray(values) || values.length < 2) return null;
            const rates = [];
            for (let i = 1; i < values.length; i += 1) {
                const prev = Number(values[i - 1]);
                const curr = Number(values[i]);
                if (!Number.isFinite(prev) || !Number.isFinite(curr)) continue;
                if (Math.abs(prev) < 0.000001) continue;
                rates.push(((curr - prev) / Math.abs(prev)) * 100);
            }

            if (rates.length === 0) {
                return values.every(value => Math.abs(Number(value) || 0) < 0.000001) ? 0 : null;
            }
            return rates.reduce((sum, rate) => sum + rate, 0) / rates.length;
        }

        function getCurrentPeriodInvestmentReturn(records, now, period) {
            if (period === 'week') {
                const currentWeekKey = getWeekKey(now);
                return records
                    .filter(record => record.weekKey === currentWeekKey)
                    .reduce((sum, record) => sum + (Number(record.investmentReturn) || 0), 0);
            }

            const currentMonthKey = getMonthKey(now);
            return records.reduce((sum, record) => {
                const date = getDateFromWeekKey(record.weekKey) || new Date(record.createdAt);
                if (Number.isNaN(date.getTime())) return sum;
                if (getMonthKey(date) !== currentMonthKey) return sum;
                return sum + (Number(record.investmentReturn) || 0);
            }, 0);
        }

        function calcInvestmentReturnRate(investment, investmentReturn) {
            if (!Number.isFinite(investment) || !Number.isFinite(investmentReturn)) return null;
            if (Math.abs(investment) < 0.000001) {
                return Math.abs(investmentReturn) < 0.000001 ? 0 : null;
            }
            return (investmentReturn / Math.abs(investment)) * 100;
        }

        function normalizeAmountForInput(amount, { allowBlank = false } = {}) {
            const parsed = Number(amount);
            if (!Number.isFinite(parsed)) return allowBlank ? '' : '0.00';
            const rounded = roundFinanceAmount(parsed);
            if (Math.abs(rounded) < 0.005) return allowBlank ? '' : '0.00';
            return rounded.toFixed(2);
        }

        function setInvestmentReturnHint(totalReturn, hasData) {
            const wrapEl = document.getElementById('investmentReturnWrap');
            const inputEl = document.getElementById('investmentReturnInput');
            const cardEl = document.getElementById('investmentReturnCard');
            if (!wrapEl || !inputEl) return;

            wrapEl.classList.remove('up', 'down', 'flat', 'na');

            const amount = Number(totalReturn);
            const isValidAmount = Number.isFinite(amount);
            if (!cardEl || !cardEl.classList.contains('is-editing')) {
                if (getFinanceDataVisible()) {
                    inputEl.value = normalizeAmountForInput(isValidAmount ? amount : 0, { allowBlank: !hasData });
                    inputEl.readOnly = false;
                } else {
                    inputEl.value = FINANCE_DATA_MASK;
                    inputEl.readOnly = true;
                }
                syncAmountInputWidth(inputEl);
            }

            if (!hasData || !isValidAmount) {
                wrapEl.classList.add('na');
                return;
            }

            if (Math.abs(amount) < 0.5) {
                wrapEl.classList.add('flat');
                return;
            }

            wrapEl.classList.add(amount > 0 ? 'up' : 'down');
        }

        function renderFinanceTrends(records, now) {
            let currentMetric = createMetric();
            let yoyMetric = createMetric();
            let momMetric = createMetric();
            let investmentGrowthValues = [];

            if (expensePeriod === 'week') {
                const weekMap = getWeeklyMetricMap(records);
                const currentKey = getWeekKey(now);

                const prevDate = new Date(now);
                prevDate.setDate(prevDate.getDate() - 7);
                const prevKey = getWeekKey(prevDate);

                const yoyDate = new Date(now);
                yoyDate.setDate(yoyDate.getDate() - 364);
                const yoyKey = getWeekKey(yoyDate);

                currentMetric = getMetricFromMap(weekMap, currentKey);
                yoyMetric = getMetricFromMap(weekMap, yoyKey);
                momMetric = getMetricFromMap(weekMap, prevKey);
                investmentGrowthValues = getRecentWeekBuckets(records).map(item => Number(item.investmentReturn) || 0);
            } else {
                const monthMap = getMonthlyMetricMap(records);
                const currentKey = getMonthKey(now);
                const prevKey = getMonthKey(new Date(now.getFullYear(), now.getMonth() - 1, 1));
                const yoyKey = getMonthKey(new Date(now.getFullYear() - 1, now.getMonth(), 1));

                currentMetric = getMetricFromMap(monthMap, currentKey);
                yoyMetric = getMetricFromMap(monthMap, yoyKey);
                momMetric = getMetricFromMap(monthMap, prevKey);
                investmentGrowthValues = getMonthBuckets(records, now).map(item => Number(item.investmentReturn) || 0);
            }

            setTrendValue('expenseYoY', calcChangeRate(currentMetric.expense, yoyMetric.expense));
            setTrendValue('expenseMoM', calcChangeRate(currentMetric.expense, momMetric.expense));
            setTrendValue('incomeYoY', calcChangeRate(currentMetric.income, yoyMetric.income));
            setTrendValue('incomeMoM', calcChangeRate(currentMetric.income, momMetric.income));
            setTrendValue('investmentYoY', calcAverageGrowthRate(investmentGrowthValues));
            const periodInvestmentReturn = getCurrentPeriodInvestmentReturn(records, now, expensePeriod);
            setTrendValue('investmentMoM', calcInvestmentReturnRate(currentMetric.investment, periodInvestmentReturn));
            setTrendValue('balanceYoY', calcChangeRate(currentMetric.netBalance, yoyMetric.netBalance));
            setTrendValue('balanceMoM', calcChangeRate(currentMetric.netBalance, momMetric.netBalance));
        }

        function normalizeExpenseCategoryValues(item = {}) {
            const fallbackTotal = Math.max(0, Number(item.expense ?? item.amount) || 0);
            const base = sanitizeCategoryValues(item.expenseByCategory, EXPENSE_CATEGORY_KEYS);
            const hasStructured = item.expenseByCategory && typeof item.expenseByCategory === 'object' && !Array.isArray(item.expenseByCategory);
            if (hasStructured) return base;
            base.fixed_expense = fallbackTotal;
            return base;
        }

        function normalizeIncomeCategoryValues(item = {}) {
            const fallbackTotal = Math.max(0, Number(item.income) || 0);
            const base = sanitizeCategoryValues(item.incomeByCategory, INCOME_CATEGORY_KEYS);
            const hasStructured = item.incomeByCategory && typeof item.incomeByCategory === 'object' && !Array.isArray(item.incomeByCategory);
            if (hasStructured) return base;
            base.salary_income = fallbackTotal;
            return base;
        }

        function getWeeklyExpenseRecords() {
            const raw = safeJsonValue(localStorage.getItem(plannerStatsScopedKey('planner_weekly_expenses')), []);
            if (!Array.isArray(raw)) return [];

            return raw
                .map(item => {
                    const createdAt = item.createdAt || new Date().toISOString();
                    const date = new Date(createdAt);
                    const safeDate = Number.isNaN(date.getTime()) ? new Date() : date;
                    const weekKey = item.weekKey || getWeekKey(safeDate);
                    const expenseByCategory = normalizeExpenseCategoryValues(item);
                    const incomeByCategory = normalizeIncomeCategoryValues(item);
                    const expense = roundFinanceAmount(sumCategoryValues(expenseByCategory, EXPENSE_CATEGORY_KEYS));
                    const income = roundFinanceAmount(sumCategoryValues(incomeByCategory, INCOME_CATEGORY_KEYS));
                    const investment = roundFinanceAmount(Math.max(0, Number(item.investment) || 0));
                    const investmentReturn = roundFinanceAmount(Number.isFinite(Number(item.investmentReturn)) ? Number(item.investmentReturn) : 0);
                    return {
                        id: item.id || `${weekKey}-${safeDate.getTime()}`,
                        weekKey,
                        amount: expense,
                        expense,
                        expenseByCategory,
                        income,
                        incomeByCategory,
                        investment,
                        investmentReturn,
                        createdAt: safeDate.toISOString()
                    };
                })
                .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
        }

        function getRecentWeekBuckets(records) {
            const recent = records.slice(-12);
            return recent.map((item, idx) => ({
                label: `${idx + 1}`,
                expense: item.expense,
                income: item.income,
                investment: item.investment,
                investmentReturn: Number(item.investmentReturn) || 0
            }));
        }

        function getExpenseIncomeCategoryBreakdown(records, now) {
            const expenseByCategory = createCategorySummary(EXPENSE_CATEGORY_KEYS);
            const incomeByCategory = createCategorySummary(INCOME_CATEGORY_KEYS);

            if (expensePeriod === 'week') {
                const weekKey = getWeekKey(now);
                records.forEach(record => {
                    if (record.weekKey !== weekKey) return;
                    const exp = sanitizeCategoryValues(record.expenseByCategory, EXPENSE_CATEGORY_KEYS);
                    const inc = sanitizeCategoryValues(record.incomeByCategory, INCOME_CATEGORY_KEYS);
                    EXPENSE_CATEGORY_KEYS.forEach(k => { expenseByCategory[k] += Number(exp[k]) || 0; });
                    INCOME_CATEGORY_KEYS.forEach(k => { incomeByCategory[k] += Number(inc[k]) || 0; });
                });
            } else if (expensePeriod === 'month') {
                const year = now.getFullYear();
                const month = now.getMonth();
                const monthKey = getMonthKey(now);
                const adjustments = getReconcileAdjustments();
                const reconcileDelta = Number(adjustments[monthKey]) || 0;
                records.forEach(record => {
                    const date = getDateFromWeekKey(record.weekKey) || new Date(record.createdAt);
                    if (Number.isNaN(date.getTime()) || date.getFullYear() !== year || date.getMonth() !== month) return;
                    const exp = sanitizeCategoryValues(record.expenseByCategory, EXPENSE_CATEGORY_KEYS);
                    const inc = sanitizeCategoryValues(record.incomeByCategory, INCOME_CATEGORY_KEYS);
                    EXPENSE_CATEGORY_KEYS.forEach(k => { expenseByCategory[k] += Number(exp[k]) || 0; });
                    INCOME_CATEGORY_KEYS.forEach(k => { incomeByCategory[k] += Number(inc[k]) || 0; });
                });
                expenseByCategory.variable_expense = (expenseByCategory.variable_expense || 0) + reconcileDelta;
            } else {
                const year = now.getFullYear();
                const adjustments = getReconcileAdjustments();
                records.forEach(record => {
                    const date = getDateFromWeekKey(record.weekKey) || new Date(record.createdAt);
                    if (Number.isNaN(date.getTime()) || date.getFullYear() !== year) return;
                    const exp = sanitizeCategoryValues(record.expenseByCategory, EXPENSE_CATEGORY_KEYS);
                    const inc = sanitizeCategoryValues(record.incomeByCategory, INCOME_CATEGORY_KEYS);
                    EXPENSE_CATEGORY_KEYS.forEach(k => { expenseByCategory[k] += Number(exp[k]) || 0; });
                    INCOME_CATEGORY_KEYS.forEach(k => { incomeByCategory[k] += Number(inc[k]) || 0; });
                });
                if (expensePeriod === 'year') {
                    let reconcileTotal = 0;
                    Object.keys(adjustments).forEach(key => {
                        if ((key || '').startsWith(String(year))) reconcileTotal += Number(adjustments[key]) || 0;
                    });
                    expenseByCategory.variable_expense = (expenseByCategory.variable_expense || 0) + reconcileTotal;
                }
            }

            return {
                expenseByCategory: Object.fromEntries(EXPENSE_CATEGORY_KEYS.map(k => [k, roundFinanceAmount(expenseByCategory[k] || 0)])),
                incomeByCategory: Object.fromEntries(INCOME_CATEGORY_KEYS.map(k => [k, roundFinanceAmount(incomeByCategory[k] || 0)]))
            };
        }

        function getMonthBuckets(records, now) {
            const currentYear = now.getFullYear();
            const adjustments = getReconcileAdjustments();
            const buckets = Array.from({ length: 12 }, (_, idx) => ({
                label: `${idx + 1}月`,
                expense: 0,
                income: 0,
                investment: 0,
                investmentReturn: 0
            }));

            records.forEach(record => {
                const date = getDateFromWeekKey(record.weekKey) || new Date(record.createdAt);
                if (Number.isNaN(date.getTime()) || date.getFullYear() !== currentYear) return;
                buckets[date.getMonth()].expense += record.expense;
                buckets[date.getMonth()].income += record.income;
                buckets[date.getMonth()].investment += record.investment;
                buckets[date.getMonth()].investmentReturn += Number(record.investmentReturn) || 0;
            });

            buckets.forEach((bucket, idx) => {
                const monthKey = `${currentYear}-${String(idx + 1).padStart(2, '0')}`;
                const delta = Number(adjustments[monthKey]) || 0;
                bucket.expense += delta;
            });

            return buckets.map(item => ({
                ...item,
                tip: `${item.label}支出: ${formatCurrency(item.expense)} / 收入: ${formatCurrency(item.income)} / 投资: ${formatCurrency(item.investment)} / 收益: ${formatCurrency(item.investmentReturn)}`
            }));
        }

        function fillFinanceHistoryFormByWeek(weekKey) {
            const weekInputEl = document.getElementById('historyWeekInput');
            const investmentInputEl = document.getElementById('historyInvestmentInput');
            const fixedExpenseInputEl = document.getElementById('historyFixedExpenseInput');
            const variableExpenseInputEl = document.getElementById('historyVariableExpenseInput');

            const otherIncomeInputEl = document.getElementById('historyOtherIncomeInput');
            const investmentReturnInputEl = document.getElementById('historyInvestmentReturnInput');

            if (!weekInputEl || !investmentInputEl || !fixedExpenseInputEl || !variableExpenseInputEl || !salaryIncomeInputEl || !otherIncomeInputEl || !investmentReturnInputEl) {
                return;
            }

            const normalizedWeekKey = String(weekKey || '').trim();
            if (!/^\d{4}-W\d{2}$/.test(normalizedWeekKey)) {
                if (subtitleEl) subtitleEl.textContent = '请选择需要修改的周次';
                return;
            }

            const records = getWeeklyExpenseRecords();
            const record = records.find(item => item.weekKey === normalizedWeekKey) || null;
            const expenseByCategory = sanitizeCategoryValues(record?.expenseByCategory, EXPENSE_CATEGORY_KEYS);
            const incomeByCategory = sanitizeCategoryValues(record?.incomeByCategory, INCOME_CATEGORY_KEYS);

            weekInputEl.value = normalizedWeekKey;
            investmentInputEl.value = normalizeAmountForInput(Number(record?.investment) || 0);
            fixedExpenseInputEl.value = normalizeAmountForInput(Number(expenseByCategory.fixed_expense) || 0);
            variableExpenseInputEl.value = normalizeAmountForInput(Number(expenseByCategory.variable_expense) || 0);
            salaryIncomeInputEl.value = normalizeAmountForInput(Number(incomeByCategory.salary_income) || 0);
            otherIncomeInputEl.value = normalizeAmountForInput(Number(incomeByCategory.other_income) || 0);
            investmentReturnInputEl.value = normalizeAmountForInput(Number(record?.investmentReturn) || 0);

            if (subtitleEl) {
                subtitleEl.textContent = record
                    ? `${formatWeekLabel(normalizedWeekKey)} · 已载入记录（录入日期 ${formatDateText(record.createdAt)}）`
                    : `${formatWeekLabel(normalizedWeekKey)} · 暂无记录，保存后将创建`;
            }
        }
