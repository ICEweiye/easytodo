    <script>
        const ARCHIVE_TYPE_META = {
            all: { label: '全部', icon: '◉', iconClass: 'is-all' },
            todo: { label: '事项', icon: '✓', iconClass: 'is-todo' },
            okr: { label: '目标', icon: '◎', iconClass: 'is-okr' },
            book: { label: '书籍', icon: '📘', iconClass: 'is-book' },
            review: { label: '复盘', icon: '↺', iconClass: 'is-review' },
            finance: { label: '财务', icon: '¥', iconClass: 'is-finance' }
        };
        const REVIEW_CATEGORY_META = {
            none: '无',
            life: '生活',
            work: '工作',
            study: '学习',
            important: '重要',
            goal: '目标'
        };

        function resolveArchiveReviewCategoryLabel(catKey) {
            var raw = String(catKey || '').trim();
            if (!raw || raw === 'none') {
                if (window.ReviewSettings && typeof window.ReviewSettings.getCategoryLabel === 'function') {
                    return window.ReviewSettings.getCategoryLabel('none');
                }
                return REVIEW_CATEGORY_META.none || '无';
            }
            if (window.ReviewSettings && typeof window.ReviewSettings.getCategoryLabel === 'function') {
                return window.ReviewSettings.getCategoryLabel(raw);
            }
            return REVIEW_CATEGORY_META[raw] || raw || '工作';
        }
        const ARCHIVE_REVIEW_EMOTION_GROUPS = [
            {
                valence: '消极',
                arousal: '高',
                emotions: ['愤怒', '恐惧', '痛恨', '慌乱', '羞耻', '害羞', '厌恶', '焦虑', '内疚', '害怕', '委屈', '嫉妒', '后悔', '紧张', '烦躁', '鄙视', '尴尬', '不舍']
            },
            {
                valence: '积极',
                arousal: '高',
                emotions: ['激动', '爱慕', '兴奋', '好奇', '喜悦', '骄傲', '活力', '愉悦', '期待', '崇拜', '惊讶', '羡慕']
            },
            {
                valence: '消极',
                arousal: '低',
                emotions: ['悲伤', '低落', '无助', '麻木', '挫败', '失望', '沮丧', '孤独', '耗竭', '无聊', '无奈', '疑惑', '迷茫', '疲惫', '遗憾', '惋惜']
            },
            {
                valence: '积极',
                arousal: '低',
                emotions: ['安心', '同情', '欣慰', '感动', '怀念', '满足', '欣赏', '信任', '幸福', '感恩', '平静', '悠闲', '放松']
            }
        ];
        const ARCHIVE_REVIEW_EMOTION_INTENSITY_OPTIONS = ['很高', '高', '中', '低', '很低'];
        const monthKeyPattern = /^(\d{4})-(\d{2})$/;

        let archiveRecords = [];
        let activeArchiveType = 'all';
        let activeFinanceReportType = 'month';
        let archiveSearchKeyword = '';
        let archiveDateStart = '';
        let archiveDateEnd = '';
        let currentRenderedArchiveRecords = [];
        const EXPENSE_CATEGORY_KEYS = ['fixed_expense', 'variable_expense'];
        const INCOME_CATEGORY_KEYS = ['salary_income', 'other_income'];

        function safeJsonArray(raw) {
            if (!raw) return [];
            try {
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        function safeJsonObject(raw) {
            if (!raw) return {};
            try {
                const parsed = JSON.parse(raw);
                return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : {};
            } catch {
                return {};
            }
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function toFiniteNumber(value, fallback = 0) {
            const num = Number(value);
            return Number.isFinite(num) ? num : fallback;
        }

        function roundFinanceAmount(value) {
            const amount = Number(value);
            if (!Number.isFinite(amount)) return 0;
            const rounded = Math.round((amount + Number.EPSILON) * 100) / 100;
            return Math.abs(rounded) < 0.000000000001 ? 0 : rounded;
        }

        function sanitizeCategoryValues(raw, allowedKeys) {
            const result = {};
            const source = raw && typeof raw === 'object' && !Array.isArray(raw) ? raw : {};
            allowedKeys.forEach(key => {
                const value = Number(source[key]);
                result[key] = Number.isFinite(value) && value >= 0 ? value : 0;
            });
            return result;
        }

        function sumCategoryValues(values, keys) {
            return keys.reduce((sum, key) => sum + (Number(values[key]) || 0), 0);
        }

        function normalizeAmountForInput(amount, { allowBlank = false } = {}) {
            const num = Number(amount);
            if (!Number.isFinite(num)) return allowBlank ? '' : '0';
            if (Math.abs(num) < 0.000001) return '0';
            if (Number.isInteger(num)) return String(num);
            return num.toFixed(2).replace(/\.?0+$/, '');
        }

        function parseDateTs(value) {
            if (value === null || value === undefined || value === '') return null;
            const ts = Date.parse(String(value));
            return Number.isFinite(ts) ? ts : null;
        }

        function formatDate(dateTs) {
            if (!Number.isFinite(dateTs)) return '未标记日期';
            const date = new Date(dateTs);
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function formatDayLite(value) {
            const ts = parseDateTs(value);
            if (!Number.isFinite(ts)) return '--';
            const date = new Date(ts);
            return `${date.getMonth() + 1}月${date.getDate()}日`;
        }

        function formatCurrency(value) {
            const amount = roundFinanceAmount(toFiniteNumber(value, 0));
            return `¥${Math.abs(amount).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
        }

        function formatSignedCurrency(value) {
            const amount = roundFinanceAmount(toFiniteNumber(value, 0));
            if (amount === 0) return '¥0.00';
            return `${amount > 0 ? '+' : '-'}¥${Math.abs(amount).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
        }

        function formatPercent(value, total) {
            const safeTotal = toFiniteNumber(total, 0);
            const safeValue = toFiniteNumber(value, 0);
            if (safeTotal <= 0) return '--';
            return `${((safeValue / safeTotal) * 100).toFixed(1)}%`;
        }

        function trimPreview(value, maxLen = 40) {
            const text = String(value || '').replace(/\s+/g, ' ').trim();
            if (!text) return '';
            if (window.Utf8Utils && typeof window.Utf8Utils.truncateByCodePoints === 'function') {
                return window.Utf8Utils.truncateByCodePoints(text, maxLen, '...');
            }
            return text.length > maxLen ? `${text.slice(0, maxLen)}...` : text;
        }

        const ARCHIVE_OKR_COLOR_KEYS = ['brown', 'apricot', 'sage', 'pink', 'indigo', 'teal', 'coral', 'amber'];

        function normalizeArchiveOkrColor(color) {
            const key = String(color || '').trim().toLowerCase();
            return ARCHIVE_OKR_COLOR_KEYS.includes(key) ? key : 'brown';
        }

        function archiveGetKrTarget(kr) {
            const target = parseInt(kr.target, 10);
            return Number.isFinite(target) && target > 0 ? target : 1;
        }

        function archiveGetKrCurrent(kr) {
            const current = parseInt(kr.current, 10);
            if (Number.isFinite(current)) return current;
            return kr.completed ? archiveGetKrTarget(kr) : 0;
        }

        function archiveNormalizeKr(kr) {
            const target = archiveGetKrTarget(kr);
            const current = Math.min(Math.max(0, archiveGetKrCurrent(kr)), target);
            kr.target = target;
            kr.current = current;
            kr.completed = current >= target;
            return kr;
        }

        function archiveGetKrProgress(kr) {
            const target = archiveGetKrTarget(kr);
            const current = Math.min(archiveGetKrCurrent(kr), target);
            return target > 0 ? current / target : 0;
        }

        function formatArchiveOkrMonthDay(dateStr) {
            const ts = parseDateTs(dateStr);
            if (!Number.isFinite(ts)) return '';
            const d = new Date(ts);
            return `${d.getMonth() + 1}月${d.getDate()}日`;
        }

        /** 供主页「添加目标」预填：不含开始/结束日期，其余与归档快照一致 */
        function buildOkrContinuePayload(okr) {
            if (!okr || typeof okr !== 'object') return null;
            const totalKrs = (okr.krs && okr.krs.length) || 1;
            const getKrWeightValue = (kr) => {
                const weight = parseInt(kr.weight, 10);
                return Number.isFinite(weight) ? weight : Math.round(100 / totalKrs);
            };
            const krs = (okr.krs || []).map((kr) => {
                archiveNormalizeKr(kr);
                return {
                    text: String(kr.text || '').trim(),
                    weight: Math.max(1, Math.min(100, getKrWeightValue(kr))),
                    target: archiveGetKrTarget(kr)
                };
            }).filter((k) => k.text);
            const title = String(okr.title || '').trim();
            if (!title || krs.length === 0) return null;
            return {
                title,
                motivation: String(okr.motivation || ''),
                feasibility: String(okr.feasibility || ''),
                memo: String(okr.memo || ''),
                color: normalizeArchiveOkrColor(okr.color),
                krs
            };
        }

        let currentArchiveDetailRecord = null;

        function continueArchiveOkrGoal() {
            const record = currentArchiveDetailRecord;
            if (!record || record.type !== 'okr' || !record.detailData || !record.detailData.okr) return;
            const payload = buildOkrContinuePayload(record.detailData.okr);
            if (!payload) {
                alert('无法从该归档生成目标草稿');
                return;
            }
            try {
                sessionStorage.setItem('planner_okr_continue_draft', JSON.stringify(payload));
            } catch (e) {
                alert('无法保存草稿，请稍后重试');
                return;
            }
            window.location.href = 'index.html';
        }

        function normalizeArchiveInlineText(value) {
            return String(value || '').replace(/\s+/g, ' ').trim();
        }

        /** 是否视为「有真实录入」：空串与展示占位符「--」不算（避免误判为拆分/四象限布局） */
        function archiveHasStoredGraiText(value) {
            const s = String(value ?? '').trim();
            return s.length > 0 && s !== '--';
        }

        function archiveMultilineHtml(value) {
            return escapeHtml(value).replace(/\n/g, '<br>');
        }

        function parseYmdToTs(value, endOfDay = false) {
            const raw = String(value || '').trim();
            const matched = /^(\d{4})-(\d{2})-(\d{2})$/.exec(raw);
            if (!matched) return null;

            const year = Number(matched[1]);
            const month = Number(matched[2]);
            const day = Number(matched[3]);
            if (!Number.isInteger(year) || !Number.isInteger(month) || !Number.isInteger(day)) return null;

            const date = endOfDay
                ? new Date(year, month - 1, day, 23, 59, 59, 999)
                : new Date(year, month - 1, day, 0, 0, 0, 0);
            const ts = date.getTime();
            return Number.isFinite(ts) ? ts : null;
        }

        function normalizeArchiveDateText(value) {
            const raw = String(value || '').trim();
            if (!raw) return '';

            const normalized = raw
                .replace(/[./]/g, '-')
                .replace(/\s+/g, '')
                .replace(/年/g, '-')
                .replace(/月/g, '-')
                .replace(/日/g, '');

            const matched = /^(\d{4})-(\d{1,2})-(\d{1,2})$/.exec(normalized);
            if (!matched) return '';

            const year = Number(matched[1]);
            const month = Number(matched[2]);
            const day = Number(matched[3]);
            if (!Number.isInteger(year) || !Number.isInteger(month) || !Number.isInteger(day)) return '';
            if (month < 1 || month > 12 || day < 1 || day > 31) return '';

            const candidate = new Date(year, month - 1, day);
            if (
                candidate.getFullYear() !== year
                || candidate.getMonth() !== month - 1
                || candidate.getDate() !== day
            ) {
                return '';
            }

            return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function addOneMonthYmd(ymd) {
            const matched = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(ymd || '').trim());
            if (!matched) return '';
            const year = Number(matched[1]);
            const month = Number(matched[2]);
            const day = Number(matched[3]);
            if (!Number.isInteger(year) || !Number.isInteger(month) || !Number.isInteger(day)) return '';

            const baseMonth = new Date(year, month - 1, 1);
            const targetMonth = new Date(baseMonth.getFullYear(), baseMonth.getMonth() + 1, 1);
            const daysInTargetMonth = new Date(targetMonth.getFullYear(), targetMonth.getMonth() + 1, 0).getDate();
            const targetDay = Math.min(day, daysInTargetMonth);
            const target = new Date(targetMonth.getFullYear(), targetMonth.getMonth(), targetDay);

            return `${target.getFullYear()}-${String(target.getMonth() + 1).padStart(2, '0')}-${String(target.getDate()).padStart(2, '0')}`;
        }

        function getDateFromWeekKey(weekKey) {
            const matched = /^(\d{4})-W(\d{1,2})$/.exec(String(weekKey || ''));
            if (!matched) return null;

            const weekYear = Number(matched[1]);
            const week = Number(matched[2]);
            if (!Number.isInteger(weekYear) || !Number.isInteger(week) || week < 1 || week > 53) return null;

            const jan4 = new Date(Date.UTC(weekYear, 0, 4));
            const jan4Day = jan4.getUTCDay() || 7;
            const week1Monday = new Date(jan4);
            week1Monday.setUTCDate(jan4.getUTCDate() - jan4Day + 1);

            const targetMonday = new Date(week1Monday);
            targetMonday.setUTCDate(week1Monday.getUTCDate() + (week - 1) * 7);
            return new Date(targetMonday.getUTCFullYear(), targetMonday.getUTCMonth(), targetMonday.getUTCDate());
        }

        function getISOWeekInfo(date) {
            const utcDate = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const day = utcDate.getUTCDay() || 7;
            utcDate.setUTCDate(utcDate.getUTCDate() + 4 - day);
            const weekYear = utcDate.getUTCFullYear();
            const yearStart = new Date(Date.UTC(weekYear, 0, 1));
            const week = Math.ceil((((utcDate - yearStart) / 86400000) + 1) / 7);
            return { year: weekYear, week };
        }

        function getWeekKey(date) {
            const { year, week } = getISOWeekInfo(date);
            return `${year}-W${String(week).padStart(2, '0')}`;
        }

        function normalizeExpenseCategoryValues(item = {}) {
            const fallbackTotal = Math.max(0, Number(item.expense ?? item.amount) || 0);
            const base = sanitizeCategoryValues(item.expenseByCategory, EXPENSE_CATEGORY_KEYS);
            const hasStructured = item.expenseByCategory && typeof item.expenseByCategory === 'object' && !Array.isArray(item.expenseByCategory);
            if (hasStructured) return base;
            base.fixed_expense = fallbackTotal;
            return base;
        }

        function normalizeIncomeCategoryValues(item = {}) {
            const fallbackTotal = Math.max(0, Number(item.income) || 0);
            const base = sanitizeCategoryValues(item.incomeByCategory, INCOME_CATEGORY_KEYS);
            const hasStructured = item.incomeByCategory && typeof item.incomeByCategory === 'object' && !Array.isArray(item.incomeByCategory);
            if (hasStructured) return base;
            base.salary_income = fallbackTotal;
            return base;
        }

            const raw = safeJsonArray(localStorage.getItem(plannerArchiveScopedKey('planner_weekly_expenses')));
            return raw
                .map(item => {
                    const createdAt = item.createdAt || new Date().toISOString();
                    const date = new Date(createdAt);
                    const safeDate = Number.isNaN(date.getTime()) ? new Date() : date;
                    const weekKey = item.weekKey || getWeekKey(safeDate);
                    const expenseByCategory = normalizeExpenseCategoryValues(item);
                    const incomeByCategory = normalizeIncomeCategoryValues(item);
                    const expense = sumCategoryValues(expenseByCategory, EXPENSE_CATEGORY_KEYS);
                    const income = sumCategoryValues(incomeByCategory, INCOME_CATEGORY_KEYS);
                    const investment = Math.max(0, Number(item.investment) || 0);
                    const investmentReturn = Number.isFinite(Number(item.investmentReturn)) ? Number(item.investmentReturn) : 0;
                    return {
                        id: item.id || `${weekKey}-${safeDate.getTime()}`,
                        weekKey,
                        amount: expense,
                        expense,
                        expenseByCategory,
                        income,
                        incomeByCategory,
                        investment,
                        investmentReturn,
                        createdAt: safeDate.toISOString()
                    };

                .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

            const weeklyArchiveRecords = weeklyRecords

                    if (!/^\d{4}-W\d{2}$/.test(weekKey)) return null;

                    if (Number.isNaN(weekDate.getTime())) return null;
                    const weekEndDate = new Date(weekDate.getFullYear(), weekDate.getMonth(), weekDate.getDate() + 6);

                    const expenseByCategory = sanitizeCategoryValues(record.expenseByCategory, EXPENSE_CATEGORY_KEYS);
                    const incomeByCategory = sanitizeCategoryValues(record.incomeByCategory, INCOME_CATEGORY_KEYS);
                    const expense = roundFinanceAmount(toFiniteNumber(record.expense, 0));
                    const income = roundFinanceAmount(toFiniteNumber(record.income, 0));
                    const investment = roundFinanceAmount(toFiniteNumber(record.investment, 0));
                    const investmentReturn = roundFinanceAmount(toFiniteNumber(record.investmentReturn, 0));
                    const netBalance = roundFinanceAmount(income - expense - investment);
                    const hasValue = [expense, income, investment, investmentReturn, netBalance].some(value => Math.abs(value) > 0.000001);
                    if (!hasValue) return null;

                    const weekMatched = /^(\d{4})-W(\d{2})$/.exec(weekKey);
                    const title = weekMatched
                        ? `${weekMatched[1]}年第${Number(weekMatched[2])}周财务归档`
                        : `${weekKey} 财务归档`;
                    const subtitle = [
                        `支出${formatCurrency(expense)}`,
                        `收入${formatCurrency(income)}`,
                        `投资${formatCurrency(investment)}`,
                        `收益${formatSignedCurrency(investmentReturn)}`,
                        `结余${formatSignedCurrency(netBalance)}`
                    ].join(' · ');

                    return createArchiveRecord(
                        'finance',
                        title,
                        subtitle,
                        weekEndDate.getTime(),
                        '周报',
                        weekKey,
                        [
                            { label: '类型', value: '财务周报' },
                            { label: '周次', value: weekKey },
                            { label: '支出', value: formatCurrency(expense) },
                            { label: '收入', value: formatCurrency(income) },
                            { label: '投资', value: formatCurrency(investment) },
                            { label: '收益', value: formatSignedCurrency(investmentReturn) },
                            { label: '结余', value: formatSignedCurrency(netBalance) },
                            { label: '平账调整', value: formatSignedCurrency(0) }
                        ],
                        {
                            financeSummary: {
                                reportType: 'week',
                                weekKey,
                                expense,
                                income,
                                investment,
                                investmentReturn,
                                netBalance,
                                adjustment: 0,
                                expenseByCategory: {
                                    fixed_expense: roundFinanceAmount(toFiniteNumber(expenseByCategory.fixed_expense, 0)),
                                    variable_expense: roundFinanceAmount(toFiniteNumber(expenseByCategory.variable_expense, 0))
                                },
                                incomeByCategory: {
                                    salary_income: roundFinanceAmount(toFiniteNumber(incomeByCategory.salary_income, 0)),
                                    other_income: roundFinanceAmount(toFiniteNumber(incomeByCategory.other_income, 0))
                                }
                            }
                        }
                    );
                })
                .filter(Boolean);

            weeklyRecords.forEach(record => {
                const date = getDateFromWeekKey(record.weekKey) || new Date(record.createdAt || '');
                if (Number.isNaN(date.getTime())) return;
                const monthKey = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
                if (!monthMap.has(monthKey)) {
                    monthMap.set(monthKey, {
                        expense: 0,
                        income: 0,
                        investment: 0,
                        investmentReturn: 0,
                        adjustment: 0,
                        expenseByCategory: { fixed_expense: 0, variable_expense: 0 },
                        incomeByCategory: { salary_income: 0, other_income: 0 }
                    });
                }
                const bucket = monthMap.get(monthKey);
                const expenseByCategory = sanitizeCategoryValues(record.expenseByCategory, EXPENSE_CATEGORY_KEYS);
                const incomeByCategory = sanitizeCategoryValues(record.incomeByCategory, INCOME_CATEGORY_KEYS);
                bucket.expense += toFiniteNumber(record.expense, 0);
                bucket.income += toFiniteNumber(record.income, 0);
                bucket.investment += toFiniteNumber(record.investment, 0);
                bucket.investmentReturn += toFiniteNumber(record.investmentReturn, 0);
                bucket.expenseByCategory.fixed_expense += toFiniteNumber(expenseByCategory.fixed_expense, 0);
                bucket.expenseByCategory.variable_expense += toFiniteNumber(expenseByCategory.variable_expense, 0);
                bucket.incomeByCategory.salary_income += toFiniteNumber(incomeByCategory.salary_income, 0);
                bucket.incomeByCategory.other_income += toFiniteNumber(incomeByCategory.other_income, 0);
            });

            Object.keys(adjustments).forEach(monthKey => {
                if (!monthMap.has(monthKey)) {
                    monthMap.set(monthKey, {
                        expense: 0,
                        income: 0,
                        investment: 0,
                        investmentReturn: 0,
                        adjustment: 0,
                        expenseByCategory: { fixed_expense: 0, variable_expense: 0 },
                        incomeByCategory: { salary_income: 0, other_income: 0 }
                    });
                }
                monthMap.get(monthKey).adjustment += toFiniteNumber(adjustments[monthKey], 0);
            });

            const monthKeys = [...monthMap.keys()].sort((a, b) => b.localeCompare(a));
            const monthArchiveRecords = monthKeys
                .map(monthKey => {
                    const matched = monthKeyPattern.exec(monthKey);
                    if (!matched) return null;
                    const year = Number(matched[1]);
                    const month = Number(matched[2]);
                    if (!Number.isInteger(year) || !Number.isInteger(month) || month < 1 || month > 12) return null;

                    const bucket = monthMap.get(monthKey);
                    const expense = roundFinanceAmount(bucket.expense + bucket.adjustment);
                    const income = roundFinanceAmount(bucket.income);
                    const investment = roundFinanceAmount(bucket.investment);
                    const investmentReturn = roundFinanceAmount(bucket.investmentReturn);
                    const netBalance = roundFinanceAmount(income - expense - investment);
                    const hasValue = [expense, income, investment, investmentReturn, netBalance].some(value => Math.abs(value) > 0.000001);
                    if (!hasValue) return null;

                    const subtitle = [
                        `支出${formatCurrency(expense)}`,
                        `收入${formatCurrency(income)}`,
                        `投资${formatCurrency(investment)}`,
                        `收益${formatSignedCurrency(investmentReturn)}`,
                        `结余${formatSignedCurrency(netBalance)}`
                    ].join(' · ');

                    return createArchiveRecord(
                        'finance',
                        `${year}年${month}月财务归档`,
                        subtitle,
                        new Date(year, month, 0).getTime(),
                        '月报',
                        monthKey,
                        [
                            { label: '类型', value: '财务月报' },
                            { label: '月份', value: `${year}-${String(month).padStart(2, '0')}` },
                            { label: '支出', value: formatCurrency(expense) },
                            { label: '收入', value: formatCurrency(income) },
                            { label: '投资', value: formatCurrency(investment) },
                            { label: '收益', value: formatSignedCurrency(investmentReturn) },
                            { label: '结余', value: formatSignedCurrency(netBalance) },
                            { label: '平账调整', value: formatSignedCurrency(bucket.adjustment) }
                        ],
                        {
                            financeSummary: {
                                reportType: 'month',
                                monthKey,
                                expense,
                                income,
                                investment,
                                investmentReturn,
                                netBalance,
                                adjustment: roundFinanceAmount(bucket.adjustment),
                                expenseByCategory: {
                                    fixed_expense: roundFinanceAmount(toFiniteNumber(bucket.expenseByCategory.fixed_expense, 0)),
                                    variable_expense: roundFinanceAmount(toFiniteNumber(bucket.expenseByCategory.variable_expense, 0))
                                },
                                incomeByCategory: {
                                    salary_income: roundFinanceAmount(toFiniteNumber(bucket.incomeByCategory.salary_income, 0)),
                                    other_income: roundFinanceAmount(toFiniteNumber(bucket.incomeByCategory.other_income, 0))
                                }
                            }
                        }
                    );
                })
                .filter(Boolean);

            return [...weeklyArchiveRecords, ...monthArchiveRecords];
        }

        function buildAllArchiveRecords() {
            return [
                ...buildTodoRecords(),
                ...buildOkrRecords(),
                ...buildBookRecords(),
                ...buildReviewRecords(),
                ...buildFinanceRecords()
            ].sort((a, b) => {
                const aTs = Number.isFinite(a.dateTs) ? a.dateTs : -Infinity;
                const bTs = Number.isFinite(b.dateTs) ? b.dateTs : -Infinity;
                if (aTs !== bTs) return bTs - aTs;
                return String(a.title || '').localeCompare(String(b.title || ''), 'zh-CN');
            }).map((item, index) => ({
                ...item,
                id: `archive-${index}`
            }));
        }

        function buildArchiveOverview(records) {
            const counters = {
                all: records.length,
                todo: 0,

                book: 0,

            };
            records.forEach(item => {
                if (Object.prototype.hasOwnProperty.call(counters, item.type)) {
                    counters[item.type] += 1;
                }
            });
            return counters;
        }

        function renderArchiveGenericListItem(item) {

                        <div class="archive-item-icon ${typeMeta.iconClass}">${typeMeta.icon}</div>

        function getFilteredArchiveRecords() {
            const keyword = archiveSearchKeyword.trim().toLowerCase();
            const startTs = parseYmdToTs(archiveDateStart);
            const endTs = parseYmdToTs(archiveDateEnd, true);
            return archiveRecords.filter(record => {
                if (activeArchiveType !== 'all' && record.type !== activeArchiveType) return false;
                if (activeArchiveType === 'finance') {
                    const reportType = String(record?.detailData?.financeSummary?.reportType || 'month');
                    if (reportType !== activeFinanceReportType) return false;
                }
                if ((startTs !== null || endTs !== null) && !Number.isFinite(record.dateTs)) return false;
                if (startTs !== null && record.dateTs < startTs) return false;
                if (endTs !== null && record.dateTs > endTs) return false;
                if (keyword && !record.searchText.includes(keyword)) return false;
                return true;
            });
        }

        function renderArchiveList() {
            const listEl = document.getElementById('archiveList');
            if (!listEl) return;
            const filtered = getFilteredArchiveRecords();
            currentRenderedArchiveRecords = filtered;

            if (filtered.length === 0) {
                listEl.innerHTML = `
                    <div class="archive-empty">
                        <div class="archive-empty-title">没有匹配的归档记录</div>
                        <div class="archive-empty-meta">可尝试切换类别、调整起止日期或修改搜索关键词。</div>
                    </div>
                `;
                return;
            }

            listEl.innerHTML = filtered.map((item) => renderArchiveGenericListItem(item)).join('');
        }

        function getArchiveRecordById(recordId) {
            if (!recordId) return null;
            return currentRenderedArchiveRecords.find(item => String(item.id) === String(recordId))
                || archiveRecords.find(item => String(item.id) === String(recordId))
                || null;
        }

        function buildArchiveDetailMap(record) {
            const detailItems = Array.isArray(record?.detailItems) ? record.detailItems : [];
            return detailItems.reduce((acc, item) => {
                const key = String(item?.label || '').trim();
                if (!key) return acc;
                acc[key] = String(item?.value ?? '--');
                return acc;
            }, {});
        }

        function getArchiveDetailValue(detailMap, key, fallback = '--') {
            const value = detailMap[key];
            if (value === undefined || value === null || value === '') return fallback;
            return String(value);
        }

        function parseArchiveProgressPair(value) {
            const matched = /^(\d+)\s*\/\s*(\d+)$/.exec(String(value || '').trim());
            if (!matched) return { current: 0, total: 1 };
            const current = Math.max(0, Number(matched[1]) || 0);
            const total = Math.max(1, Number(matched[2]) || 1);
            return { current: Math.min(current, total), total };
        }

        function parseArchiveScore(value) {
            const matched = /(\d+(?:\.\d+)?)/.exec(String(value || ''));
            if (!matched) return 7;
            return Math.max(0, Math.min(10, Number(matched[1]) || 7));
        }

        function getArchiveScoreToneClass(score) {
            const value = Number(score) || 0;
            if (value <= 3) return 'score-tone-deep-red';
            if (value <= 5) return 'score-tone-red';
            if (value <= 7) return 'score-tone-yellow';
            return 'score-tone-green';
        }

        function getArchiveScoreCheerText(score) {
            const value = Number(score) || 0;
            if (value <= 3) return '今天需要重启';
            if (value <= 5) return '还可以更稳';
            if (value <= 7) return '状态回暖中';
            if (value <= 8) return '今天很不错';
            return '状态拉满';
        }

        function normalizeArchiveEmotionArousal(value) {
            const text = String(value || '').trim();
            return text === '高' || text === '低' ? text : '';
        }

        function normalizeArchiveEmotionValence(value) {
            const text = String(value || '').trim();
            return text === '积极' || text === '消极' ? text : '';
        }

        function normalizeArchiveEmotionIntensity(value) {
            const text = String(value || '').trim();
            return ARCHIVE_REVIEW_EMOTION_INTENSITY_OPTIONS.includes(text) ? text : '';
        }

        function splitArchiveEmotionText(value) {
            return String(value || '')
                .replace(/[“”"'`]/g, '')
                .split(/[、，,\/]/)
                .map(item => item.trim())
                .filter(Boolean);
        }

        function getArchiveEmotionGroupByMood(mood) {
            const text = String(mood || '').trim();
            if (!text) return null;
            return ARCHIVE_REVIEW_EMOTION_GROUPS.find(group => group.emotions.includes(text)) || null;
        }

        function resolveArchiveEmotionMeta(mood, arousal = '', valence = '') {
            const normalizedArousal = normalizeArchiveEmotionArousal(arousal);
            const normalizedValence = normalizeArchiveEmotionValence(valence);
            if (normalizedArousal && normalizedValence) {
                return { arousal: normalizedArousal, valence: normalizedValence };
            }

            const presetGroup = getArchiveEmotionGroupByMood(mood);
            if (presetGroup) {
                return { arousal: presetGroup.arousal, valence: presetGroup.valence };
            }

            return {
                arousal: normalizedArousal || '低',
                valence: normalizedValence || '积极'
            };
        }

        function normalizeArchiveEmotionTag(tag, fallbackIntensity = '中') {
            const mood = String(tag?.mood || '').trim();
            if (!mood || mood === '--') return null;
            const meta = resolveArchiveEmotionMeta(mood, tag?.arousal, tag?.valence);
            const intensity = normalizeArchiveEmotionIntensity(tag?.intensity || tag?.emotionIntensity || tag?.energy)
                || normalizeArchiveEmotionIntensity(fallbackIntensity)
                || '中';
            return {
                mood,
                arousal: meta.arousal,
                valence: meta.valence,
                intensity
            };
        }

        function normalizeArchiveEmotionTags(tags, fallbackMood = '平静', fallbackArousal = '', fallbackValence = '', fallbackIntensity = '中') {
            const normalized = [];
            const seen = new Set();
            const pushTag = (rawTag) => {
                const tag = normalizeArchiveEmotionTag(rawTag, fallbackIntensity);
                if (!tag) return;
                const key = `${tag.mood}__${tag.arousal}__${tag.valence}`;
                if (seen.has(key)) return;
                seen.add(key);
                normalized.push(tag);
            };

            if (Array.isArray(tags)) {
                tags.forEach(pushTag);
            }

            if (!normalized.length) {
                const moods = splitArchiveEmotionText(fallbackMood);
                moods.forEach(mood => pushTag({
                    mood,
                    arousal: fallbackArousal,
                    valence: fallbackValence,
                    intensity: fallbackIntensity
                }));
            }

            if (!normalized.length) {
                pushTag({
                    mood: '平静',
                    arousal: fallbackArousal || '低',
                    valence: fallbackValence || '积极',
                    intensity: fallbackIntensity
                });
            }

            return normalized;
        }

        function getArchiveEmotionIntensityScale(value) {
            const intensity = normalizeArchiveEmotionIntensity(value) || '中';
            const scales = { 很高: 1, 高: 0.82, 中: 0.64, 低: 0.46, 很低: 0.28 };
            return scales[intensity] || scales.中;
        }

        function getArchiveEmotionIntensityPrefix(value) {
            const intensity = normalizeArchiveEmotionIntensity(value) || '中';
            const prefixes = {
                很高: '非常',
                高: '很',
                中: '',
                低: '一般',
                很低: '有些许'
            };
            return prefixes[intensity] || '';
        }

        function buildArchiveEmotionIntensityPalette(arousal, valence, intensity) {
            const scale = getArchiveEmotionIntensityScale(intensity);
            const key = `${valence}-${arousal}`;
            const toneMap = {
                '消极-高': { hue: 4, satBase: 22, satRange: 60, lightBase: 94, lightDrop: 26, text: '#7a2222' },
                '积极-高': { hue: 46, satBase: 28, satRange: 56, lightBase: 95, lightDrop: 24, text: '#5d4700' },
                '消极-低': { hue: 25, satBase: 2, satRange: 14, lightBase: 96, lightDrop: 18, text: '#4f4a45' },
                '积极-低': { hue: 132, satBase: 22, satRange: 52, lightBase: 95, lightDrop: 24, text: '#1f5d35' }
            };
            const tone = toneMap[key] || toneMap['积极-低'];

            const sat = Math.round(tone.satBase + tone.satRange * scale);
            const light = Math.round(tone.lightBase - tone.lightDrop * scale);
            const borderSat = key === '消极-低' ? sat + 2 : Math.min(90, sat + 10);
            const borderLight = Math.max(28, light - 14);

            return {
                background: `hsl(${tone.hue} ${sat}% ${light}%)`,
                border: `hsl(${tone.hue} ${borderSat}% ${borderLight}%)`,
                text: tone.text
            };
        }

        function parseArchiveCurrency(value) {
            const normalized = String(value || '').replace(/[^0-9.+-]/g, '');
            const num = Number(normalized);
            return Number.isFinite(num) ? num : 0;
        }

        function renderArchiveGenericDetail(record) {
            const detailItems = Array.isArray(record.detailItems) && record.detailItems.length > 0

        function renderArchiveTodoDetail(record, detailMap) {

                            <div class="todo-meta">
                                ${dueDate && dueDate !== '--' ? `<span class="todo-date">${escapeHtml(dueDate)}</span>` : ''}
                                ${important ? '<span class="todo-important-tag">重</span>' : ''}

        function renderArchiveOkrDetail(record, detailMap) {
            const okr = record.detailData && record.detailData.okr;
            if (okr) {
                const okrColor = normalizeArchiveOkrColor(okr.color);
                const totalKrs = (okr.krs && okr.krs.length) || 1;
                const getKrWeightValue = (kr) => {
                    const weight = parseInt(kr.weight, 10);
                    return Number.isFinite(weight) ? weight : Math.round(100 / totalKrs);
                };
                let totalWeight = 0;
                let completedWeight = 0;
                (okr.krs || []).forEach((kr) => {
                    archiveNormalizeKr(kr);
                    const w = getKrWeightValue(kr);
                    totalWeight += w;
                    completedWeight += w * archiveGetKrProgress(kr);
                });
                const progress = totalWeight > 0 ? Math.round((completedWeight / totalWeight) * 100) : 0;
                const circumference = 2 * Math.PI * 35;
                const offset = circumference - (progress / 100) * circumference;

                const dateRange = okr.startDate && okr.endDate
                    ? `${formatArchiveOkrMonthDay(okr.startDate)} - ${formatArchiveOkrMonthDay(okr.endDate)}`
                    : String(okr.period || '');
                const motivationBlock = String(okr.motivation || '').trim()
                    ? `<div class="okr-archive-detail-block"><span class="okr-archive-detail-block-label">动机</span><div class="okr-archive-detail-block-body">${archiveMultilineHtml(okr.motivation)}</div></div>`
                    : '';
                const feasibilityBlock = String(okr.feasibility || '').trim()

            const emotionTags = normalizeArchiveEmotionTags(

            const moodHtml = emotionTags.map(tag => {

                const moodText = escapeHtml(`${getArchiveEmotionIntensityPrefix(tagIntensity)}${tag.mood}`);

            const summary = reviewDetail.summary !== undefined

            const stop = reviewDetail.stop !== undefined ? String(reviewDetail.stop || '') : getArchiveDetailValue(detailMap, '停止', '--');

            const combinedUser = [

            const compactBodyHtml = reviewBodyFold

            const extraClass = opts.forDetail ? ' archive-detail-review-card' : ' archive-review-record-card';
            const clickableClass = opts.clickable ? ' archive-review-clickable' : '';

            return `

                        </div>

                        <div class="archive-finance-kpi ${netBalance > 0 ? 'is-balance-positive' : netBalance < 0 ? 'is-expense' : 'is-balance-neutral'}"><span>净结余</span><strong>${formatSignedCurrency(netBalance)}</strong></div>
                    </div>

        function renderArchiveDetailContent(record) {
            const detailMap = buildArchiveDetailMap(record);
            if (record.type === 'todo') return renderArchiveTodoDetail(record, detailMap);
            if (record.type === 'okr') return renderArchiveOkrDetail(record, detailMap);

            const titleEl = document.getElementById('archiveDetailTitle');
            const subtitleEl = document.getElementById('archiveDetailSubtitle');
            const metaEl = document.getElementById('archiveDetailMeta');
            const listEl = document.getElementById('archiveDetailList');
            const footerEl = document.getElementById('archiveDetailFooter');
            if (!modalEl || !titleEl || !subtitleEl || !metaEl || !listEl) return;

            currentArchiveDetailRecord = record;

            const typeMeta = ARCHIVE_TYPE_META[record.type] || ARCHIVE_TYPE_META.all;
            titleEl.textContent = record.type === 'review'
                ? formatDate(record.dateTs)
                : (record.title || '归档详情');
            subtitleEl.textContent = `${typeMeta.label} · ${record.badge || typeMeta.label}`;

        function fillArchiveFinanceHistoryFormByWeek(weekKey) {
            const weekInputEl = document.getElementById('archiveFinanceWeekInput');
            const investmentInputEl = document.getElementById('archiveFinanceInvestmentInput');
            const fixedExpenseInputEl = document.getElementById('archiveFinanceFixedExpenseInput');
            const variableExpenseInputEl = document.getElementById('archiveFinanceVariableExpenseInput');
            const salaryIncomeInputEl = document.getElementById('archiveFinanceSalaryIncomeInput');
            const otherIncomeInputEl = document.getElementById('archiveFinanceOtherIncomeInput');
            const investmentReturnInputEl = document.getElementById('archiveFinanceInvestmentReturnInput');
            const subtitleEl = document.getElementById('archiveFinanceHistorySubtitle');
            if (!weekInputEl || !investmentInputEl || !fixedExpenseInputEl || !variableExpenseInputEl || !salaryIncomeInputEl || !otherIncomeInputEl || !investmentReturnInputEl || !subtitleEl) {
                return;
            }

            const normalizedWeekKey = String(weekKey || '').trim();
            if (!/^\d{4}-W\d{2}$/.test(normalizedWeekKey)) {
                subtitleEl.textContent = '请选择需要修改的周次';
                return;
            }

            const records = getWeeklyExpenseRecords();
            const record = records.find(item => item.weekKey === normalizedWeekKey) || null;
            const expenseByCategory = sanitizeCategoryValues(record?.expenseByCategory, EXPENSE_CATEGORY_KEYS);
            const incomeByCategory = sanitizeCategoryValues(record?.incomeByCategory, INCOME_CATEGORY_KEYS);

            weekInputEl.value = normalizedWeekKey;
            investmentInputEl.value = normalizeAmountForInput(Number(record?.investment) || 0);
            fixedExpenseInputEl.value = normalizeAmountForInput(Number(expenseByCategory.fixed_expense) || 0);
            variableExpenseInputEl.value = normalizeAmountForInput(Number(expenseByCategory.variable_expense) || 0);
            salaryIncomeInputEl.value = normalizeAmountForInput(Number(incomeByCategory.salary_income) || 0);
            otherIncomeInputEl.value = normalizeAmountForInput(Number(incomeByCategory.other_income) || 0);
            investmentReturnInputEl.value = normalizeAmountForInput(Number(record?.investmentReturn) || 0);

            subtitleEl.textContent = record
                ? `${normalizedWeekKey} · 已载入记录（录入日期 ${formatDate(parseDateTs(record.createdAt))}）`
                : `${normalizedWeekKey} · 暂无记录，保存后将创建`;
        }

            const currentWeekKey = getWeekKey(new Date());
            openArchiveFinanceHistoryModal();

        function saveArchiveFinanceHistoryRecord() {
            const weekInputEl = document.getElementById('archiveFinanceWeekInput');
            const investmentInputEl = document.getElementById('archiveFinanceInvestmentInput');
            const fixedExpenseInputEl = document.getElementById('archiveFinanceFixedExpenseInput');
            const variableExpenseInputEl = document.getElementById('archiveFinanceVariableExpenseInput');
            const salaryIncomeInputEl = document.getElementById('archiveFinanceSalaryIncomeInput');
            const otherIncomeInputEl = document.getElementById('archiveFinanceOtherIncomeInput');
            const investmentReturnInputEl = document.getElementById('archiveFinanceInvestmentReturnInput');
            if (!weekInputEl || !investmentInputEl || !fixedExpenseInputEl || !variableExpenseInputEl || !salaryIncomeInputEl || !otherIncomeInputEl || !investmentReturnInputEl) return;

            const weekKey = String(weekInputEl.value || '').trim();
            if (!/^\d{4}-W\d{2}$/.test(weekKey)) {
                alert('请选择有效周次');
                weekInputEl.focus();
                return;
            }

            const parseNonNegative = (raw) => {
                const value = Number(String(raw).trim());
                if (!Number.isFinite(value) || value < 0) return null;
                return value;
            };
            const parseSigned = (raw) => {
                const text = String(raw).trim();
                if (text === '') return 0;
                const value = Number(text);
                return Number.isFinite(value) ? value : null;
            };

            const fixedExpense = parseNonNegative(fixedExpenseInputEl.value);
            const variableExpense = parseNonNegative(variableExpenseInputEl.value);
            const salaryIncome = parseNonNegative(salaryIncomeInputEl.value);
            const otherIncome = parseNonNegative(otherIncomeInputEl.value);
            const investment = parseNonNegative(investmentInputEl.value);
            const investmentReturn = parseSigned(investmentReturnInputEl.value);
            if ([fixedExpense, variableExpense, salaryIncome, otherIncome, investment, investmentReturn].includes(null)) {
                alert('请输入有效金额（支出/收入/投资需大于等于 0，收益可正可负）');
                return;
            }

            const records = getWeeklyExpenseRecords();
            const index = records.findIndex(record => record.weekKey === weekKey);
            const expenseByCategory = sanitizeCategoryValues({
                fixed_expense: fixedExpense,
                variable_expense: variableExpense
            }, EXPENSE_CATEGORY_KEYS);
            const incomeByCategory = sanitizeCategoryValues({
                salary_income: salaryIncome,
                other_income: otherIncome
            }, INCOME_CATEGORY_KEYS);
            const expense = roundFinanceAmount(sumCategoryValues(expenseByCategory, EXPENSE_CATEGORY_KEYS));
            const income = roundFinanceAmount(sumCategoryValues(incomeByCategory, INCOME_CATEGORY_KEYS));
            const investmentValue = roundFinanceAmount(Number(investment) || 0);
            const investmentReturnValue = roundFinanceAmount(Number(investmentReturn) || 0);
            const roundedExpenseByCategory = Object.fromEntries(
                EXPENSE_CATEGORY_KEYS.map(k => [k, roundFinanceAmount(expenseByCategory[k] || 0)])
            );
            const roundedIncomeByCategory = Object.fromEntries(
                INCOME_CATEGORY_KEYS.map(k => [k, roundFinanceAmount(incomeByCategory[k] || 0)])
            );
            const weekDate = getDateFromWeekKey(weekKey) || new Date();

            if (index >= 0) {
                records[index] = {
                    ...records[index],
                    weekKey,
                    amount: expense,
                    expense,
                    expenseByCategory: roundedExpenseByCategory,
                    income,
                    incomeByCategory: roundedIncomeByCategory,
                    investment: investmentValue,
                    investmentReturn: investmentReturnValue
                };
            } else {
                records.push({
                    id: `${weekKey}-${weekDate.getTime()}`,
                    weekKey,
                    amount: expense,
                    expense,
                    expenseByCategory: roundedExpenseByCategory,
                    income,
                    incomeByCategory: roundedIncomeByCategory,
                    investment: investmentValue,
                    investmentReturn: investmentReturnValue,
                    createdAt: weekDate.toISOString()
                });
            }

            records.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
            localStorage.setItem(plannerArchiveScopedKey('planner_weekly_expenses'), JSON.stringify(records));
            fillArchiveFinanceHistoryFormByWeek(weekKey);
            closeArchiveFinanceHistoryModal();
            loadArchiveData();
        }

        function initArchiveInteractions() {
            const listEl = document.getElementById('archiveList');
            if (listEl) {
                listEl.addEventListener('click', event => {
                    const target = event.target instanceof Element ? event.target.closest('[data-archive-id]') : null;
                    if (!target) return;
                    const recordId = target.getAttribute('data-archive-id');
                    if (!recordId) return;
                    openArchiveDetailModal(recordId);
                });

                listEl.addEventListener('keydown', event => {
                    if (event.key !== 'Enter' && event.key !== ' ') return;
                    const target = event.target instanceof Element ? event.target.closest('[data-archive-id]') : null;
                    if (!target) return;
                    event.preventDefault();
                    const recordId = target.getAttribute('data-archive-id');
                    if (!recordId) return;
                    openArchiveDetailModal(recordId);
                });
            }

            const weekInputEl = document.getElementById('archiveFinanceWeekInput');
            if (weekInputEl) {
                weekInputEl.addEventListener('change', () => {
                    fillArchiveFinanceHistoryFormByWeek(weekInputEl.value);
                });
            }

            ['archiveDateStart', 'archiveDateEnd'].forEach(id => {
                const inputEl = document.getElementById(id);
                if (!inputEl) return;
                inputEl.addEventListener('input', () => syncArchiveDateFieldState(inputEl));
                inputEl.addEventListener('change', () => syncArchiveDateFieldState(inputEl));
            });
        }

        function loadArchiveData() {
            archiveRecords = buildAllArchiveRecords();
            renderArchiveOverview(archiveRecords);
            renderArchiveTypeTabs();
            renderArchiveFinanceActionRow();
            renderArchiveList();
            syncArchiveDateFieldsState();
        }

        function setArchiveType(type) {
            if (!Object.prototype.hasOwnProperty.call(ARCHIVE_TYPE_META, type)) return;
            activeArchiveType = type;
            renderArchiveTypeTabs();
            renderArchiveFinanceActionRow();
            renderArchiveList();
        }

        function handleArchiveSearchInput() {
            const inputEl = document.getElementById('archiveSearchInput');
            archiveSearchKeyword = inputEl ? String(inputEl.value || '') : '';
            renderArchiveList();
        }

        function handleArchiveDateRangeInput(source = 'manual') {
            const startInput = document.getElementById('archiveDateStart');
            const endInput = document.getElementById('archiveDateEnd');
            archiveDateStart = startInput ? normalizeArchiveDateText(startInput.value) : '';
            archiveDateEnd = endInput ? normalizeArchiveDateText(endInput.value) : '';

            if (source === 'start' && archiveDateStart) {
                const autoEnd = addOneMonthYmd(archiveDateStart);
                if (autoEnd) archiveDateEnd = autoEnd;
            }

            if (startInput) startInput.value = archiveDateStart;
            if (endInput) endInput.value = archiveDateEnd;

            const startTs = parseYmdToTs(archiveDateStart);
            const endTs = parseYmdToTs(archiveDateEnd);
            if (startTs !== null && endTs !== null && startTs > endTs) {
                const nextStart = archiveDateEnd;
                const nextEnd = archiveDateStart;
                archiveDateStart = nextStart;
                archiveDateEnd = nextEnd;
                if (startInput) startInput.value = nextStart;
                if (endInput) endInput.value = nextEnd;
            }

            syncArchiveDateFieldsState();
            renderArchiveList();
        }

        function clearArchiveDateRange() {
            archiveDateStart = '';
            archiveDateEnd = '';
            const startInput = document.getElementById('archiveDateStart');
            const endInput = document.getElementById('archiveDateEnd');
            if (startInput) startInput.value = '';
            if (endInput) endInput.value = '';
            syncArchiveDateFieldsState();
            renderArchiveList();
        }

        function syncArchiveDateFieldState(inputEl) {
            if (!inputEl) return;
            const fieldEl = inputEl.closest('.archive-date-field');
            if (!fieldEl) return;
            fieldEl.classList.toggle('is-empty', !String(inputEl.value || '').trim());
        }

        function syncArchiveDateFieldsState() {
            syncArchiveDateFieldState(document.getElementById('archiveDateStart'));
            syncArchiveDateFieldState(document.getElementById('archiveDateEnd'));
        }

        function toggleSidebar() {
            return;
        }

        document.addEventListener('DOMContentLoaded', () => {
            initArchiveInteractions();
            loadArchiveData();
            document.addEventListener('keydown', event => {
                if (event.key !== 'Escape') return;
                const financeModalEl = document.getElementById('archiveFinanceHistoryModal');
                if (financeModalEl && !financeModalEl.hidden) {
                    closeArchiveFinanceHistoryModal();
                    return;
                }
                const detailModalEl = document.getElementById('archiveDetailModal');
                if (detailModalEl && !detailModalEl.hidden) {
                    closeArchiveDetailModal();
                }
            });
        });

        window.addEventListener('planner-storage-synced', () => {
            loadArchiveData();
        });

        window.addEventListener('storage', (event) => {
            const key = event.key || '';
            const pref = window.PlannerAuth && PlannerAuth.getPlannerDataKeyPrefix && PlannerAuth.getPlannerDataKeyPrefix();
            if (pref) {
                if (key && key.indexOf(pref) !== 0) return;
            } else if (key && key !== 'reviews' && !key.startsWith('planner_')) {
                return;
            }
            loadArchiveData();
        });

</script>

            color: var(--warm-gray-900);
        }

        .archive-finance-panels {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .archive-finance-panel {
            border: 1px solid var(--warm-gray-100);
            background: #fff;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .archive-finance-panel h4 {
            font-size: 12px;
            color: var(--warm-gray-700);
            line-height: 1.2;
            margin: 0;
        }

        .archive-finance-breakdown-row {
            display: grid;
            grid-template-columns: 56px 1fr auto;
            gap: 8px;
            align-items: center;
        }

        .archive-finance-breakdown-label {
            font-size: 11px;
            color: var(--warm-gray-500);
            white-space: nowrap;
        }

        .archive-finance-breakdown-track {
            position: relative;
            height: 8px;
            border-radius: 999px;
            background: var(--warm-gray-100);
            overflow: hidden;
        }

        .archive-finance-breakdown-fill {
            position: absolute;
            inset: 0 auto 0 0;
            border-radius: inherit;
        }

        .archive-finance-breakdown-fill.is-fixed {
            background: #d0a98f;
        }

        .archive-finance-breakdown-fill.is-variable {
            background: #c98b8b;
        }

        .archive-finance-breakdown-fill.is-salary {
            background: #8eb7a0;
        }

        .archive-finance-breakdown-fill.is-other {
            background: #86a5b8;
        }

        .archive-finance-breakdown-value {
            font-size: 11px;
            color: var(--warm-gray-600);
            white-space: nowrap;
        }

        .archive-finance-adjustment {
            font-size: 12px;
            color: var(--warm-gray-600);
            border-top: 1px dashed var(--warm-gray-200);
            padding-top: 8px;
        }

        .archive-finance-adjustment strong {
            color: var(--warm-gray-900);
            font-weight: 600;
        }

        @media (max-width: 980px) {
            .archive-overview {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .archive-filter-tabs {
                width: 100%;
            }

            .archive-toolbar-row-top {
                align-items: stretch;
                width: 100%;
            }

            .archive-toolbar-row-history {
                justify-content: flex-start;
            }

            .archive-finance-report-filter {
                margin-left: 0;
            }

            .archive-search-wrap {
                width: 100%;
                max-width: none;
                flex-basis: 100%;
            }

            .archive-date-range-simple {
                width: 100%;
                justify-content: flex-start;
            }

            .archive-date-field {
                width: calc((100% - 74px) / 2);
                min-width: 126px;
            }

            .archive-date-input {
                width: 100%;
            }
        }

        @media (max-width: 768px) {
            .archive-item-head {
                flex-direction: row;
                align-items: center;
                gap: 10px;
            }

            .archive-item-meta {
                gap: 6px;
            }

            .archive-overview {
                grid-template-columns: 1fr;
            }

            .archive-date-input {
                width: 100%;
            }

            .archive-date-field {
                width: 100%;
            }

            .archive-finance-modal,
            .archive-detail-modal {
                padding: 12px;
            }

            .archive-finance-dialog,
            .archive-detail-dialog {
                max-height: calc(100vh - 24px);
            }

            .archive-finance-body,
            .archive-detail-body {
                padding: 12px 14px 6px;
            }

            .archive-finance-form-grid {
                grid-template-columns: 1fr;
            }

            .archive-finance-actions {
                padding: 10px 14px 14px;
                flex-direction: column;
            }

            .archive-finance-actions .btn {
                width: 100%;
            }

            .archive-detail-item {
                grid-template-columns: 1fr;
                gap: 6px;
            }

            .archive-finance-kpi-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .archive-finance-panels {
                grid-template-columns: 1fr;
            }

            .archive-finance-breakdown-row {
                grid-template-columns: 1fr;
                gap: 6px;
            }
        }
    </style>
    <script src="no-multiline.js"></script>
</body>
</html>
