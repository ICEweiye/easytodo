<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人规划管理</title>
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <script src="utf8-utils.js"></script>
    <script src="storage-sync.js"></script>
    <script src="backup-client.js"></script>
    <script src="theme.js"></script>
    <script src="reward-pool.js"></script>
</head>
<body class="home-page">
    <div class="app-layout">
        <!-- 左侧导航栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo"><img class="logo-img" src="logo.svg" alt="Logo"></div>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item active">
                    <span class="nav-text">主页</span>
                </a>
                <a href="nav.html" class="nav-item">
                    <span class="nav-text">导航</span>
                </a>
                <a href="stats.html" class="nav-item">
                    <span class="nav-text">统计</span>
                </a>
                <a href="review.html" class="nav-item">
                    <span class="nav-text">复盘</span>
                </a>
                <a href="archive.html" class="nav-item">
                    <span class="nav-text">归档</span>
                </a>
            </nav></aside>
<!-- 主内容区 -->
        <main class="main-content with-global-topbar">
            <header class="global-topbar" aria-label="页面工具栏">
                <div class="global-topbar-card">
                    <a class="global-topbar-logo" href="index.html" aria-label="返回主页">
                        <img class="global-topbar-logo-img" src="logo.svg" alt="">
                        <span class="global-topbar-brand">
                            <span class="global-topbar-brand-main"><span class="brand-easy">easy</span><span class="brand-os">OS</span></span>
                            <span class="global-topbar-brand-sub">light your life</span>
                        </span>
                    </a>
                    <div class="global-topbar-actions">
                    <button type="button" class="nav-icon-btn global-tool-btn nav-backup-btn" style="display:none !important;" onclick="runDatabaseBackup()" title="备份数据库" aria-label="备份数据库">
                        <span class="nav-backup-icon" aria-hidden="true">
                            <svg t="1773543480237" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="5912">
                                <path d="M42.666667 768c0 46.933333 38.4 85.333333 85.333333 85.333333h768c46.933333 0 85.333333-38.4 85.333333-85.333333v-170.666667H42.666667v170.666667z m672-64h106.666666c17.066667 0 32 14.933333 32 32s-14.933333 32-32 32h-106.666666c-17.066667 0-32-14.933333-32-32s14.933333-32 32-32zM829.866667 230.4C819.2 194.133333 785.066667 170.666667 748.8 170.666667H275.2c-36.266667 0-70.4 23.466667-81.066667 59.733333L42.666667 533.333333h938.666666l-151.466666-302.933333zM746.666667 473.6v17.066667c-2.133333-21.333333-10.666667-40.533333-23.466667-57.6-12.8-17.066667-27.733333-34.133333-46.933333-46.933334-19.2-12.8-40.533333-23.466667-66.133334-32-23.466667-8.533333-49.066667-12.8-76.8-12.8h-17.066666c-6.4 0-10.666667 0-17.066667 2.133334-6.4 0-10.666667 2.133333-14.933333 2.133333-4.266667 0-10.666667 2.133333-14.933334 4.266667v74.666666l-170.666666-115.2 170.666666-113.066666v64c38.4 0 74.666667 6.4 106.666667 17.066666 34.133333 10.666667 64 25.6 87.466667 44.8 25.6 19.2 44.8 42.666667 59.733333 68.266667 17.066667 25.6 23.466667 53.333333 23.466667 83.2z" p-id="5913" fill="currentColor"></path>
                            </svg>
                        </span>
                    </button>
                    <button type="button" class="nav-icon-btn global-tool-btn nav-settings-btn" style="display:none !important;" onclick="openPlannerSettings()" title="设置" aria-label="设置">
                        <span class="nav-settings-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="3"></circle>
                                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82L4.21 7.2a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                            </svg>
                        </span>
                    </button>
                    <button type="button" class="global-avatar-btn" title="用户头像" aria-label="用户头像">
                        <span class="global-avatar-mark" aria-hidden="true">U</span>
                    </button>
                </div>
                </div>
            </header>
            <div class="container home-dashboard">
                <section class="home-grid">
                    <div class="home-col home-col-main">
                        <!-- 待办事项模块 -->
                        <div class="module home-module home-todo-module">
                            <div class="module-header">
                                <h2 class="module-title">待办事项</h2>
                            </div>
                            <div id="todoCalendarPanel"></div>
                        </div>

                        <!-- 目标时间轴模块 -->
                        <section class="module home-module home-timeline-module">
                            <div class="module-header">
                                <h2 class="module-title">目标时间轴</h2>
                            </div>
                            <div class="timeline-container">
                                <div class="timeline-header" id="timelineHeader"></div>
                                <div class="timeline-body" id="timelineBody"></div>
                            </div>
                        </section>

                        <!-- OKR 模块 -->
                        <section class="module home-module home-okr-module">
                            <div class="module-header">
                                <h2 class="module-title">OKR</h2>
                                <button class="add-btn" onclick="openOkrModal()">+</button>
                            </div>
                            <div class="okr-grid" id="okrGrid"></div>
                        </section>
                    </div>

                    <div class="home-col home-col-side">
                        <div class="home-review-stack">
                            <section class="module home-module home-reward-pool-module">
                                <div class="reward-pool-content" id="rewardPoolContent">
                                    <div class="reward-pool-stars">
                                        <div class="reward-pool-star-row" data-reward-pool-target="yellow-todo" title="事项">
                                            <span class="reward-star reward-star-yellow">★</span>
                                            <span class="reward-pool-label">事项</span>
                                            <span class="reward-pool-count" id="rewardYellowTodo">0</span>
                                        </div>
                                        <div class="reward-pool-star-row" data-reward-pool-target="yellow-kr" title="关键结果">
                                            <span class="reward-star reward-star-yellow">★</span>
                                            <span class="reward-pool-label">KR</span>
                                            <span class="reward-pool-count" id="rewardYellowKr">0</span>
                                        </div>
                                        <div class="reward-pool-star-row" data-reward-pool-target="yellow-review" title="复盘">
                                            <span class="reward-star reward-star-yellow">★</span>
                                            <span class="reward-pool-label">复盘</span>
                                            <span class="reward-pool-count" id="rewardYellowReview">0</span>
                                        </div>
                                        <div class="reward-pool-star-row" data-reward-pool-target="colorful" title="炫彩星">
                                            <span class="reward-star reward-star-colorful">★</span>
                                            <span class="reward-pool-count" id="rewardColorfulCount">0</span>
                                        </div>
                                    </div>
                                    <div class="reward-pool-prizes" id="rewardPoolPrizes"></div>
                                    <button type="button" class="reward-pool-add-prize-btn" onclick="openPrizeModal()">+ 添加奖品</button>
                                    <button type="button" class="reward-pool-exchange-btn" id="rewardExchangeBtn" onclick="exchangeStars()">兑换炫彩</button>
                                </div>
                            </section>

                            <section class="module home-module home-daily-review-module">
                                <div class="module-header">
                                    <h2 class="module-title">每日回顾</h2>
                                </div>
                                <div class="daily-review-content" id="dailyReviewContent">
                                    <p class="daily-review-empty">暂无复盘记录</p>
                                </div>
                            </section>
                        </div>

                        <!-- 阅读清单模块 -->
                        <section class="module home-module home-reading-module">
                            <div class="module-header">
                                <h2 class="module-title">阅读清单</h2>
                                <button class="add-btn" onclick="openBookModal()">+</button>
                            </div>
                            <div class="reading-list" id="readingList"></div>
                        </section>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- SVG 渐变定义 -->
    <svg width="0" height="0" style="position: absolute;">
        <defs>
            <linearGradient id="gradient-brown" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#8b6f5c" />
                <stop offset="100%" style="stop-color:#a08070" />
            </linearGradient>
            <linearGradient id="gradient-apricot" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#d4a88c" />
                <stop offset="100%" style="stop-color:#e8c4a8" />
            </linearGradient>
            <linearGradient id="gradient-sage" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#7a9a7d" />
                <stop offset="100%" style="stop-color:#9db4a0" />
            </linearGradient>
            <linearGradient id="gradient-pink" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#b88a8a" />
                <stop offset="100%" style="stop-color:#d4a5a5" />
            </linearGradient>
        </defs>
    </svg>

    <!-- 项目编辑弹窗 -->
    <div class="modal-overlay" id="projectModal">
        <div class="modal">
            <h3 class="modal-title">添加项目</h3>
            <div class="form-group">
                <label class="form-label">项目名称</label>
                <input type="text" class="form-input" id="projectName" placeholder="输入项目名称">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">开始日期</label>
                    <input type="date" class="form-input" id="projectStart">
                </div>
                <div class="form-group">
                    <label class="form-label">结束日期</label>
                    <input type="date" class="form-input" id="projectEnd">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">当前进度 (%)</label>
                <input type="number" class="form-input" id="projectProgress" min="0" max="100" value="0">
            </div>
            <div class="modal-actions">
                <button class="btn btn-danger" id="projectDeleteBtn" style="display:none;" onclick="deleteProject(editingId)">删除</button>
                <div style="flex:1;"></div>
                <button class="btn btn-secondary" onclick="closeModal('projectModal')">取消</button>
                <button class="btn btn-primary" onclick="saveProject()">保存</button>
            </div>
        </div>
    </div>

    <!-- OKR 编辑弹窗 -->
    <div class="modal-overlay" id="okrModal">
        <div class="modal modal-large">
            <h3 class="modal-title" id="okrModalTitle">添加目标 (O)</h3>
            <div class="form-group">
                <label class="form-label">目标名称</label>
                <input type="text" class="form-input" id="okrTitle" placeholder="例如：提升专业技能">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">开始日期</label>
                    <div class="date-picker-field">
                        <input type="text" class="form-input form-date-text-input" id="okrStartDate" placeholder="yyyy-mm-dd" inputmode="numeric" autocomplete="off">
                        <button type="button" class="date-picker-trigger" data-input-id="okrStartDate" data-native-id="okrStartDateNative" aria-label="选择开始日期">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                        </button>
                        <input type="date" class="date-picker-native-proxy" id="okrStartDateNative" tabindex="-1" aria-hidden="true">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">结束日期</label>
                    <div class="date-picker-field">
                        <input type="text" class="form-input form-date-text-input" id="okrEndDate" placeholder="yyyy-mm-dd" inputmode="numeric" autocomplete="off">
                        <button type="button" class="date-picker-trigger" data-input-id="okrEndDate" data-native-id="okrEndDateNative" aria-label="选择结束日期">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                        </button>
                        <input type="date" class="date-picker-native-proxy" id="okrEndDateNative" tabindex="-1" aria-hidden="true">
                    </div>
                </div>
            </div>
            <div class="form-group">
                <div class="okr-duration-display">
                    <span class="duration-label">持续时间：</span>
                    <span class="duration-value" id="okrDuration">-- 天</span>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">关键结果 (KR)</label>
                <div class="kr-editor-container" id="krEditorContainer">
                    <!-- 动态添加的 KR 编辑器 -->
                </div>
                <button type="button" class="add-kr-editor-btn" onclick="addKrEditor()">
                    <span>+ 添加关键结果</span>
                </button>
            </div>
            <div class="form-group">
                <label class="form-label">备注</label>
                <textarea class="form-input form-textarea" id="okrMemo" placeholder="记录一些想法、备注..." rows="3"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">颜色</label>
                <div class="color-selector" id="okrColorSelector">
                    <button type="button" class="color-btn color-brown selected" data-color="brown" title="棕色" onclick="selectOkrColor('brown')"></button>
                    <button type="button" class="color-btn color-apricot" data-color="apricot" title="杏色" onclick="selectOkrColor('apricot')"></button>
                    <button type="button" class="color-btn color-sage" data-color="sage" title="鼠尾草绿" onclick="selectOkrColor('sage')"></button>
                    <button type="button" class="color-btn color-pink" data-color="pink" title="粉色" onclick="selectOkrColor('pink')"></button>
                    <button type="button" class="color-btn color-indigo" data-color="indigo" title="靛蓝" onclick="selectOkrColor('indigo')"></button>
                    <button type="button" class="color-btn color-teal" data-color="teal" title="青色" onclick="selectOkrColor('teal')"></button>
                    <button type="button" class="color-btn color-coral" data-color="coral" title="珊瑚红" onclick="selectOkrColor('coral')"></button>
                    <button type="button" class="color-btn color-amber" data-color="amber" title="琥珀色" onclick="selectOkrColor('amber')"></button>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-danger" id="okrDeleteBtn" style="display:none;" onclick="deleteOkr(editingId)">删除</button>
                <div style="flex:1;"></div>
                <button class="btn btn-secondary" onclick="closeOkrModal()">取消</button>
                <button class="btn btn-primary" onclick="saveOkr()">保存</button>
            </div>
        </div>
    </div>

    <!-- 书籍编辑弹窗 -->
    <div class="modal-overlay" id="bookModal">
        <div class="modal">
            <h3 class="modal-title" id="bookModalTitle">添加书籍</h3>
            <div class="form-group">
                <label class="form-label">书名</label>
                <input type="text" class="form-input" id="bookTitle" placeholder="输入书名">
            </div>
            <div class="form-group">
                <label class="form-label">作者</label>
                <input type="text" class="form-input" id="bookAuthor" placeholder="输入作者（可选）">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">当前页数</label>
                    <input type="number" class="form-input" id="bookCurrent" min="0" value="0">
                </div>
                <div class="form-group">
                    <label class="form-label">总页数</label>
                    <input type="number" class="form-input" id="bookTotal" min="1" value="100">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-danger" id="bookDeleteBtn" style="display:none;" onclick="deleteBook(editingId)">删除</button>
                <div style="flex:1;"></div>
                <button class="btn btn-secondary" onclick="closeModal('bookModal')">取消</button>
                <button class="btn btn-primary" onclick="saveBook()">保存</button>
            </div>
        </div>
    </div>

    <!-- 奖品添加/编辑弹窗 -->
    <div class="modal-overlay" id="prizeModal">
        <div class="modal">
            <h3 class="modal-title" id="prizeModalTitle">添加奖品</h3>
            <div class="form-group">
                <label class="form-label">奖品名称</label>
                <div class="prize-name-wrap">
                    <select class="prize-name-emoji" id="prizeEmoji" aria-label="选择奖品图标">
                        <option value="">无</option>
                        <option value="🎁">🎁</option>
                        <option value="🍜">🍜</option>
                        <option value="🍰">🍰</option>
                        <option value="☕">☕</option>
                        <option value="🎬">🎬</option>
                        <option value="🎮">🎮</option>
                        <option value="📚">📚</option>
                        <option value="🎵">🎵</option>
                        <option value="✈️">✈️</option>
                        <option value="🏆">🏆</option>
                        <option value="💪">💪</option>
                        <option value="🌟">🌟</option>
                        <option value="🎉">🎉</option>
                    </select>
                    <input type="text" class="form-input" id="prizeName" placeholder="输入奖品名称">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">所需炫彩星数量</label>
                <input type="number" class="form-input" id="prizeCost" min="1" value="10" placeholder="兑换所需炫彩星">
            </div>
            <div class="form-group">
                <label class="form-label">价格</label>
                <div class="price-input-wrap">
                    <span class="price-input-prefix">¥</span>
                    <input type="text" class="form-input" id="prizeRealPrice">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-danger" id="prizeDeleteBtn" style="display:none;" onclick="deletePrizeFromModal()">删除</button>
                <div style="flex:1;"></div>
                <button class="btn btn-secondary" onclick="closeModal('prizeModal')">取消</button>
                <button class="btn btn-primary" onclick="savePrize()">保存</button>
            </div>
        </div>
    </div>

    <!-- 添加/编辑事项弹窗 -->
    <div class="modal-overlay" id="todoModal">
        <div class="modal">
            <h3 class="modal-title" id="todoModalTitle">添加事项</h3>
            <div class="form-group">
                <label class="form-label">事项内容</label>
                <input type="text" class="form-input" id="todoTitle" placeholder="输入事项内容">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">截止日期</label>
                    <div class="todo-due-row">
                        <input type="date" class="form-input" id="todoDueDate">
                        <button type="button" class="todo-single-day-btn" id="todoSingleDayBtn" aria-pressed="false" onclick="toggleTodoSingleDayOnly()">仅当天</button>
                    </div>
                    <input type="hidden" id="todoSingleDayOnly" value="false">
                </div>
                <div class="form-group">
                    <label class="form-label">优先级</label>
                    <div class="todo-priority-box">
                        <label class="todo-important-toggle">
                            <input type="checkbox" id="todoImportant">
                            <span>标记为重要事项</span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">关联 OKR</label>
                <div class="custom-select" id="todoOkrSelect">
                    <div class="custom-select-trigger" onclick="toggleCustomSelect('todoOkrSelect')">
                        <span class="custom-select-text">无关联</span>
                        <svg class="custom-select-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </div>
                    <div class="custom-select-options" id="todoOkrOptions">
                        <div class="custom-select-option selected" data-value="" onclick="selectCustomOkrOption('', '无关联', '')">无关联</div>
                    </div>
                </div>
                <input type="hidden" id="todoOkr" value="">
            </div>
            <div class="form-group">
                <label class="form-label">关联关键结果</label>
                <div class="custom-select" id="todoKrSelect">
                    <div class="custom-select-trigger" onclick="toggleCustomSelect('todoKrSelect')">
                        <span class="custom-select-text">无关联</span>
                        <svg class="custom-select-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </div>
                    <div class="custom-select-options" id="todoKrOptions">
                        <div class="custom-select-option selected" data-value="" onclick="selectCustomKrOption('', '无关联', '')">无关联</div>
                    </div>
                </div>
                <input type="hidden" id="todoKr" value="">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeTodoModal()">取消</button>
                <button class="btn btn-primary" onclick="saveTodo()">保存</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="todoDeleteConfirmModal" onclick="if (event.target === this) closeTodoDeleteConfirm()">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="todoDeleteConfirmTitle" onclick="event.stopPropagation()">
            <h3 class="modal-title" id="todoDeleteConfirmTitle">删除事项</h3>
            <p class="todo-delete-confirm-text" id="todoDeleteConfirmMessage"></p>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeTodoDeleteConfirm()">取消</button>
                <button type="button" class="btn btn-danger" onclick="executeTodoDelete()">删除</button>
            </div>
        </div>
    </div>
    <div class="todo-date-modal-overlay" id="todoDateModal" onclick="handleTodoDateOverlayClick(event)">
        <div class="modal modal-large todo-date-modal">
            <div class="todo-date-modal-header">
                <h3 class="modal-title" id="todoDateModalTitle">日期事项</h3>
                <button class="btn btn-secondary" type="button" onclick="closeTodoDateModal()">关闭</button>
            </div>
            <div class="todo-date-modal-toolbar">
                <button class="btn btn-primary" type="button" onclick="openTodoModalForDate(selectedTodoDate)">+ 新增事项</button>
            </div>
            <div class="todo-date-modal-list" id="todoDateModalList"></div>
        </div>
    </div>

    <div class="modal-overlay" id="krSubTaskModal" onclick="if(event.target===this)closeKrSubTaskModal()">
        <div class="modal kr-subtask-modal" onclick="event.stopPropagation()">
            <div class="kr-subtask-modal-header">
                <h3 class="modal-title" id="krSubTaskModalTitle">子任务</h3>
                <button class="btn btn-secondary" type="button" onclick="closeKrSubTaskModal()">关闭</button>
            </div>
            <div class="kr-subtask-modal-body">
                <div class="kr-subtask-modal-list" id="krSubTaskModalList"></div>
                <div class="kr-subtask-modal-add-wrap">
                    <button class="btn btn-primary" type="button" onclick="addKrSubTaskFromModal()">+ 添加任务</button>
                </div>
            </div>
        </div>
    </div>
<script src="app.js"></script>
    <script>
        let todos = normalizeTodosForRuntime(Storage.get('planner_todos') || []);
        let todoViewMonth = new Date();
        todoViewMonth = new Date(todoViewMonth.getFullYear(), todoViewMonth.getMonth(), 1);
        let selectedTodoDate = '';
        const DAILY_REVIEW_PICK_KEY = 'planner_home_daily_review_pick';
        const REVIEW_ARCHIVE_STORAGE_KEY = 'planner_review_archive_entries';
        const REVIEW_RECENT_LIMIT = 8;
        const REVIEW_EMOTION_INTENSITY_OPTIONS = ['很高', '高', '中', '低', '很低'];
        let pendingTodoDeleteId = null;
        let pendingTodoDeleteStarKey = null;

        function findTodoStarAwardKey(todo) {
            if (!window.RewardPool || !todo) return null;
            const pool = window.RewardPool.getPool();
            const keys = pool.awardedKeys || [];
            const canonical = 'todo-' + String(todo.id);
            if (keys.indexOf(canonical) >= 0) return canonical;
            const idStr = String(todo.id);
            for (let i = 0; i < keys.length; i++) {
                const k = keys[i];
                if (typeof k !== 'string' || k.indexOf('todo-') !== 0) continue;
                const rest = k.slice(5);
                if (rest === idStr || rest == todo.id) return k;
            }
            return null;
        }

        function closeTodoDeleteConfirm() {
            pendingTodoDeleteId = null;
            pendingTodoDeleteStarKey = null;
            const el = document.getElementById('todoDeleteConfirmModal');
            if (el) el.classList.remove('active');
        }

        function executeTodoDelete() {
            const id = pendingTodoDeleteId;
            const starKey = pendingTodoDeleteStarKey;
            const el = document.getElementById('todoDeleteConfirmModal');
            if (el) el.classList.remove('active');
            pendingTodoDeleteId = null;
            pendingTodoDeleteStarKey = null;
            if (id == null) return;
            if (starKey && window.RewardPool) {
                window.RewardPool.revokeYellowStar(starKey);
                if (typeof renderRewardPool === 'function') renderRewardPool();
            }
            todos = todos.filter(t => t.id != id);
            Storage.set('planner_todos', todos);
            renderTodoList();
            refreshTodoDateModalIfOpen();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const calendarPanel = document.getElementById('todoCalendarPanel');
            if (!calendarPanel) return;
            const dueDateInput = document.getElementById('todoDueDate');
            if (dueDateInput) {
                const syncSingleDayState = () => {
                    if (!isTodoDateKey(dueDateInput.value)) {
                        setTodoSingleDayOnly(false);
                    }
                };
                dueDateInput.addEventListener('input', syncSingleDayState);
                dueDateInput.addEventListener('change', syncSingleDayState);
            }
            renderTodoList();
            renderRewardPool();
            flushPendingPlannerStarCollectAnimation();
            renderDailyReviewCard();
            initOkrSelect();
            const prizeModal = document.getElementById('prizeModal');
            if (prizeModal) {
                const prizeEmojiEl = prizeModal.querySelector('.prize-name-emoji');
                const prizeNameEl = prizeModal.querySelector('#prizeName');
                if (prizeEmojiEl) prizeEmojiEl.addEventListener('change', syncPrizeCardPreview);
                if (prizeNameEl) prizeNameEl.addEventListener('input', syncPrizeCardPreview);
            }
        });
        function getTodoMonthKey(dateObj = todoViewMonth) {
            const year = dateObj.getFullYear();
            const month = `${dateObj.getMonth() + 1}`.padStart(2, '0');
            return `${year}-${month}`;
        }

        function getTodoDayKey(dateObj) {
            const year = dateObj.getFullYear();
            const month = `${dateObj.getMonth() + 1}`.padStart(2, '0');
            const day = `${dateObj.getDate()}`.padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function isTodoDateKey(value) {
            return /^\d{4}-\d{2}-\d{2}$/.test(String(value || ''));
        }

        function normalizeTodosForRuntime(list) {
            if (!Array.isArray(list)) return [];
            return list
                .filter(item => item && typeof item === 'object')
                .map(item => ({
                    ...item,
                    singleDayOnly: !!item.singleDayOnly
                }));
        }

        function getTodoCreatedDayKey(todo) {
            const createdTs = Date.parse(todo && todo.createdAt ? todo.createdAt : '');
            if (!Number.isFinite(createdTs)) return '';
            return getTodoDayKey(new Date(createdTs));
        }

        function getTodoStartDayKey(todo) {
            const dueDate = todo && todo.dueDate;
            if (!isTodoDateKey(dueDate)) return '';
            if (todo && todo.singleDayOnly) return dueDate;
            const createdDate = getTodoCreatedDayKey(todo);
            if (isTodoDateKey(createdDate) && createdDate <= dueDate) return createdDate;
            const todayKey = getTodoDayKey(new Date());
            if (todayKey <= dueDate) return todayKey;
            return dueDate;
        }

        function hasTodoCarryPeriod(todo) {
            if (!todo || !isTodoDateKey(todo.dueDate)) return false;
            if (todo.singleDayOnly) return false;
            const startDate = getTodoStartDayKey(todo);
            return isTodoDateKey(startDate) && startDate < todo.dueDate;
        }

        function isTodoActiveOnDate(todo, dateKey) {
            if (!todo || !isTodoDateKey(dateKey) || !isTodoDateKey(todo.dueDate)) return false;
            const startDate = getTodoStartDayKey(todo);
            if (!isTodoDateKey(startDate)) return false;
            return dateKey >= startDate && dateKey <= todo.dueDate;
        }

        function isTodoVisibleInToday(todo, todayKey) {
            if (!todo || !isTodoDateKey(todayKey)) return false;
            if (isTodoActiveOnDate(todo, todayKey)) return true;
            if (todo.singleDayOnly) return false;
            return !todo.completed && isTodoDateKey(todo.dueDate) && todo.dueDate < todayKey;
        }

        function getTodoCarryState(todo, dateKey) {
            if (!todo || todo.completed || !isTodoDateKey(dateKey)) return '';
            if (!isTodoActiveOnDate(todo, dateKey)) return '';
            if (!hasTodoCarryPeriod(todo)) return '';
            return todo.dueDate === dateKey ? 'due' : 'carry';
        }

        function getTodoSortBucketForDate(todo, dateKey) {
            if (!todo || todo.completed) return 2;
            return isTodoDateKey(todo.dueDate) && todo.dueDate > dateKey ? 1 : 0;
        }

        function getTodoCountInfoByDate(dateKey) {
            const countInfo = { total: 0, completed: 0, important: 0 };
            todos.forEach(todo => {
                if (!isTodoActiveOnDate(todo, dateKey)) return;
                countInfo.total += 1;
                if (todo.completed) {
                    countInfo.completed += 1;
                }
                if (!todo.completed && todo.important) {
                    countInfo.important += 1;
                }
            });
            return countInfo;
        }

        function sortReviewEntries(entries) {
            return [...entries].sort((a, b) => {
                const dateCompare = String(b?.date || '').localeCompare(String(a?.date || ''));
                if (dateCompare !== 0) return dateCompare;
                return String(b?.createdAt || '').localeCompare(String(a?.createdAt || ''));
            });
        }

        function dedupeReviewEntriesById(entries) {
            const byId = new Map();
            (Array.isArray(entries) ? entries : []).forEach(entry => {
                if (!entry || entry.id === undefined || entry.id === null) return;
                const id = String(entry.id);
                const existing = byId.get(id);
                if (!existing) {
                    byId.set(id, entry);
                    return;
                }
                const existingDate = String(existing.date || '');
                const nextDate = String(entry.date || '');
                const existingCreatedAt = String(existing.createdAt || '');
                const nextCreatedAt = String(entry.createdAt || '');
                const shouldReplace = nextDate > existingDate
                    || (nextDate === existingDate && nextCreatedAt > existingCreatedAt);
                if (shouldReplace) byId.set(id, entry);
            });
            return sortReviewEntries([...byId.values()]);
        }

        function getRecentAndArchivedReviewEntries() {
            const currentEntries = Storage.get('planner_review_entries');
            const legacyEntries = Storage.get('reviews');
            const baseEntries = Array.isArray(currentEntries)
                ? currentEntries
                : (Array.isArray(legacyEntries) ? legacyEntries : []);
            const sortedCurrent = dedupeReviewEntriesById(baseEntries.filter(entry => entry && entry.id));
            const recentEntries = sortedCurrent.slice(0, REVIEW_RECENT_LIMIT);
            const overflowEntries = sortedCurrent.slice(REVIEW_RECENT_LIMIT);

            const archivedStored = Storage.get(REVIEW_ARCHIVE_STORAGE_KEY);
            const archivedBase = Array.isArray(archivedStored) ? archivedStored : [];
            const archivedEntries = dedupeReviewEntriesById(
                [...archivedBase, ...overflowEntries].filter(entry => entry && entry.id)
            ).filter(entry => !recentEntries.some(active => String(active.id) === String(entry.id)));

            return { recentEntries, archivedEntries };
        }

        function getDailyPickedReviewKey(entries) {
            const today = getTodoDayKey(new Date());
            const cache = Storage.get(DAILY_REVIEW_PICK_KEY);
            const keys = new Set(entries.map(entry => String(entry.poolKey || '')));
            const cachedDate = cache && typeof cache.date === 'string' ? cache.date : '';
            const cachedKey = cache && cache.reviewKey !== undefined && cache.reviewKey !== null
                ? String(cache.reviewKey)
                : '';
            const legacyCachedId = cache && cache.reviewId !== undefined && cache.reviewId !== null
                ? String(cache.reviewId)
                : '';

            if (cachedDate === today && cachedKey && keys.has(cachedKey)) {
                return cachedKey;
            }
            if (cachedDate === today && legacyCachedId) {
                const legacyMatched = entries.find(entry => String(entry.id) === legacyCachedId);
                if (legacyMatched && keys.has(String(legacyMatched.poolKey || ''))) {
                    return String(legacyMatched.poolKey || '');
                }
            }

            const randomEntry = entries[Math.floor(Math.random() * entries.length)];
            const pickedKey = String(randomEntry.poolKey || '');
            Storage.set(DAILY_REVIEW_PICK_KEY, { date: today, reviewKey: pickedKey });
            return pickedKey;
        }

        function getReviewEntryPreview(entry, maxLen = 56) {
            const rawText = String(
                entry?.summary ||
                entry?.tasks ||
                entry?.keep ||
                entry?.improve ||
                entry?.stop ||
                ''
            );
            const text = previewText(rawText, maxLen);
            return text || '已记录复盘内容';
        }

        function previewText(value, maxLen = 52) {
            const text = String(value || '').replace(/\s+/g, ' ').trim();
            if (!text) return '';
            return text.length > maxLen ? `${text.slice(0, maxLen)}...` : text;
        }

        function normalizeInlineText(value) {
            return String(value || '').replace(/\s+/g, ' ').trim();
        }

        function multilineHtml(value) {
            return escapeHtml(value).replace(/\n/g, '<br>');
        }

        function normalizeEmotionArousal(value) {
            const text = String(value || '').trim();
            return text === '高' || text === '低' ? text : '';
        }

        function normalizeEmotionValence(value) {
            const text = String(value || '').trim();
            return text === '积极' || text === '消极' ? text : '';
        }

        function normalizeEmotionIntensity(value) {
            const text = String(value || '').trim();
            return REVIEW_EMOTION_INTENSITY_OPTIONS.includes(text) ? text : '';
        }

        function splitEmotionText(value) {
            return String(value || '')
                .replace(/[“”"'`]/g, '')
                .split(/[、，,\/]/)
                .map(item => item.trim())
                .filter(Boolean);
        }

        function normalizeEmotionTag(tag, fallbackArousal = '', fallbackValence = '', fallbackIntensity = '中') {
            const mood = String(tag?.mood || '').trim();
            if (!mood) return null;
            const arousal = normalizeEmotionArousal(tag?.arousal) || normalizeEmotionArousal(fallbackArousal) || '低';
            const valence = normalizeEmotionValence(tag?.valence) || normalizeEmotionValence(fallbackValence) || '积极';
            const intensity = normalizeEmotionIntensity(tag?.intensity || tag?.emotionIntensity || tag?.energy)
                || normalizeEmotionIntensity(fallbackIntensity)
                || '中';
            return { mood, arousal, valence, intensity };
        }

        function normalizeEmotionTags(tags, fallbackMood = '平静', fallbackArousal = '', fallbackValence = '', fallbackIntensity = '中') {
            const normalized = [];
            const seen = new Set();
            const pushTag = (rawTag) => {
                const tag = normalizeEmotionTag(rawTag, fallbackArousal, fallbackValence, fallbackIntensity);
                if (!tag) return;
                const key = `${tag.mood}__${tag.arousal}__${tag.valence}`;
                if (seen.has(key)) return;
                seen.add(key);
                normalized.push(tag);
            };

            if (Array.isArray(tags)) {
                tags.forEach(pushTag);
            }

            if (!normalized.length) {
                splitEmotionText(fallbackMood).forEach(mood => {
                    pushTag({ mood, arousal: fallbackArousal, valence: fallbackValence, intensity: fallbackIntensity });
                });
            }

            if (!normalized.length) {
                pushTag({ mood: '平静', arousal: fallbackArousal || '低', valence: fallbackValence || '积极', intensity: fallbackIntensity });
            }

            return normalized;
        }

        function getEmotionIntensityScale(value) {
            const intensity = normalizeEmotionIntensity(value) || '中';
            const scales = { 很高: 1, 高: 0.82, 中: 0.64, 低: 0.46, 很低: 0.28 };
            return scales[intensity] || scales.中;
        }

        function getEmotionIntensityPrefix(value) {
            const intensity = normalizeEmotionIntensity(value) || '中';
            const prefixes = {
                很高: '非常',
                高: '很',
                中: '',
                低: '一般',
                很低: '有些许'
            };
            return prefixes[intensity] || '';
        }

        function buildEmotionIntensityPalette(arousal, valence, intensity) {
            const scale = getEmotionIntensityScale(intensity);
            const key = `${valence}-${arousal}`;
            const toneMap = {
                '消极-高': { hue: 4, satBase: 22, satRange: 60, lightBase: 94, lightDrop: 26, text: '#7a2222' },
                '积极-高': { hue: 46, satBase: 28, satRange: 56, lightBase: 95, lightDrop: 24, text: '#5d4700' },
                '消极-低': { hue: 25, satBase: 2, satRange: 14, lightBase: 96, lightDrop: 18, text: '#4f4a45' },
                '积极-低': { hue: 132, satBase: 22, satRange: 52, lightBase: 95, lightDrop: 24, text: '#1f5d35' }
            };
            const tone = toneMap[key] || toneMap['积极-低'];

            const sat = Math.round(tone.satBase + tone.satRange * scale);
            const light = Math.round(tone.lightBase - tone.lightDrop * scale);
            const borderSat = key === '消极-低' ? sat + 2 : Math.min(90, sat + 10);
            const borderLight = Math.max(28, light - 14);

            return {
                background: `hsl(${tone.hue} ${sat}% ${light}%)`,
                border: `hsl(${tone.hue} ${borderSat}% ${borderLight}%)`,
                text: tone.text
            };
        }

        function sectionHtml(label, value) {
            if (!value) return '';
            return `
                <div class="review-section">
                    <strong>${label}</strong>
                    <p>${multilineHtml(value)}</p>
                </div>
            `;
        }

        function sectionPreviewHtml(label, value, maxLen = 48) {
            const text = normalizeInlineText(value);
            if (!text) return '';
            return `
                <div class="review-line">
                    <p><strong>${label}</strong> ${escapeHtml(text)}</p>
                </div>
            `;
        }

        function reviewEntryCombinedUserPlainText(entry) {
            return ['summary', 'keep', 'improve', 'stop', 'tasks']
                .map((k) => normalizeInlineText(entry[k]))
                .filter(Boolean)
                .join('\n');
        }

        function getScoreToneKey(score) {
            const scoreNum = Number.parseFloat(score);
            const value = Number.isFinite(scoreNum) ? Math.max(0, Math.min(10, scoreNum)) : 0;
            if (value <= 2) return 'deep-red';
            if (value <= 4) return 'red';
            if (value <= 6) return 'yellow';
            return 'green';
        }

        function getScoreToneClass(score) {
            return `score-tone-${getScoreToneKey(score)}`;
        }

        function getScoreCheerText(score) {
            const scoreNum = Number.parseFloat(score);
            const value = Number.isFinite(scoreNum) ? Math.max(0, Math.min(10, scoreNum)) : 0;
            if (value <= 2) return '先稳住，慢慢来';
            if (value <= 4) return '有进步，继续冲';
            if (value <= 6) return '状态回暖中';
            if (value <= 8) return '今天很不错';
            return '状态拉满';
        }

        function renderDailyReviewCard() {
            const container = document.getElementById('dailyReviewContent');
            if (!container) return;

            const { recentEntries, archivedEntries } = getRecentAndArchivedReviewEntries();
            const entries = [
                ...recentEntries.map(entry => ({
                    ...entry,
                    sourceType: 'recent',
                    poolKey: `recent:${String(entry.id)}`
                })),
                ...archivedEntries.map(entry => ({
                    ...entry,
                    sourceType: 'archive',
                    poolKey: `archive:${String(entry.id)}`
                }))
            ];

            if (entries.length === 0) {
                const dailyEmptyMsg =
                    window.PlannerBackup && window.PlannerBackup.t
                        ? window.PlannerBackup.t('home.dailyReviewEmpty')
                        : '暂无复盘记录';
                container.innerHTML = '<p class="daily-review-empty">' + escapeHtml(dailyEmptyMsg) + '</p>';
                return;
            }

            const pickedKey = getDailyPickedReviewKey(entries);
            const picked = entries.find(entry => String(entry.poolKey) === pickedKey) || entries[0];
            const summaryHtml = sectionPreviewHtml('总结', picked.summary, 9999);
            const tasksPlain = normalizeInlineText(picked.tasks) || '';
            const todayTaskText = escapeHtml(tasksPlain || '今日事项');
            const combinedUser = reviewEntryCombinedUserPlainText(picked);
            const reviewBodyFold = window.PlannerBackup && typeof PlannerBackup.userReviewBodyFoldClass === 'function'
                ? PlannerBackup.userReviewBodyFoldClass(combinedUser)
                : '';
            const reviewCompactInnerClass = reviewBodyFold ? `review-compact-inner ${reviewBodyFold}` : 'review-compact-inner';
            const taskFold = window.PlannerBackup && typeof PlannerBackup.userContentFoldClass === 'function'
                ? PlannerBackup.userContentFoldClass(tasksPlain)
                : '';
            const todayTaskClass = taskFold ? `review-today-task-text ${taskFold}` : 'review-today-task-text';
            const scoreToneClass = getScoreToneClass(picked.score);
            const cheerText = escapeHtml(getScoreCheerText(picked.score));
            const intensity = normalizeEmotionIntensity(picked.emotionIntensity || picked.energy) || '中';
            const emotionTags = normalizeEmotionTags(
                picked.emotionTags,
                picked.mood || '平静',
                picked.emotionArousal || picked.arousal,
                picked.emotionValence || picked.valence,
                intensity
            );
            const moodHtml = emotionTags.map(tag => {
                const tagIntensity = normalizeEmotionIntensity(tag.intensity) || intensity;
                const moodPalette = buildEmotionIntensityPalette(tag.arousal, tag.valence, tagIntensity);
                const moodText = escapeHtml(`${getEmotionIntensityPrefix(tagIntensity)}${tag.mood}`);
                return `<span class="review-today-mood-text" style="color:${moodPalette.border};">${moodText}</span>`;
            }).join('、');
            const kissHtml = [
                sectionPreviewHtml('✅ 保持', picked.keep, 9999),
                sectionPreviewHtml('⚠️ 改进', picked.improve, 9999),
                sectionPreviewHtml('🚫 停止', picked.stop, 9999)
            ].filter(Boolean).join('');
            const dividerHtml = kissHtml ? '<div class="review-kiss-divider" aria-hidden="true"></div>' : '';
            const revExpandLabel =
                window.PlannerBackup && window.PlannerBackup.t ? window.PlannerBackup.t('review.expand') : '展开';
            const revExpandAria =
                window.PlannerBackup && window.PlannerBackup.t
                    ? window.PlannerBackup.t('review.expandCollapseAria')
                    : '展开或收起复盘正文';
            const compactBodyHtml = reviewBodyFold
                ? `<div class="review-compact-wrap">
                            <div class="${reviewCompactInnerClass}">
                            ${summaryHtml}
                            ${dividerHtml}
                            ${kissHtml}
                            </div>
                            <button type="button" class="review-card-expand-btn" aria-expanded="false" aria-label="${escapeHtml(revExpandAria)}" onclick="handleReviewCardExpandClick(this, event)"><span class="review-card-expand-label">${escapeHtml(revExpandLabel)}</span><span class="review-card-expand-icon" aria-hidden="true">▼</span></button>
                        </div>`
                : `<div class="${reviewCompactInnerClass}">
                            ${summaryHtml}
                            ${dividerHtml}
                            ${kissHtml}
                            </div>`;

            container.innerHTML = `
                <div class="daily-review-link">
                    <article class="review-card review-record-card">
                        <div class="review-header">
                            <div class="review-header-main">
                                <span class="review-period">${escapeHtml(picked.date || '--')}</span>
                                <div class="review-meta-row">
                                    <span class="review-score-circle ${scoreToneClass}" title="评分 ${picked.score}/10">${picked.score}</span>
                                    <span class="review-cheer-badge ${scoreToneClass}">${cheerText}</span>
                                </div>
                                <span class="review-today-note"><strong>今天</strong><span class="${todayTaskClass}">${todayTaskText}</span><strong>时</strong>${moodHtml}</span>
                            </div>
                        </div>
                        <div class="review-content review-content-compact">
                            ${compactBodyHtml}
                        </div>
                    </article>
                </div>
            `;
        }

        function renderRewardPool() {
            if (!window.RewardPool) return;
            const pool = window.RewardPool.getPool();
            const todoEl = document.getElementById('rewardYellowTodo');
            const prizesEl = document.getElementById('rewardPoolPrizes');
            const krEl = document.getElementById('rewardYellowKr');
            const reviewEl = document.getElementById('rewardYellowReview');
            const colorfulEl = document.getElementById('rewardColorfulCount');

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')

        function escapeJsString(value) {

        function renderTodoCalendar() {
            const monthStart = new Date(todoViewMonth.getFullYear(), todoViewMonth.getMonth(), 1);
            const monthEnd = new Date(todoViewMonth.getFullYear(), todoViewMonth.getMonth() + 1, 0);
            const firstDayOffset = (monthStart.getDay() + 6) % 7;
            const totalDays = monthEnd.getDate();
            const todayKey = getTodoDayKey(new Date());
            const monthKey = getTodoMonthKey();

            const weekDays = ['一', '二', '三', '四', '五', '六', '日'];
            const weekHeader = weekDays.map(day => `<div class="todo-weekday">${day}</div>`).join('');
            const cells = [];

            for (let i = 0; i < firstDayOffset; i += 1) {
                cells.push('<div class="todo-calendar-cell empty" onclick="clearTodoDateSelection()"></div>');
            }

            for (let day = 1; day <= totalDays; day += 1) {
                const dateKey = `${monthKey}-${`${day}`.padStart(2, '0')}`;
                const countInfo = getTodoCountInfoByDate(dateKey);
                const classes = ['todo-calendar-cell'];
                if (countInfo.total > 0) classes.push('has-items');
                if (countInfo.important > 0) classes.push('has-important');
                if (dateKey === todayKey) classes.push('today');
                if (dateKey === selectedTodoDate) classes.push('selected');

                cells.push(`
                    <button class="${classes.join(' ')}" type="button" onclick="selectTodoDate('${dateKey}')">
                        <div class="todo-calendar-head">
                            <span class="todo-calendar-date">${day}</span>
                            ${dateKey === todayKey ? '<span class="todo-calendar-today-badge">今</span>' : ''}
                        </div>
                        <div class="todo-calendar-meta">
                            <span class="todo-calendar-count ${countInfo.total ? '' : 'muted'}">
                                ${countInfo.total ? `${countInfo.completed}/${countInfo.total}` : '-'}
                            </span>
                            ${countInfo.important ? '<span class="todo-calendar-important-badge">重</span>' : ''}
                        </div>
                    </button>
                `);
            }

            // 固定为 6 行日历（42 格），避免底部出现空白区域
            const trailingEmptyCount = Math.max(0, 42 - cells.length);
            for (let i = 0; i < trailingEmptyCount; i += 1) {
                cells.push('<div class="todo-calendar-cell empty" onclick="clearTodoDateSelection()"></div>');
            }

            return `
                <div class="todo-calendar-panel">
                    <div class="todo-weekday-row">${weekHeader}</div>
                    <div class="todo-calendar-grid">${cells.join('')}</div>
                </div>
            `;
        }

        function getTodoItemsByDate(dateKey) {
            return todos
                .filter(todo => isTodoActiveOnDate(todo, dateKey))
                .sort((a, b) => {
                    const bucketA = getTodoSortBucketForDate(a, dateKey);
                    const bucketB = getTodoSortBucketForDate(b, dateKey);
                    if (bucketA !== bucketB) return bucketA - bucketB;

                    if (bucketA === 1 && (a.dueDate || '') !== (b.dueDate || '')) {
                        return (a.dueDate || '').localeCompare(b.dueDate || '');
                    }

                    if (a.completed !== b.completed) return a.completed ? 1 : -1;
                    const reminderA = a.reminder || '23:59';
                    const reminderB = b.reminder || '23:59';
                    return reminderA.localeCompare(reminderB);
                });
        }

        function getTodoKanbanData() {
            const monthKey = getTodoMonthKey();
            const todayKey = getTodoDayKey(new Date());
            const inCurrentMonth = (todo) => !!todo.dueDate && todo.dueDate.startsWith(monthKey);
            const getTime = (value, fallback = 0) => {
                const ts = Date.parse(value || '');
                return Number.isFinite(ts) ? ts : fallback;
            };
            const getTodayOrder = (todo) => {
                const order = Number(todo && todo.todayOrder);
                return Number.isFinite(order) ? order : null;
            };
            const hasLinkedKr = (todo) => !!(todo && todo.krId);

            const todayTodos = todos
                .filter(todo => isTodoVisibleInToday(todo, todayKey))
                .sort((a, b) => {
                    const bucketA = getTodoSortBucketForDate(a, todayKey);
                    const bucketB = getTodoSortBucketForDate(b, todayKey);
                    if (bucketA !== bucketB) return bucketA - bucketB;

                    const aOrder = getTodayOrder(a);
                    const bOrder = getTodayOrder(b);
                    if (aOrder !== null && bOrder !== null) return aOrder - bOrder;
                    if (aOrder !== null) return -1;
                    if (bOrder !== null) return 1;

                    if (bucketA === 1 && (a.dueDate || '') !== (b.dueDate || '')) {
                        return (a.dueDate || '').localeCompare(b.dueDate || '');
                    }

                    if (a.completed && b.completed) {
                        return getTime(a.completedAt, 0) - getTime(b.completedAt, 0);
                    }
                    if (!a.completed && !b.completed && hasLinkedKr(a) !== hasLinkedKr(b)) return hasLinkedKr(a) ? -1 : 1;
                    return getTime(a.createdAt, 0) - getTime(b.createdAt, 0);
                });

            const monthlyImportant = todos
                .filter(todo => !todo.completed && todo.important && inCurrentMonth(todo))
                .sort((a, b) => (a.dueDate || '').localeCompare(b.dueDate || ''));

            return { todayTodos, monthlyImportant };
        }
