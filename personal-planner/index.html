        function persistTodayTodoOrderFromList(listEl) {
            if (!listEl) return;
            const todayKey = getTodoDayKey(new Date());
            const orderedIds = Array.from(listEl.querySelectorAll('.todo-item[data-todo-id]'))
                .map(item => String(item.getAttribute('data-todo-id') || ''))
                .filter(Boolean);
            if (orderedIds.length === 0) return;
            const orderMap = new Map(orderedIds.map((id, index) => [id, index]));
            let changed = false;

            todos.forEach((todo) => {
                if (!isTodoVisibleInToday(todo, todayKey)) return;
                const nextOrder = orderMap.get(String(todo.id));
                if (!Number.isFinite(nextOrder)) return;
                if (todo.todayOrder !== nextOrder) {
                    todo.todayOrder = nextOrder;
                    changed = true;
                }
            });

            if (changed) {
                Storage.set('planner_todos', todos);
                refreshTodoDateModalIfOpen();
            }
        }

        function initTodayTodoDragSort() {
            const listEl = document.querySelector('.todo-board-card.today .todo-board-card-list[data-todo-dnd="today"]');
            if (!listEl) return;
            const items = Array.from(listEl.querySelectorAll('.todo-item[data-todo-id]'));
            if (items.length <= 1) return;

            let draggingItem = null;

            const clearDragState = () => {
                listEl.querySelectorAll('.todo-item.dragging').forEach(item => item.classList.remove('dragging'));
            };

            items.forEach((item) => {
                item.addEventListener('dragstart', (event) => {
                    draggingItem = item;
                    item.classList.add('dragging');
                    if (event.dataTransfer) {
                        event.dataTransfer.effectAllowed = 'move';
                        try {
                            event.dataTransfer.setData('text/plain', item.getAttribute('data-todo-id') || '');
                        } catch (_) {}
                    }
                });

                item.addEventListener('dragend', () => {
                    clearDragState();
                    draggingItem = null;
                });

                item.addEventListener('dragover', (event) => {
                    if (!draggingItem || draggingItem === item) return;
                    event.preventDefault();
                    const rect = item.getBoundingClientRect();
                    const shouldInsertBefore = (event.clientY - rect.top) < (rect.height / 2);
                    const anchor = shouldInsertBefore ? item : item.nextElementSibling;
                    if (anchor === draggingItem) return;
                    listEl.insertBefore(draggingItem, anchor);
                });
            });

            listEl.addEventListener('dragover', (event) => {
                if (!draggingItem) return;
                event.preventDefault();
            });

            listEl.addEventListener('drop', (event) => {
                if (!draggingItem) return;
                event.preventDefault();
                persistTodayTodoOrderFromList(listEl);
            });
        }

        function initTodoBoardBaselineShadow() {
            const cards = Array.from(document.querySelectorAll('.todo-board-card'));
            cards.forEach((card) => {
                const listEl = card.querySelector('.todo-board-card-list');
                if (!listEl) return;

                const updateShadowState = () => {
                    const isScrollable = (listEl.scrollHeight - listEl.clientHeight) > 1;
                    card.classList.toggle('is-list-scrolled', isScrollable && listEl.scrollTop > 2);
                };

                listEl.addEventListener('scroll', updateShadowState, { passive: true });
                requestAnimationFrame(updateShadowState);
            });
        }
        function getNextTodayTodoOrder(todayKey) {
            const todayTodos = todos.filter(todo => isTodoVisibleInToday(todo, todayKey));
            const maxOrder = todayTodos.reduce((max, todo) => {
                const order = Number(todo.todayOrder);
                return Number.isFinite(order) ? Math.max(max, order) : max;
            }, -1);
            return maxOrder + 1;
        }

        function hasTodayCustomOrder(todayKey) {
            return todos.some((todo) => {
                if (!isTodoVisibleInToday(todo, todayKey)) return false;
                const order = Number(todo.todayOrder);
                return Number.isFinite(order);
            });
        }

        function renderTodoItem(todo, options = {}) {
            const todayKey = getTodoDayKey(new Date());
            const isOverdue = !todo.completed && todo.dueDate && todo.dueDate < todayKey;
            const safeTodoId = escapeJsString(todo.id);
            const safeTodoTitle = escapeHtml(todo.title);
            const showDueDate = options.showDueDate !== false;
            const draggable = options.draggable === true;
            const isPriorityLayout = options.layoutType === 'priority';
            const showCarryBadge = options.showCarryBadge === true;
            const referenceDateKey = isTodoDateKey(options.referenceDateKey) ? options.referenceDateKey : todayKey;
            const hasLinkedKr = !!(todo.okrId && todo.krId);
            const carryState = showCarryBadge ? getTodoCarryState(todo, referenceDateKey) : '';
            const showOverdueBadge = options.showOverdueBadge === true;
            const inlineImportant = (isPriorityLayout || !showDueDate) && !!todo.important;
            const dueDateInMeta = showDueDate && todo.dueDate && !isPriorityLayout;
            const hasMeta = !!(dueDateInMeta || (todo.important && !inlineImportant));
            const noMetaClass = hasMeta || isPriorityLayout ? '' : ' no-meta';
            const carryBadge = carryState
                ? `<span class="todo-kr-linked-icon todo-carry-icon${carryState === 'due' ? ' is-due' : ''}" title="${carryState === 'due' ? '截止日' : '持续事项'}" aria-label="${carryState === 'due' ? '截止日' : '持续事项'}">${carryState === 'due' ? '临' : '持'}</span>`
                : '';
            const inlineImportantBadge = inlineImportant ? '<span class="todo-important-tag todo-important-inline">重</span>' : '';
            const linkedKrBadge = hasLinkedKr ? '<span class="todo-kr-linked-icon" title="已关联关键结果" aria-label="已关联关键结果">关</span>' : '';
            const overdueBadge = (showOverdueBadge && isOverdue)
                ? '<span class="todo-kr-linked-icon todo-overdue-icon" title="已逾期" aria-label="已逾期">逾</span>'
                : '';
            const titleBadges = `${linkedKrBadge}${carryBadge}${overdueBadge}${inlineImportantBadge}`;
            const cornerDate = isPriorityLayout && todo.dueDate
                ? `<span class="todo-priority-date-corner">${formatDate(todo.dueDate)}</span>`
                : '';
            const todoFoldCls = window.PlannerBackup && typeof PlannerBackup.userContentFoldClass === 'function'
                ? PlannerBackup.userContentFoldClass(todo.title || '')
                : '';
            const todoTitleTextClass = todoFoldCls ? `todo-title-text ${todoFoldCls}` : 'todo-title-text';

            return `
                <div class="todo-item${noMetaClass}${isPriorityLayout ? ' priority-layout' : ''} ${todo.completed ? 'completed' : ''} ${isOverdue ? 'todo-item-overdue' : ''}${draggable ? ' is-draggable' : ''}"${draggable ? ' draggable="true"' : ''} data-todo-id="${escapeHtml(String(todo.id))}">
                    <div class="todo-checkbox ${todo.completed ? 'checked' : ''}"
                         onclick="toggleTodo('${safeTodoId}')"></div>
                    <div class="todo-content">
                        <div class="todo-title" onclick="editTodo('${safeTodoId}')"><span class="${todoTitleTextClass}">${safeTodoTitle}</span>${titleBadges}</div>
                        <div class="todo-meta">
                            ${dueDateInMeta ? `
                                <span class="todo-date">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                                        <line x1="16" y1="2" x2="16" y2="6"/>
                                        <line x1="8" y1="2" x2="8" y2="6"/>
                                        <line x1="3" y1="10" x2="21" y2="10"/>
                                    </svg>
                                    ${formatDate(todo.dueDate)}
                                </span>
                            ` : ''}
                            ${todo.important && !inlineImportant ? '<span class="todo-important-tag">重</span>' : ''}
                        </div>
                    </div>
                    ${cornerDate}
                    <div class="todo-actions">
                        <button class="todo-action-btn" onclick="editTodo('${safeTodoId}')" title="编辑">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                            </svg>
                        </button>
                        <button class="todo-action-btn delete" onclick="deleteTodo('${safeTodoId}')" title="删除">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"/>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                            </svg>
                        </button>
                    </div>
                </div>
            `;
        }

        function getTodoSingleDayOnlyValue() {
            const input = document.getElementById('todoSingleDayOnly');
            return input ? input.value === 'true' : false;
        }

        function setTodoSingleDayOnly(enabled) {
            const input = document.getElementById('todoSingleDayOnly');
            const btn = document.getElementById('todoSingleDayBtn');
            const next = !!enabled;
            if (input) input.value = next ? 'true' : 'false';
            if (btn) {
                btn.classList.toggle('active', next);
                btn.setAttribute('aria-pressed', next ? 'true' : 'false');
            }
        }

        function toggleTodoSingleDayOnly() {
            const dueDateInput = document.getElementById('todoDueDate');
            if (!dueDateInput) return;
            const next = !getTodoSingleDayOnlyValue();
            if (next && !isTodoDateKey(dueDateInput.value)) {
                dueDateInput.value = isTodoDateKey(selectedTodoDate) ? selectedTodoDate : getTodoDayKey(new Date());
            }
            setTodoSingleDayOnly(next);
        }

        function openTodoModal() {
            closeTodoDateModal();
            editingId = null;
            document.getElementById('todoModalTitle').textContent = '添加事项';
            document.getElementById('todoTitle').value = '';
            document.getElementById('todoDueDate').value = selectedTodoDate || '';
            document.getElementById('todoImportant').checked = false;
            setTodoSingleDayOnly(false);

            selectCustomOkrOption('', '无关联', '');

            document.getElementById('todoModal').classList.add('active');
        }

        function editTodo(id) {
            closeTodoDateModal();
            const todo = todos.find(t => t.id == id);
            if (!todo) return;

            editingId = id;
            document.getElementById('todoModalTitle').textContent = '编辑事项';
            document.getElementById('todoTitle').value = todo.title;
            document.getElementById('todoDueDate').value = todo.dueDate || '';
            document.getElementById('todoImportant').checked = !!todo.important;
            setTodoSingleDayOnly(!!todo.singleDayOnly);

            if (todo.okrId) {
                const okr = data.okrs.find(o => o.id == todo.okrId);
                if (okr) {
                    selectCustomOkrOption(todo.okrId, okr.title, okr.color || '');
                    if (todo.krId) {
                        const kr = okr.krs.find(k => k.id == todo.krId);
                        if (kr) {
                            selectCustomKrOption(todo.krId, kr.text, okr.color || '');
                        }
                    }
                } else {
                    selectCustomOkrOption('', '无关联', '');
                }
            } else {
                selectCustomOkrOption('', '无关联', '');
            }

            document.getElementById('todoModal').classList.add('active');
        }

        function saveTodo() {
            const title = document.getElementById('todoTitle').value.trim();
            const dueDateInput = document.getElementById('todoDueDate');
            const dueDateRaw = dueDateInput ? dueDateInput.value : '';
            const important = document.getElementById('todoImportant').checked;
            const okrId = document.getElementById('todoOkr').value;
            const krId = document.getElementById('todoKr').value;
            const existingTodo = editingId ? todos.find(t => t.id == editingId) : null;
            const shouldSyncKrProgress = !!krId && (existingTodo ? !!existingTodo.syncKrProgressOnComplete : true);
            const singleDayOnly = getTodoSingleDayOnlyValue();
            const dueDate = singleDayOnly && !isTodoDateKey(dueDateRaw)
                ? (isTodoDateKey(selectedTodoDate) ? selectedTodoDate : getTodoDayKey(new Date()))
                : dueDateRaw;

            if (!title) {
                alert('请输入事项内容');
                return;
            }

            if (editingId) {
                const todo = todos.find(t => t.id == editingId);
                if (todo) {
                    const relationChanged = todo.okrId !== okrId || todo.krId !== krId;
                    const oldDueDate = todo.dueDate || '';
                    const todayKey = getTodoDayKey(new Date());
                    todo.title = title;
                    todo.dueDate = dueDate;
                    todo.important = important;
                    todo.singleDayOnly = singleDayOnly;
                    todo.okrId = okrId;
                    todo.krId = krId;
                    todo.syncKrProgressOnComplete = shouldSyncKrProgress;
                    if (oldDueDate !== dueDate) {
                        if (isTodoDateKey(dueDate) && dueDate >= todayKey && hasTodayCustomOrder(todayKey)) {
                            todo.todayOrder = getNextTodayTodoOrder(todayKey);
                        } else {
                            todo.todayOrder = null;
                        }
                    }
                    if (relationChanged) {
                        todo.krProgressSynced = false;
                    }
                }
            } else {
                const todayKey = getTodoDayKey(new Date());
                todos.push({
                    id: generateId(),
                    title,
                    dueDate,
                    important,
                    singleDayOnly,
                    okrId,
                    krId,
                    completed: false,
                    completedAt: null,
                    todayOrder: isTodoDateKey(dueDate) && dueDate >= todayKey && hasTodayCustomOrder(todayKey)
                        ? getNextTodayTodoOrder(todayKey)
                        : null,
                    syncKrProgressOnComplete: shouldSyncKrProgress,
                    krProgressSynced: false,
                    createdAt: new Date().toISOString()
                });
            }

            Storage.set('planner_todos', todos);
            renderTodoList();
            refreshTodoDateModalIfOpen();
            closeTodoModal();
        }

        function deleteTodo(id) {
            const todo = todos.find(t => t.id == id);
            if (!todo) return;
            const starKey = findTodoStarAwardKey(todo);
            pendingTodoDeleteId = id;
            pendingTodoDeleteStarKey = starKey;
            const message = starKey
                ? '该事项已完成并获得过「事项」黄星积分。删除后相应积分会被收回，确定删除吗？'
                : '确定删除这个事项吗？';
            const msgEl = document.getElementById('todoDeleteConfirmMessage');
            const modal = document.getElementById('todoDeleteConfirmModal');
            if (msgEl) msgEl.textContent = message;
            if (modal) {
                modal.classList.add('active');
                return;
            }
            if (confirm(message)) {
                executeTodoDelete();
            } else {
                closeTodoDeleteConfirm();
            }
        }

        function maybeSyncTodoKrProgress(todo) {
            if (!todo || !todo.okrId || !todo.krId || todo.krProgressSynced || !todo.syncKrProgressOnComplete) return;

            const okr = data.okrs.find(o => o.id == todo.okrId);
            if (!okr) return;

            const kr = okr.krs.find(k => k.id == todo.krId);
            if (!kr) return;

            normalizeKr(kr);
            if (kr.current >= kr.target) {
                todo.krProgressSynced = true;
                return;
            }

            kr.current = Math.min(kr.target, kr.current + 1);
            kr.completed = kr.current >= kr.target;
            todo.krProgressSynced = true;
            if (window.RewardPool && kr.completed) {
                window.RewardPool.awardYellowStar('kr-' + okr.id + '-' + kr.id);
                const allDone = okr.krs.every(k => k.current >= k.target);
                if (allDone) window.RewardPool.awardColorfulStar('okr-' + okr.id);
                if (typeof renderRewardPool === 'function') renderRewardPool();
            }
            Storage.set('planner_okrs', data.okrs);
            renderOKRs();
            renderTimeline();
        }

        function toggleTodo(id) {
            const todo = todos.find(t => t.id == id);
            if (todo) {
                const wasCompleted = !!todo.completed;
                const todayKey = getTodoDayKey(new Date());
                todo.completed = !todo.completed;
                todo.completedAt = todo.completed ? new Date().toISOString() : null;
                if (isTodoVisibleInToday(todo, todayKey) && hasTodayCustomOrder(todayKey)) {
                    todo.todayOrder = getNextTodayTodoOrder(todayKey);
                }
                if (!wasCompleted && todo.completed) {
                    maybeSyncTodoKrProgress(todo);
                    if (window.RewardPool) {
                        window.RewardPool.awardYellowStar('todo-' + String(todo.id));
                        if (typeof renderRewardPool === 'function') renderRewardPool();
                    }
                } else if (wasCompleted && !todo.completed && window.RewardPool) {
                    window.RewardPool.revokeYellowStar('todo-' + String(todo.id));
                    if (typeof renderRewardPool === 'function') renderRewardPool();
                }
                Storage.set('planner_todos', todos);
                renderTodoList();
                refreshTodoDateModalIfOpen();
            }
        }

        function initOkrSelect() {
            updateCustomOkrOptions();
        }

        let krSubTaskModalOkrId = '';
        let krSubTaskModalKrId = '';
        let returnToKrSubTaskModalAfterSave = false;

        function openKrSubTaskModal(okrId, krId) {
            krSubTaskModalOkrId = String(okrId);
            krSubTaskModalKrId = String(krId);
            const okr = data.okrs.find(o => o.id == okrId);
            const kr = okr ? okr.krs.find(k => k.id == krId) : null;
            const titleEl = document.getElementById('krSubTaskModalTitle');
            if (titleEl) titleEl.textContent = kr ? `关键结果：${kr.text || ''}` : '关键结果';
            renderKrSubTaskModalList();
            document.getElementById('krSubTaskModal').classList.add('active');
        }

        function closeKrSubTaskModal(clearIds = true) {
            document.getElementById('krSubTaskModal').classList.remove('active');
            if (clearIds) {
                krSubTaskModalOkrId = '';
                krSubTaskModalKrId = '';
                returnToKrSubTaskModalAfterSave = false;
            }
        }

        function getTodosForKr(okrId, krId) {
            return todos.filter(t => t.okrId == okrId && t.krId == krId);
        }

        function renderKrSubTaskModalList() {
            const listEl = document.getElementById('krSubTaskModalList');
            if (!listEl) return;
            const items = getTodosForKr(krSubTaskModalOkrId, krSubTaskModalKrId)
                .sort((a, b) => (a.dueDate || '').localeCompare(b.dueDate || '') || (a.createdAt || '').localeCompare(b.createdAt || ''));
            listEl.innerHTML = items.length ? items.map(todo => {
                const safeId = escapeJsString(todo.id);
                const safeTitle = escapeHtml(todo.title || '');
                const dueStr = todo.dueDate ? formatDate(todo.dueDate) : '--';
                return `
                    <div class="kr-subtask-item ${todo.completed ? 'completed' : ''}" data-todo-id="${escapeHtml(String(todo.id))}">
                        <div class="kr-subtask-checkbox ${todo.completed ? 'checked' : ''}" onclick="toggleTodo('${safeId}'); renderKrSubTaskModalList();"></div>
                        <div class="kr-subtask-content" onclick="closeKrSubTaskModal(false); editTodo('${safeId}'); returnToKrSubTaskModalAfterSave=true;">
                            <span class="kr-subtask-title">${safeTitle}</span>
                            <span class="kr-subtask-date">${dueStr}</span>
                        </div>
                        <button class="kr-subtask-delete" onclick="event.stopPropagation(); deleteTodoFromKrModal('${safeId}')" title="删除">&times;</button>
                    </div>
                `;
            }).join('') : '';
        }

        function addKrSubTaskFromModal() {
            returnToKrSubTaskModalAfterSave = true;
            closeKrSubTaskModal(false);
            const okr = data.okrs.find(o => o.id == krSubTaskModalOkrId);
            const kr = okr ? okr.krs.find(k => k.id == krSubTaskModalKrId) : null;
            editingId = null;
            document.getElementById('todoModalTitle').textContent = '添加任务';
            document.getElementById('todoTitle').value = '';
            const todayKey = getTodoDayKey(new Date());
            const okrEndDate = okr && okr.endDate && /^\d{4}-\d{2}-\d{2}$/.test(String(okr.endDate)) ? okr.endDate : null;
            document.getElementById('todoDueDate').value = okrEndDate || todayKey;
            document.getElementById('todoImportant').checked = false;
            setTodoSingleDayOnly(false);
            selectCustomOkrOption(krSubTaskModalOkrId, okr ? okr.title : '', okr ? (okr.color || '') : '');
            selectCustomKrOption(krSubTaskModalKrId, kr ? kr.text : '', okr ? (okr.color || '') : '');
            document.getElementById('todoModal').classList.add('active');
        }

        function closeTodoModal() {
            closeModal('todoModal');
            if (returnToKrSubTaskModalAfterSave && krSubTaskModalOkrId && krSubTaskModalKrId) {
                returnToKrSubTaskModalAfterSave = false;
                openKrSubTaskModal(krSubTaskModalOkrId, krSubTaskModalKrId);
            }
        }

        function deleteTodoFromKrModal(todoId) {
            const todo = todos.find(t => t.id == todoId);
            if (!todo) return;
            const starKey = findTodoStarAwardKey(todo);
            if (starKey && !confirm('该事项已完成并获得过积分，删除后积分会被收回，确定删除吗？')) return;
            if (!starKey && !confirm('确定删除这个子任务吗？')) return;
            todos = todos.filter(t => t.id != todoId);
            Storage.set('planner_todos', todos);
            renderTodoList();
            refreshTodoDateModalIfOpen();
            renderKrSubTaskModalList();
            if (starKey && window.RewardPool) {
                window.RewardPool.revokeYellowStar(starKey);
                if (typeof renderRewardPool === 'function') renderRewardPool();
            }
        }

        function updateCustomOkrOptions() {
            const container = document.getElementById('todoOkrOptions');
            if (!container) return;
            container.innerHTML = `<div class="custom-select-option selected" data-value="" onclick="selectCustomOkrOption('', '无关联', '')">无关联</div>` +
                data.okrs.map(okr => {
                    const color = typeof normalizeOkrColor === 'function' ? normalizeOkrColor(okr.color) : String(okr.color || '');
                    return `<div class="custom-select-option ${color}" data-value="${escapeHtml(okr.id)}" onclick="selectCustomOkrOption('${escapeJsString(okr.id)}', '${escapeJsString(okr.title)}', '${escapeJsString(color)}')">${escapeHtml(okr.title)}</div>`;
                }).join('');
        }

        function updateCustomKrOptions(okrId) {
            const container = document.getElementById('todoKrOptions');
            const krSelect = document.getElementById('todoKr');
            const triggerText = document.querySelector('#todoKrSelect .custom-select-text');
            if (!container || !krSelect) return;

            if (!okrId) {
                container.innerHTML = `<div class="custom-select-option selected" data-value="" onclick="selectCustomKrOption('', '无关联', '')">无关联</div>`;
                krSelect.value = '';
                if (triggerText) triggerText.textContent = '无关联';
                return;
            }

            const okr = data.okrs.find(o => o.id == okrId);
            if (okr) {
                const color = typeof normalizeOkrColor === 'function' ? normalizeOkrColor(okr.color) : String(okr.color || '');
                container.innerHTML = `<div class="custom-select-option selected" data-value="" onclick="selectCustomKrOption('', '无关联', '')">无关联</div>` +
                    okr.krs.map(kr => `<div class="custom-select-option ${color}" data-value="${escapeHtml(kr.id)}" onclick="selectCustomKrOption('${escapeJsString(kr.id)}', '${escapeJsString(kr.text)}', '${escapeJsString(color)}')">${escapeHtml(kr.text)}</div>`).join('');
                krSelect.value = '';
                if (triggerText) triggerText.textContent = '无关联';
            }
        }

        function getOkrColorClassNames() {
            if (typeof OKR_COLOR_KEYS !== 'undefined' && Array.isArray(OKR_COLOR_KEYS)) {
                return OKR_COLOR_KEYS;
            }
            return ['brown', 'apricot', 'sage', 'pink', 'indigo', 'teal', 'coral', 'amber'];
        }

        function selectCustomOkrOption(value, text, colorClass) {
            const select = document.getElementById('todoOkrSelect');
            const hiddenInput = document.getElementById('todoOkr');
            const triggerText = select.querySelector('.custom-select-text');

            select.querySelectorAll('.custom-select-option').forEach(opt => {
                opt.classList.remove('selected', ...getOkrColorClassNames());
                if (opt.dataset.value == value) {
                    opt.classList.add('selected');
                    if (colorClass) {
                        opt.classList.add(colorClass);
                    }
                }
            });

            triggerText.textContent = text;
            hiddenInput.value = value;
            select.classList.remove('open');
            updateCustomKrOptions(value);
        }

        function selectCustomKrOption(value, text, colorClass) {
            const select = document.getElementById('todoKrSelect');
            const hiddenInput = document.getElementById('todoKr');
            const triggerText = select.querySelector('.custom-select-text');

            select.querySelectorAll('.custom-select-option').forEach(opt => {
                opt.classList.remove('selected', ...getOkrColorClassNames());
                if (opt.dataset.value == value) {
                    opt.classList.add('selected');
                    if (colorClass) {
                        opt.classList.add(colorClass);
                    }
                }
            });

            triggerText.textContent = text;
            hiddenInput.value = value;
            select.classList.remove('open');
        }

        function toggleCustomSelect(selectId) {
            const select = document.getElementById(selectId);
            const isOpen = select.classList.contains('open');
            document.querySelectorAll('.custom-select').forEach(s => s.classList.remove('open'));
            if (!isOpen) {
                select.classList.add('open');
            }
        }

        document.addEventListener('click', (e) => {
            const clickTarget = e.target instanceof Element ? e.target : null;

            if (!clickTarget || !clickTarget.closest('.custom-select')) {
                document.querySelectorAll('.custom-select').forEach(s => s.classList.remove('open'));
            }

            if (!selectedTodoDate) return;
            if (shouldKeepTodoDateSelection(clickTarget)) return;
            clearTodoDateSelection();
        });

        function toggleSidebar() {
            return;
        }
window.addEventListener('planner-storage-synced', () => {
            if (typeof reloadPlannerDataFromStorage === 'function') {
                reloadPlannerDataFromStorage();
            }
            todos = normalizeTodosForRuntime(Storage.get('planner_todos') || []);
            initOkrSelect();
            renderTodoList();
            renderRewardPool();
            renderDailyReviewCard();
            refreshTodoDateModalIfOpen();
        });

        window.addEventListener('storage', (event) => {
            if (event.key && !event.key.startsWith('planner_')) return;
            if (typeof reloadPlannerDataFromStorage === 'function') {
                reloadPlannerDataFromStorage();
            }
            todos = normalizeTodosForRuntime(Storage.get('planner_todos') || []);
            initOkrSelect();
            renderTodoList();
            renderRewardPool();
            renderDailyReviewCard();
            refreshTodoDateModalIfOpen();
        });
    </script>

        (() => {
            const mainContent = document.querySelector('.main-content');
            if (!mainContent) return;

            const updateBaselineShadow = () => {
                mainContent.classList.toggle('is-baseline-shadow-visible', mainContent.scrollTop > 2);
            };

            mainContent.addEventListener('scroll', updateBaselineShadow, { passive: true });
            requestAnimationFrame(updateBaselineShadow);
        })();
    </script>
